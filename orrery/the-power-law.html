<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Power Law — Orrery</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
:root{
  --ground:#f2ecdf; --surface-sunk:#ece4d2; --surface-raised:#faf6ec;
  --border:#ddd2bc; --border-strong:#c9bda1;
  --ink:#26221d; --ink-strong:#14110e; --ink-muted:#5b5343; --ink-faint:#83765b;
  --accent:#96702f; --accent-dim:#b08d4f; --accent-wash:rgba(150,112,47,0.08);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --r:4px; --reader-w:min(760px, 58vw); --move-fast:150ms ease;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%; overflow:hidden; background:var(--ground); color:var(--ink);
  font-family:var(--font); font-size:15.5px; line-height:1.75; overscroll-behavior:none;}
h1,h2,h3{color:var(--ink-strong); font-weight:600; line-height:1.3;}
.kicker{font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink-muted); font-weight:500;}

/* header — all navigation lives top right */
#hdr{position:fixed; top:0; left:0; right:0; z-index:40; height:56px;
  display:flex; align-items:center; gap:1.1rem; padding:0 1.4rem;
  background:linear-gradient(180deg, rgba(242,236,223,.96), rgba(242,236,223,.75), transparent);
  pointer-events:none; transition:right .3s cubic-bezier(.25,.7,.3,1);}
body.reader-open #hdr{right:var(--reader-w);}
#hdr>*{pointer-events:auto;}
#hdr .t{font-size:15px; font-weight:600; color:var(--ink-strong);}
#hdr .sub{font-size:11.5px; color:var(--ink-muted);}
#hdr .spacer{flex:1;}
#count{font-size:12px; color:var(--ink-faint); white-space:nowrap;}
.hbtn{background:rgba(250,246,236,.92); border:1px solid var(--border-strong); color:var(--ink-muted);
  font-family:var(--font); font-size:12.5px; padding:6px 13px; border-radius:var(--r); cursor:pointer;
  transition:all var(--move-fast); white-space:nowrap;}
.hbtn:hover{color:var(--ink); border-color:var(--ink-muted);}
.hbtn:disabled{opacity:.35; cursor:default;}
#navcluster{display:flex; align-items:center; gap:10px; opacity:0; pointer-events:none; transition:opacity .2s ease;
  background:rgba(37,37,37,.92); border:1px solid var(--border-strong); border-radius:8px; padding:3px 6px;}
#navcluster.on{opacity:1; pointer-events:auto;}
#navcluster .hbtn{background:none; border:none; font-size:24px; font-weight:300; color:var(--ink-faint); padding:0 6px; line-height:1;}
#navcluster .hbtn:hover{color:var(--ink-muted);}
#navcluster .hbtn:disabled{opacity:.25;}

/* viewport & sky */
#vp{position:fixed; inset:0; cursor:grab; touch-action:none;
  background:radial-gradient(ellipse at 50% 40%, #f6f1e4 0%, #f2ecdf 55%, #e9e0cb 100%);}
#vp.dragging{cursor:grabbing;}
#vp.dragging, #vp.dragging *{user-select:none;}
#world{position:absolute; top:0; left:0; width:2750px; height:1750px;
  transform-origin:0 0; will-change:transform;}
#world::before{content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(circle, rgba(110,95,65,.14) 1.2px, transparent 1.2px),
                   radial-gradient(circle, rgba(110,95,65,.08) 1px, transparent 1px);
  background-size:380px 380px, 150px 150px;
  background-position:0 0, 70px 100px; opacity:.8;}

/* constellation names */
.tlab{position:absolute; pointer-events:auto; cursor:pointer; user-select:none; text-align:center;}
.tlab .big{font-size:40px; font-weight:500; letter-spacing:.5em; line-height:1.3;
  text-transform:uppercase; white-space:nowrap;}
.tlab .sum{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf;
  font-size:19px; color:#665c44; margin-top:.5em; letter-spacing:.18em; text-transform:uppercase;}
.tlab:hover .big{filter:brightness(1.35);}
.tlab.core .big{font-size:19px; letter-spacing:.26em;}
.tlab.core .sum{font-size:9px; letter-spacing:.14em;}
.tlab.core .big{text-shadow:0 0 6px #f2ecdf,0 0 6px #f2ecdf,0 0 3px #f2ecdf;}
.mk.coredot{width:auto; gap:0;}
.mk.coredot .dot{box-shadow:0 0 0 3px rgba(111,100,85,0.14);}

/* stars */
.mk{position:absolute; cursor:pointer; user-select:none;
  display:flex; gap:14px; width:330px; align-items:flex-start;}
.mk .dot{border-radius:50%; flex-shrink:0;
  transition:transform .2s ease, box-shadow .4s ease, opacity .4s ease, background .4s ease;}
.mk:hover .dot{transform:scale(1.3);}
.mk .dtext{min-width:0; padding-top:1px;}
.mk .lbl{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf,0 0 3px #f2ecdf;
  font-size:19px; color:#26221d; font-weight:500; line-height:1.3;}
.mk .lbl .seq{font-size:12px; color:#83765b; font-weight:400; margin-right:.5em;}
.mk .ess{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf,0 0 3px #f2ecdf;
  font-size:14px; color:#584f3e; line-height:1.45; margin-top:4px; max-width:290px;
  opacity:0; transition:opacity .3s ease;}
.mk.showess .ess{opacity:1;}
.mk .sims-badge{font-size:12px; color:var(--accent-dim); margin-top:3px; display:none;}
.mk.hasim .sims-badge{display:block;}
.mk.focused .dot{transform:scale(1.35);}
.mk.focused .lbl{color:var(--ink-strong);}
.mk.neighbor .lbl{color:#14110e;}
.mk.dimmed{opacity:.35;}

/* connection overlay — few, directional, labeled plainly */
#tsvg, #astsvg, #flowsvg{position:absolute; top:0; left:0; pointer-events:none; overflow:visible;}
@keyframes dashdrift{to{stroke-dashoffset:-64;}}
.tline{animation:dashdrift 6s linear infinite;}
.tlabel{position:absolute; transform:translate(-50%,-50%); background:var(--ground);
  border:1px solid var(--accent-dim); color:var(--accent); border-radius:12px;
  font-size:12px; letter-spacing:.06em; padding:2px 11px; white-space:nowrap; cursor:pointer;
  pointer-events:auto; transition:background var(--move-fast); text-transform:uppercase;}
.tlabel:hover{background:var(--accent-wash);}

/* ---------- READER ---------- */
#reader{position:fixed; top:0; right:calc(-1 * var(--reader-w) - 20px); width:var(--reader-w);
  height:100%; z-index:45; background:var(--surface-raised);
  border-left:1px solid var(--border); display:flex; flex-direction:column;
  transition:right .3s cubic-bezier(.25,.7,.3,1);
  box-shadow:-24px 0 70px rgba(90,75,50,.18);}
#reader.open{right:0;}
#reader .top{padding:1.5em 2.2em 1em; border-bottom:1px solid var(--border); position:relative;}
#reader .close{position:absolute; top:14px; right:16px; background:none; border:none;
  color:var(--ink-faint); font-size:18px; cursor:pointer;}
#reader .close:hover{color:var(--ink);}
#reader h2{font-size:24px; margin:.45em 0 .3em;}
#reader .terrline{font-size:11.5px; color:var(--ink-faint); margin-top:2px;}
#rbody{flex:1; overflow-y:auto; padding:1.6em 2.2em 2.5em;}
#rbody::-webkit-scrollbar{width:6px;}
#rbody::-webkit-scrollbar-thumb{background:var(--border-strong); border-radius:3px;}
#rbody>*{max-width:66ch;}
.hook{font-size:18.5px; color:var(--ink-strong); line-height:1.65;
  padding-left:1em; border-left:2px solid var(--accent-dim); margin-bottom:1.1em;}
.story{font-size:15.5px; color:#2b2620;}
.typechip{display:inline-block; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink-muted); border:1px solid var(--border-strong); border-radius:3px; padding:1px 8px;}
details.fold{margin:1.2em 0 0; border:1px solid var(--border); border-radius:var(--r); background:var(--surface-sunk);}
details.fold summary{cursor:pointer; padding:.6em 1.05em; color:var(--ink-muted);
  font-size:13px; list-style:none; user-select:none;}
details.fold summary::-webkit-details-marker{display:none;}
details.fold summary::before{content:'+  '; color:var(--accent); font-weight:500;}
details.fold[open] summary::before{content:'−  ';}
details.fold summary:hover{color:var(--ink);}
details.fold .inner{padding:0 1.05em .9em; font-size:14.5px; color:#332e25;}
.named{margin-top:1.5em; background:var(--surface-sunk); border:1px solid var(--border);
  border-radius:8px; padding:1em 1.3em;}
.named .kicker{display:block; margin-bottom:.35em;}
.named b{color:var(--ink-strong); font-weight:600; font-size:16px;}
.named .def{font-size:14.5px; color:#332e25; margin-top:.2em;}
.sowhat{margin-top:1.4em; font-size:15px; color:#2b2620;}
.sowhat .kicker{display:block; margin-bottom:.3em;}
.closure{margin-top:1.5em; border:1px solid var(--accent-dim); border-radius:8px;
  background:var(--accent-wash); padding:1em 1.3em;}
.closure .kicker{color:var(--accent); display:block; margin-bottom:.3em;}
.closure .txt{font-size:14.5px; color:#4a443c; line-height:1.65;}
.linkrow{margin-top:1.6em; border-top:1px solid var(--border); padding-top:1em;
  display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:.6em 2em;}
.lgroup .kicker{display:block; margin-bottom:.25em;}
.lgroup a{display:block; font-size:14px; padding:.2em 0 .45em; color:#332e25; cursor:pointer; text-decoration:none;}
.lgroup a .t{border-bottom:1px dotted transparent; transition:border-color var(--move-fast); color:var(--ink);}
.lgroup a:hover .t{border-bottom-color:var(--accent);}
.lgroup a .why{display:block; font-size:12px; color:var(--ink-faint); line-height:1.5;}
.nextbtn{margin-top:1.8em; width:100%; max-width:66ch; text-align:left;
  background:var(--surface-sunk); border:1px solid var(--border-strong); border-radius:8px;
  color:var(--ink); font-family:var(--font); font-size:14.5px; padding:.9em 1.3em; cursor:pointer;
  transition:all var(--move-fast);}
.nextbtn:hover{border-color:var(--accent-dim); background:var(--accent-wash);}
.nextbtn .k{color:var(--ink-faint); font-size:11px; letter-spacing:.12em; text-transform:uppercase;
  display:block; margin-bottom:.15em;}
.nextbtn .arr{color:var(--accent); float:right;}

/* sim figure */
figure.frame{background:var(--surface-sunk); border:1px solid var(--border); border-radius:var(--r);
  margin:1.3em 0 0; overflow:hidden;}
figure.frame canvas{width:100%; display:block;}
figure.frame .controls{display:flex; gap:8px; padding:8px 12px; border-top:1px solid var(--border);
  align-items:center; flex-wrap:wrap;}
figure.frame .controls .cl{font-size:11.5px; color:var(--ink-faint);}
figure.frame figcaption{padding:7px 13px 10px; font-size:12.5px; color:var(--ink-muted); line-height:1.55;}
.ghost{background:none; border:1px solid var(--border-strong); color:var(--ink-muted);
  font-family:var(--font); font-size:12px; padding:3px 11px; border-radius:var(--r); cursor:pointer;
  transition:all var(--move-fast);}
.ghost:hover{color:var(--ink); border-color:var(--ink-muted);}
.ghost.active{color:var(--accent); border-color:var(--accent-dim); background:var(--accent-wash);}
figure.frame input[type=range]{flex:1; min-width:100px; accent-color:var(--accent);}

@media(max-width:760px){ :root{--reader-w:100vw;} }
</style>
</head>
<body>

<div id="hdr">
  <div>
    <div class="t">The Power Law</div>
    <div class="sub">a celestial chart of ideas · follow the flow or wander freely</div>
  </div>
  <div class="spacer"></div>
  <div id="navcluster">
    <button class="hbtn" id="navPrev" title="previous idea">‹</button>
    <button class="hbtn" id="navNext" title="next idea">›</button>
  </div>
  <button class="hbtn" id="overviewBtn">Overview&nbsp;·&nbsp;Esc</button>
</div>

<div id="vp"><div id="world"></div></div>

<div id="reader">
  <div class="top">
    <button class="close" id="rClose">✕</button>
    <span class="typechip" id="rChip"></span>
    <h2 id="rTitle"></h2>
    <div class="terrline" id="rTerr"></div>
  </div>
  <div id="rbody"></div>
</div>

<script>
'use strict';
/* ============================================================
   CONTENT v2 — every idea: hook → story → (sim) → mechanism
   fold → the idea named → where it bites → you can now explain.
   Connections: ≤4 per idea, in three plain buckets.
   ============================================================ */
const N = {

a1:{type:"axiom", title:"Returns follow a power law", x:1259, y:512,
  ess:"A handful of investments return almost everything; the rest barely matter.",
  hook:"If one deal in a fund of fifty makes 95% of the money, was the fund about the fifty — or the one?",
  story:"Venture returns don't cluster around an average like heights do. They obey a power law: a tiny number of grand-slam winners dwarf everything else combined. The distribution has a long, fat tail, and the tail is the whole game.",
  mech:"Mallaby's founding fact: in venture, the extreme outcome isn't a fluke on top of normal returns — it IS the return. Every strategy in the chart is a response to this one shape.",
  term:"The power law", def:"a distribution where a few extreme outcomes account for the bulk of the total.",
  sowhat:"Anywhere outcomes compound — startups, hits, careers, cities — averages mislead. Look for the shape of the tail, not the middle.",
  builds:[], leads:[["b1-laplace","the shape itself"],["b1-pendulum","the few that matter"]], live:[]},
a2:{type:"axiom", title:"You can't predict the winner", x:1057, y:627,
  ess:"Which deal becomes the grand slam is nearly impossible to know in advance.",
  hook:"The investors who passed on Google, Airbnb, and Facebook weren't fools. So what does that tell you?",
  story:"If a few deals make all the money and no one can reliably pick them beforehand, the only way to catch one is to be in enough of the right rooms. Access beats forecasting.",
  mech:"Because the winners are unpredictable, venture is a game of at-bats and access, not clairvoyance. You can't select the outlier — you can only make sure you're positioned to be holding it.",
  term:"Unpredictability of outliers", def:"the grand-slam outcome cannot be reliably identified in advance, only participated in.",
  sowhat:"When you can't predict the winner, showing up broadly and repeatedly beats trying to be clever about the one.",
  builds:[], leads:[["b2-logistic","so swing often"],["b3-kokura","and win access"]], live:[]},
a3:{type:"axiom", title:"Losses capped, gains uncapped", x:1462, y:627,
  ess:"You can only lose your investment once — but a winner can return it a thousandfold.",
  hook:"A bet where the worst case is -1x and the best case is +1000x. How often can you be wrong and still win?",
  story:"Equity has a floor and no ceiling: a failed startup returns zero, a great one returns hundreds of times your money. That asymmetry flips normal caution on its head — the danger isn't losing, it's missing.",
  mech:"With losses bounded and gains unbounded, the math rewards maximizing exposure to upside, not minimizing chance of loss. Being wrong often is fine; missing the giant is fatal.",
  term:"Asymmetric payoff", def:"a bet whose downside is limited to the stake while the upside is effectively unlimited.",
  sowhat:"Where downside is capped and upside is huge, the timid error (missing out) costs far more than the bold one (a small loss).",
  builds:[], leads:[["b1-principle","so being wrong is fine"],["b2-logistic","swing for the fences"]], live:[]},
a4:{type:"axiom", title:"It's a people-and-network business", x:1259, y:771,
  ess:"Deals flow through relationships; conviction and founders decide the rest.",
  hook:"Two investors see the same startup. One gets the deal, one doesn't. What separated them — analysis, or trust?",
  story:"The best deals are scarce and everyone wants them, so they go to the investor the founder trusts and the network surfaces. Venture runs on reputation, relationships, and reads on people, not spreadsheets.",
  mech:"This is why the craft — access, conviction, founder judgment, adding value — matters, and why advantages compound: winners bring the next winners to whoever backed them last.",
  term:"Network business", def:"an industry where deal access and outcomes are driven by relationships and reputation.",
  sowhat:"In any winner-take-most field, who trusts you and who you know often matters more than how right your analysis is.",
  builds:[], leads:[["b3-kokura","deal flow and access"],["b3-plan","networks compound"]], live:[]},

"b1-laplace":{type:"mechanism", title:"Power law vs bell curve", sim:"powerlaw", x:404, y:355,
  ess:"Venture returns aren't a bell curve around an average — they're a long, fat tail.",
  hook:"Human heights cluster near an average. Startup returns don't. What breaks the bell curve?",
  story:"In a bell-curve world, outcomes huddle near the mean and extremes are vanishingly rare. In a power-law world, the extreme is where all the value sits — one company can be worth more than all the others in a portfolio put together.",
  mech:"The difference isn't degree, it's kind. Averages and medians describe a bell curve well and a power law disastrously — under a power law, the mean is dragged around by a single outlier.",
  term:"Fat-tailed distribution", def:"a distribution whose rare extreme events carry most of the weight.",
  sowhat:"Reach for the median or average and you'll badly misjudge any power-law world. Ask instead: how big can the biggest be?",
  builds:[["a1","the shape, drawn"]], leads:[["b1-pendulum","the few that matter"]], live:[]},
"b1-pendulum":{type:"mechanism", title:"A few deals return everything", x:884, y:309,
  ess:"In a typical venture fund, one or two investments generate the bulk of all returns.",
  hook:"Sequoia put $60M into WhatsApp and made about $3 billion. How many other deals does a fund even need?",
  story:"Study after study shows the same pattern: most of a fund's profit comes from a tiny fraction of its bets. The grand slam doesn't just beat the others — it makes them collectively irrelevant.",
  mech:"This concentration is the practical face of the power law. It means a fund's job isn't a good average return across deals; it's catching one of the rare giants.",
  term:"Return concentration", def:"the tendency for one or two investments to produce most of a fund's total return.",
  sowhat:"In power-law games, don't optimize the portfolio's average. Optimize your odds of holding one of the giants.",
  builds:[["a1","the tail in practice"]], leads:[["b1-sensitive","so measure differently"]], live:[]},
"b1-sensitive":{type:"mechanism", title:"Slugging, not batting average", x:520, y:522,
  ess:"What matters isn't how often you're right — it's how big your rare wins are.",
  hook:"A VC who's right 20% of the time can crush one who's right 50%. How?",
  story:"Borrowed from baseball: batting average counts how often you hit; slugging counts how far. In venture, being right rarely but enormously beats being right often but modestly. Home-run size, not hit rate, is the score.",
  mech:"Because returns are power-law, a single 100x outweighs a dozen safe 2x wins. Optimizing for hit rate quietly steers you away from the giants and toward the mediocre-safe.",
  term:"Slugging percentage", def:"judging investors by the magnitude of their wins, not the frequency.",
  sowhat:"Stop grading yourself (or others) on how often you're right. In tail-driven games, the size of the rare win is everything.",
  builds:[["b1-pendulum","big wins over frequent ones"]], leads:[["b1-lorenz-story","which means most deals lose"]], live:[]},
"b1-lorenz-story":{type:"story", title:"The median deal loses money", x:254, y:656,
  ess:"Most individual venture investments return less than was put in — by design.",
  hook:"Roughly half of venture deals lose money. Is that a broken industry, or exactly how it should look?",
  story:"It's the intended shape. A power-law strategy accepts that most bets will disappoint or die, because the rare giant more than pays for all of them. A fund with no losers probably wasn't swinging hard enough.",
  mech:"This inverts normal business intuition, where a high failure rate signals incompetence. Here, a portfolio of only 'safe' winners is a warning sign — it means the fund missed the tail.",
  term:"Expected failure", def:"the built-in reality that most venture bets lose, offset by rare enormous wins.",
  sowhat:"A track record with no failures isn't prudence in a power-law game — it's evidence you never reached for the giants.",
  builds:[["b1-sensitive","the flip side of slugging"]], leads:[["b1-principle","so embrace being wrong"]], live:[]},
"b1-principle":{type:"principle", title:"Be wrong most of the time", x:716, y:679,
  ess:"Accepting frequent failure is the price of catching the rare giant.",
  hook:"Would you rather be right often and small, or wrong often and occasionally enormous?",
  story:"The power law rewards those who tolerate looking foolish repeatedly for the chance at one transformative win. Fear of being wrong steers you to safe bets — and safe bets can't be giants.",
  mech:"Traces to asymmetry: with capped losses and uncapped gains, many small mistakes are the acceptable cost of exposure to the one huge success. Wrongness isn't failure; it's the entry fee.",
  term:"Loss-tolerance", def:"accepting a high failure rate as the necessary cost of reaching power-law upside.",
  sowhat:"If your strategy can't survive being wrong most of the time, it can't win a power-law game. Build for that.",
  builds:[["a3","losses are capped anyway"],["b1-lorenz-story","most deals lose"]], leads:[["b2-logistic","so how to play it"]], live:[]},

"b2-logistic":{type:"mechanism", title:"Swing for the fences", x:1837, y:233,
  ess:"Back only companies that could plausibly return the whole fund.",
  hook:"Before investing, VCs ask: could this one deal, alone, pay back everything? Why that question?",
  story:"Because only fund-returners move the needle, top VCs screen for potential giants, not likely singles. A company that can at best triple your money isn't worth a slot, however safe — it can't be the tail.",
  mech:"The fences-swing follows from concentration: with one or two deals making the fund, every slot must have grand-slam potential. Merely good is a wasted at-bat.",
  term:"Fund-returner test", def:"backing only companies that could, alone, return the entire fund.",
  sowhat:"For high-upside bets, ask of each: could this one be the giant? If not, it's occupying a slot a giant could have.",
  builds:[["a3","uncapped upside is the target"]], leads:[["b2-attractors","the cost of missing one"]], live:[]},
"b2-attractors":{type:"mechanism", title:"The cost of missing the one", sim:"missone", x:2069, y:401,
  ess:"Passing on a single grand slam can outweigh every good decision you made.",
  hook:"Bessemer's famous 'anti-portfolio' lists the giants it turned down. Why is missing worse than losing?",
  story:"In a power-law world the deadly error isn't a bad investment — that costs 1x. It's declining the one that would have returned 1000x. The misses, not the losses, are what sink returns.",
  mech:"Because a fund's fate rides on the giants, a single false negative can erase the value of dozens of correct calls. This reframes risk: the risk is being too cautious to hold the outlier.",
  term:"False-negative risk", def:"the outsized cost of passing on a rare giant, versus the small cost of a losing bet.",
  sowhat:"When upside is unbounded, fear the deal you wrongly pass on far more than the one you wrongly take.",
  builds:[["b1-pendulum","the giants decide everything"]], leads:[["b2-lorenz-attractor","so build the portfolio for it"]], live:[]},
"b2-lorenz-attractor":{type:"mechanism", title:"Many bets, one hit", sim:"portfolio", x:2300, y:282,
  ess:"Spread enough shots that you're likely to be holding a giant when one appears.",
  hook:"If you can't pick the winner, how do you guarantee you own one?",
  story:"You make enough well-chosen bets that the power law works in your favour — most die, a few do fine, and probability says one lands in the tail. The portfolio isn't diversification for safety; it's coverage for upside.",
  mech:"With winners unpredictable, breadth is how you buy a ticket to the tail. But each bet must still pass the fund-returner test — broad, not indiscriminate.",
  term:"Portfolio coverage", def:"making enough high-upside bets to likely capture at least one power-law winner.",
  sowhat:"To catch an unpredictable giant, you need enough quality at-bats. Too few swings and the tail simply passes you by.",
  builds:[["a2","you can't pick, so cover"]], leads:[["b2-tension-random","and press your winners"]], live:[]},
"b2-tension-random":{type:"mechanism", title:"Double down on winners", x:2392, y:470,
  ess:"Pour more money into the bets that are working; starve the rest.",

const vp = document.getElementById('vp');
const world = document.getElementById('world');
const reader = document.getElementById('reader');
const WW = 2750, WH = 1750;
let cam = {s:0.12, tx:0, ty:0};
let anim = null;
function apply(){
  world.style.transform = `translate(${cam.tx}px, ${cam.ty}px) scale(${cam.s})`;
  lod();
}
function readerW(){ return reader.classList.contains('open') ? (reader.getBoundingClientRect().width||430) : 0; }
function visW(){ return innerWidth - readerW(); }
function centerOn(cx, cy, s){
  cam.s = s;
  cam.tx = visW()/2 - cx*s;
  cam.ty = innerHeight/2 - cy*s;
  apply();
}
function flyTo(cx, cy, s, dur=700){
  if (anim) cancelAnimationFrame(anim);
  const s0=cam.s, cx0=(visW()/2-cam.tx)/s0, cy0=(innerHeight/2-cam.ty)/s0;
  const ls0=Math.log(s0), ls1=Math.log(s);
  const t0=performance.now();
  function step(t){
    let p=Math.min(1,(t-t0)/dur);
    p = p<.5 ? 4*p*p*p : 1-Math.pow(-2*p+2,3)/2;
    centerOn(cx0+(cx-cx0)*p, cy0+(cy-cy0)*p, Math.exp(ls0+(ls1-ls0)*p));
    if (p<1) anim=requestAnimationFrame(step);
  }
  anim=requestAnimationFrame(step);
}
function overviewCam(fly=true){
  const cx=BC.x, cy=BC.y;
  const s = Math.min(visW()/(2*Math.max(cx,WW-cx)), innerHeight/(2*Math.max(cy,WH-cy)))*0.92;
  if (fly) flyTo(cx, cy, s, 800); else centerOn(cx, cy, s);
}
vp.addEventListener('wheel', e=>{
  e.preventDefault();
  if (anim) cancelAnimationFrame(anim);
  const f = Math.exp(-e.deltaY*0.0016);
  const s2 = Math.min(2.2, Math.max(0.06, cam.s*f));
  const wx=(e.clientX-cam.tx)/cam.s, wy=(e.clientY-cam.ty)/cam.s;
  cam.s=s2; cam.tx=e.clientX-wx*s2; cam.ty=e.clientY-wy*s2;
  apply();
}, {passive:false});
const ptrs = new Map();
let panStart=null, pinchStart=null, moved=0;
vp.addEventListener('pointerdown', e=>{
  if (e.target.closest('.tlabel')) return;
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (ptrs.size===1){
    moved=0;
    panStart={mx:e.clientX, my:e.clientY, tx:cam.tx, ty:cam.ty};
    vp.classList.add('dragging');
  } else if (ptrs.size===2){
    const [p1,p2]=[...ptrs.values()];
    pinchStart={d:Math.hypot(p1.x-p2.x,p1.y-p2.y), s:cam.s,
      wx:((p1.x+p2.x)/2-cam.tx)/cam.s, wy:((p1.y+p2.y)/2-cam.ty)/cam.s};
    panStart=null;
  }
});
addEventListener('pointermove', e=>{
  if (!ptrs.has(e.pointerId)) return;
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (ptrs.size===1 && panStart){
    if (anim) cancelAnimationFrame(anim);
    moved += Math.abs(e.movementX||0)+Math.abs(e.movementY||0);
    cam.tx = panStart.tx + (e.clientX-panStart.mx);
    cam.ty = panStart.ty + (e.clientY-panStart.my);
    apply();
  } else if (ptrs.size===2 && pinchStart){
    if (anim) cancelAnimationFrame(anim);
    const [p1,p2]=[...ptrs.values()];
    const d=Math.hypot(p1.x-p2.x,p1.y-p2.y);
    const s2=Math.min(2.2, Math.max(0.06, pinchStart.s*d/pinchStart.d));
    const cx=(p1.x+p2.x)/2, cy=(p1.y+p2.y)/2;
    cam.s=s2; cam.tx=cx-pinchStart.wx*s2; cam.ty=cy-pinchStart.wy*s2;
    apply();
  }
});
function ptrUp(e){ ptrs.delete(e.pointerId);
  if (ptrs.size<2) pinchStart=null;
  if (ptrs.size===0){ panStart=null; vp.classList.remove('dragging'); } }

/* ============================================================

let focusId = null, stopSim = null;

function linkGroup(kicker, items){
  if (!items.length) return '';
  return `<div class="lgroup"><span class="kicker">${kicker}</span>
    ${items.map(([t,why])=>`<a data-t="${t}"><span class="t">${N[t].title}</span>
      <span class="why">${why}</span></a>`).join('')}
  </div>`;
}

function openIdea(id){
  const n = N[id];
  if (stopSim){ stopSim(); stopSim=null; }
  focusId = id;
  const chip = document.getElementById('rChip');
  chip.textContent = n.type;
  chip.style.borderColor = hueOf(id)+'66'; chip.style.color = hueOf(id);
  document.getElementById('rTitle').textContent = n.title;
  document.getElementById('rTerr').textContent = terrOf(id) + (SEQ[id]?` · step ${SEQ[id]} of ${TOUR.length}`:'');
  const nextId = SEQ[id] && SEQ[id] < TOUR.length ? TOUR[SEQ[id]] : null;
  document.getElementById('rbody').innerHTML = `
    <div class="hook">${n.hook}</div>
    <div class="story">${n.story}</div>
    ${n.sim ? simHTML(n.sim) : ''}
    ${n.mech ? `<details class="fold"><summary>How it actually works</summary><div class="inner">${n.mech}</div></details>` : ''}
    <div class="named"><span class="kicker">the idea, named</span>
      <b>${n.term}</b><div class="def">${n.def}</div></div>
    <div class="sowhat"><span class="kicker">where it bites</span>${n.sowhat}</div>
    <div class="linkrow">
      ${linkGroup('builds on', n.builds)}
      ${linkGroup('leads to', n.leads)}
      ${linkGroup('see it live', n.live)}
    </div>
    ${nextId ? `<button class="nextbtn" data-t="${nextId}"><span class="k">next in the flow · ${SEQ[nextId]} of ${TOUR.length}</span>${N[nextId].title}<span class="arr">→</span></button>`
             : (SEQ[id]===TOUR.length ? `<button class="nextbtn" id="finishBtn"><span class="k">end of the flow</span>Back to the chart<span class="arr">↑</span></button>` : '')}`;
  document.querySelectorAll('#rbody [data-t]').forEach(a=>
    a.addEventListener('click', ()=>openIdea(a.dataset.t)));
  const fin = document.getElementById('finishBtn');
  if (fin) fin.onclick = ()=>{ closeReader(); overviewCam(); };
  const fig = document.querySelector('#rbody figure.frame');
  if (fig) stopSim = SIMS[fig.dataset.sim](fig);
  document.getElementById('rbody').scrollTop = 0;
  reader.classList.add('open');
  document.body.classList.add('reader-open');
  highlight(id);
  syncNav();
  const rs = Math.min(0.95, Math.max(0.62, cam.s));
  setTimeout(()=>flyTo(n.x+180, n.y+60, rs), 60);
}
function closeReader(){
  if (stopSim){ stopSim(); stopSim=null; }
  reader.classList.remove('open');
  document.body.classList.remove('reader-open');
  focusId = null;
  clearHighlight();
  syncNav();
}
document.getElementById('rClose').onclick = closeReader;

/* map highlight: few directional lines with plain labels */
function highlight(id){
  clearHighlight();
  const n = N[id];
  const nb = new Set([id]);
  const conns = [
    ...n.builds.map(([t])=>({t, lab:'builds on', into:true})),
    ...n.leads.map(([t])=>({t, lab:'leads to', into:false})),
    ...n.live.map(([t])=>({t, lab:'see it live', into:false}))
  ];
  conns.forEach(c=>nb.add(c.t));
  ALL.forEach(x=>{
    mkEls[x].classList.toggle('dimmed', !nb.has(x));
    mkEls[x].classList.toggle('neighbor', nb.has(x) && x!==id);
    mkEls[x].classList.toggle('focused', x===id);
  });
  const here = dotCenter(id);
  conns.forEach(c=>{
    const there = dotCenter(c.t);
    let from = c.into ? {...there} : {...here};
    let to   = c.into ? {...here} : {...there};
    {
      const ddx=to.x-from.x, ddy=to.y-from.y, LL=Math.hypot(ddx,ddy)||1;
      const ux=ddx/LL, uy=ddy/LL, off=30;
      from = {x:from.x+ux*off, y:from.y+uy*off};
      to   = {x:to.x-ux*off,   y:to.y-uy*off};
    }
    const dx=to.x-from.x, dy=to.y-from.y, dist=Math.hypot(dx,dy)||1;
    const cx=(from.x+to.x)/2 - dy/dist*dist*0.12, cy=(from.y+to.y)/2 + dx/dist*dist*0.12;
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M ${from.x} ${from.y} Q ${cx} ${cy} ${to.x} ${to.y}`);
    p.setAttribute('fill','none');
    p.setAttribute('stroke','rgba(150,112,47,0.45)');
    p.setAttribute('stroke-width','2.5');
    p.setAttribute('stroke-dasharray','9,8');
    p.setAttribute('class','tline');
    p.setAttribute('marker-end','url(#arr)');
    tsvg.appendChild(p);
    const lbl = document.createElement('div');
    lbl.className='tlabel';
    lbl.style.left = (.25*from.x+.5*cx+.25*to.x)+'px';
    lbl.style.top = (.25*from.y+.5*cy+.25*to.y)+'px';
    lbl.textContent = c.lab;
    lbl.addEventListener('click', e=>{ e.stopPropagation(); openIdea(c.t); });
    world.appendChild(lbl);
    tlabels.push(lbl);
  });
}
function clearHighlight(){
  ALL.forEach(x=>mkEls[x].classList.remove('dimmed','neighbor','focused'));
  [...tsvg.querySelectorAll('path')].forEach(p=>p.remove());
  tlabels.forEach(l=>l.remove()); tlabels.length=0;
}

function syncNav(){
  const i = focusId ? TOUR.indexOf(focusId) : -1;
  document.getElementById('navcluster').classList.toggle('on', !!focusId);
  document.getElementById('navPrev').disabled = i===0;
  document.getElementById('navNext').disabled = i===TOUR.length-1;
}
function navStep(dir){
  const i = focusId ? TOUR.indexOf(focusId) : -1;
  if (i<0){ openIdea(TOUR[0]); return; }
  const j = i+dir;
  if (j>=0 && j<TOUR.length) openIdea(TOUR[j]);
}

/* ============================================================
   SIMULATIONS
   ============================================================ */
const INKC='#3d3833', GRAY='#8a8069', FAINT='#b0a68c', AMBER='#96702f', SUNK='#ece4d2', BRD='#d5c9ae';
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0;
  let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t;
  return ((t^t>>>14)>>>0)/4294967296; }; }
function setActive(fig, btn){
  fig.querySelectorAll('.ghost').forEach(b=>{ if(b.dataset.d!==undefined||b.dataset.m!==undefined) b.classList.remove('active');});
  if (btn) btn.classList.add('active');
}
function simHTML(kind){
  const caps = {
    powerlaw:"Two worlds of returns. A bell curve huddles around its average; a power law is almost nothing — plus one giant that is everything.",
    portfolio:"A fund of 20 bets. Most die, a few do fine, one lands in the tail — and that one makes almost the whole return. Replay to reshuffle.",
    missone:"The same fund, with and without its single biggest winner. Drop the giant and a triumph becomes a loss."
  };
  const ctl = {
    powerlaw:`<button class="ghost active" data-d="bell">bell curve</button>
      <button class="ghost" data-d="power">power law</button>`,
    portfolio:`<button class="ghost" data-a="run">reshuffle ↻</button>`,
    missone:`<button class="ghost active" data-w="in">with the winner</button>
      <button class="ghost" data-w="out">without it</button>`
  };
  return `<figure class="frame" data-sim="${kind}">
    <canvas></canvas>
    <div class="controls">${ctl[kind]}</div>
    <figcaption>${caps[kind]}</figcaption>
  </figure>`;
}
const SIMS = {};

function wrapText(ctx, text, x, y, maxW, lh){
  const words=text.split(' '); let line='', yy=y;
  for(const w of words){ const t=line?line+' '+w:w;
    if(ctx.measureText(t).width>maxW && line){ ctx.fillText(line,x,yy); line=w; yy+=lh; }
    else line=t; }
  if(line) ctx.fillText(line,x,yy); return yy;
}

SIMS.powerlaw = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=380;
  const ctx=cv.getContext('2d'); const W=700,H=380; let mode="bell";
  const px=50, py=40, pw=W-90, ph=H-110, n=22;
  function draw(){
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle=BRD; ctx.beginPath(); ctx.moveTo(px,py+ph); ctx.lineTo(px+pw,py+ph); ctx.stroke();
    const bw=pw/n;
    let vals=[];
    if(mode==="bell"){ for(let i=0;i<n;i++){ const x=(i-n/2)/(n/4); vals.push(Math.exp(-x*x/2)); } }
    else { for(let i=0;i<n;i++){ vals.push(0.03 + (i===n-1?1:0.02/(n-i))); } }
    const mx=Math.max(...vals);
    vals.forEach((v,i)=>{
      const h=ph*v/mx, x=px+i*bw;
      ctx.fillStyle = (mode==="power"&&i===n-1) ? 'rgba(150,112,47,0.85)' : 'rgba(138,128,105,0.55)';
      ctx.fillRect(x, py+ph-h, bw-3, h);
    });
    ctx.fillStyle=INKC; ctx.font='15px Inter, sans-serif';
    ctx.fillText(mode==="bell"?"Bell curve — outcomes cluster near the average":"Power law — one outcome dwarfs all the rest", 40, 28);
    ctx.fillStyle=GRAY; ctx.font='13px Inter, sans-serif';
    wrapText(ctx, mode==="bell" ? "Here the mean and median describe everything. Extremes are vanishingly rare — the world of heights and coin flips."
                                : "Here the average is meaningless — it's dragged around by the single giant on the right. This is the world of venture returns.", 40, H-44, W-80, 20);
  }
  draw();
  fig.querySelectorAll('.ghost').forEach(b=>b.onclick=()=>{
    fig.querySelectorAll('.ghost').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); mode=b.dataset.d; draw(); });
  return ()=>{};
};

SIMS.portfolio = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=380;
  const ctx=cv.getContext('2d'); const W=700,H=380,n=20; let deals=[];
  function gen(){
    deals=[];
    for(let i=0;i<n;i++){
      const r=Math.random();
      let mult;
      if(r<0.5) mult=0;                 // half die
      else if(r<0.85) mult=0.3+Math.random()*1.5; // meh
      else mult=2+Math.random()*4;      // decent
      deals.push(mult);
    }
    // guarantee one giant
    deals[Math.floor(Math.random()*n)] = 40+Math.random()*60;
  }
  gen();
  function draw(){
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    const px=50, py=50, pw=W-90, ph=H-120, bw=pw/n;
    const mx=Math.max(...deals);
    const total=deals.reduce((a,b)=>a+b,0);
    const giant=Math.max(...deals), gi=deals.indexOf(giant);
    deals.forEach((v,i)=>{
      const h=ph*v/mx, x=px+i*bw;
      ctx.fillStyle = i===gi ? 'rgba(150,112,47,0.85)' : 'rgba(138,128,105,0.55)';
      ctx.fillRect(x, py+ph-h, bw-3, h);
    });
    ctx.strokeStyle=BRD; ctx.beginPath(); ctx.moveTo(px,py+ph); ctx.lineTo(px+pw,py+ph); ctx.stroke();
    ctx.fillStyle=FAINT; ctx.font='11px Inter, sans-serif'; ctx.fillText("20 investments (multiple of money returned)", px, py-10);
    ctx.fillStyle=INKC; ctx.font='14px Inter, sans-serif';
    ctx.fillText("Fund returns "+(total/n).toFixed(1)+"x — and the one giant ("+giant.toFixed(0)+"x) is "+Math.round(giant/total*100)+"% of it.", 40, H-42);
    ctx.fillStyle=GRAY; ctx.font='13px Inter, sans-serif';
    wrapText(ctx,"Half the bets returned nothing. That's fine — the single tail winner carried the entire fund.",40,H-20,W-80,18);
  }
  draw();
  fig.querySelector('.ghost').onclick=()=>{ gen(); draw(); };
  return ()=>{};
};

SIMS.missone = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=380;
  const ctx=cv.getContext('2d'); const W=700,H=380,n=20; let withW=true;
  const deals=[]; for(let i=0;i<n;i++){ const r=Math.random();
    deals.push(r<0.5?0:(r<0.85?0.3+Math.random()*1.2:2+Math.random()*3)); }
  const gi=Math.floor(Math.random()*n); deals[gi]=70;
  function draw(){
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    const px=50, py=50, pw=W-90, ph=H-120, bw=pw/n;
    const shown=deals.map((v,i)=> (i===gi&&!withW)?0:v);
    const mx=Math.max(...deals);
    const total=shown.reduce((a,b)=>a+b,0);
    shown.forEach((v,i)=>{ const h=ph*v/mx, x=px+i*bw;
      ctx.fillStyle = i===gi ? (withW?'rgba(150,112,47,0.85)':'rgba(138,92,92,0.4)') : 'rgba(138,128,105,0.55)';
      if(i===gi&&!withW){ ctx.strokeStyle='#8a5c5c'; ctx.setLineDash([3,3]); ctx.strokeRect(x, py, bw-3, ph); ctx.setLineDash([]); }
      else ctx.fillRect(x, py+ph-h, bw-3, h); });
    ctx.strokeStyle=BRD; ctx.beginPath(); ctx.moveTo(px,py+ph); ctx.lineTo(px+pw,py+ph); ctx.stroke();
    const ret=total/n;
    ctx.fillStyle=INKC; ctx.font='15px Inter, sans-serif';
    ctx.fillText(withW ? "With the winner: fund returns "+ret.toFixed(1)+"x — a triumph."
                       : "Without it: fund returns "+ret.toFixed(1)+"x — a loss.", 40, H-42);
    ctx.fillStyle=GRAY; ctx.font='13px Inter, sans-serif';
    wrapText(ctx, withW ? "Every other bet was ordinary. One giant made the fund." 
                        : "Pass on that single deal and all the good decisions can't save you. Missing the one is the deadly error.", 40, H-20, W-80, 18);
  }
  draw();
  fig.querySelectorAll('.ghost').forEach(b=>b.onclick=()=>{
    fig.querySelectorAll('.ghost').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); withW=b.dataset.w==="in"; draw(); });
  return ()=>{};
};
