<!DOCTYPE html>
<html lang="en">
<head>

<title>Chaos, Luck & Ergodicity — Orrery</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
:root{
  --ground:#f2ecdf; --surface-sunk:#ece4d2; --surface-raised:#faf6ec;
  --border:#ddd2bc; --border-strong:#c9bda1;
  --ink:#26221d; --ink-strong:#14110e; --ink-muted:#5b5343; --ink-faint:#83765b;
  --accent:#96702f; --accent-dim:#b08d4f; --accent-wash:rgba(150,112,47,0.08);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --r:4px; --reader-w:min(760px, 58vw); --move-fast:150ms ease;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%; overflow:hidden; background:var(--ground); color:var(--ink);
  font-family:var(--font); font-size:15.5px; line-height:1.75; overscroll-behavior:none;}
h1,h2,h3{color:var(--ink-strong); font-weight:600; line-height:1.3;}
.kicker{font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink-muted); font-weight:500;}

/* header — all navigation lives top right */
#hdr{position:fixed; top:0; left:0; right:0; z-index:40; height:56px;
  display:flex; align-items:center; gap:1.1rem; padding:0 1.4rem;
  background:linear-gradient(180deg, rgba(242,236,223,.96), rgba(242,236,223,.75), transparent);
  pointer-events:none; transition:right .3s cubic-bezier(.25,.7,.3,1);}
body.reader-open #hdr{right:var(--reader-w);}
#hdr>*{pointer-events:auto;}
#hdr .t{font-size:15px; font-weight:600; color:var(--ink-strong);}
#hdr .sub{font-size:11.5px; color:var(--ink-muted);}
#hdr .spacer{flex:1;}
#count{font-size:12px; color:var(--ink-faint); white-space:nowrap;}
.hbtn{background:rgba(250,246,236,.92); border:1px solid var(--border-strong); color:var(--ink-muted);
  font-family:var(--font); font-size:12.5px; padding:6px 13px; border-radius:var(--r); cursor:pointer;
  transition:all var(--move-fast); white-space:nowrap;}
.hbtn:hover{color:var(--ink); border-color:var(--ink-muted);}
.hbtn:disabled{opacity:.35; cursor:default;}
#navcluster{display:flex; align-items:center; gap:10px; opacity:0; pointer-events:none; transition:opacity .2s ease;
  background:rgba(37,37,37,.92); border:1px solid var(--border-strong); border-radius:8px; padding:3px 6px;}
#navcluster.on{opacity:1; pointer-events:auto;}
#navcluster .hbtn{background:none; border:none; font-size:24px; font-weight:300; color:var(--ink-faint); padding:0 6px; line-height:1;}
#navcluster .hbtn:hover{color:var(--ink-muted);}
#navcluster .hbtn:disabled{opacity:.25;}

/* viewport & sky */
#vp{position:fixed; inset:0; cursor:grab; touch-action:none;
  background:radial-gradient(ellipse at 50% 40%, #f6f1e4 0%, #f2ecdf 55%, #e9e0cb 100%);}
#vp.dragging{cursor:grabbing;}
#vp.dragging, #vp.dragging *{user-select:none;}
#world{position:absolute; top:0; left:0; width:2750px; height:1750px;
  transform-origin:0 0; will-change:transform;}
#world::before{content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(circle, rgba(110,95,65,.14) 1.2px, transparent 1.2px),
                   radial-gradient(circle, rgba(110,95,65,.08) 1px, transparent 1px);
  background-size:380px 380px, 150px 150px;
  background-position:0 0, 70px 100px; opacity:.8;}

/* constellation names */
.tlab{position:absolute; pointer-events:auto; cursor:pointer; user-select:none; text-align:center;}
.tlab .big{font-size:40px; font-weight:500; letter-spacing:.5em; line-height:1.3;
  text-transform:uppercase; white-space:nowrap;}
.tlab .sum{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf;
  font-size:19px; color:#665c44; margin-top:.5em; letter-spacing:.18em; text-transform:uppercase;}
.tlab:hover .big{filter:brightness(1.35);}
.tlab.core .big{font-size:19px; letter-spacing:.26em;}
.tlab.core .sum{font-size:9px; letter-spacing:.14em;}
.tlab.core .big{text-shadow:0 0 6px #f2ecdf,0 0 6px #f2ecdf,0 0 3px #f2ecdf;}
.mk.coredot{width:auto; gap:0;}
.mk.coredot .dot{box-shadow:0 0 0 3px rgba(111,100,85,0.14);}

/* stars */
.mk{position:absolute; cursor:pointer; user-select:none;
  display:flex; gap:14px; width:330px; align-items:flex-start;}
.mk .dot{border-radius:50%; flex-shrink:0;
  transition:transform .2s ease, box-shadow .4s ease, opacity .4s ease, background .4s ease;}
.mk:hover .dot{transform:scale(1.3);}
.mk .dtext{min-width:0; padding-top:1px;}
.mk .lbl{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf,0 0 3px #f2ecdf;
  font-size:19px; color:#26221d; font-weight:500; line-height:1.3;}
.mk .lbl .seq{font-size:12px; color:#83765b; font-weight:400; margin-right:.5em;}
.mk .ess{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf,0 0 3px #f2ecdf;
  font-size:14px; color:#584f3e; line-height:1.45; margin-top:4px; max-width:290px;
  opacity:0; transition:opacity .3s ease;}
.mk.showess .ess{opacity:1;}
.mk .sims-badge{font-size:12px; color:var(--accent-dim); margin-top:3px; display:none;}
.mk.hasim .sims-badge{display:block;}
.mk.focused .dot{transform:scale(1.35);}
.mk.focused .lbl{color:var(--ink-strong);}
.mk.neighbor .lbl{color:#14110e;}
.mk.dimmed{opacity:.35;}

/* connection overlay — few, directional, labeled plainly */
#tsvg, #astsvg, #flowsvg{position:absolute; top:0; left:0; pointer-events:none; overflow:visible;}
@keyframes dashdrift{to{stroke-dashoffset:-64;}}
.tline{animation:dashdrift 6s linear infinite;}
.tlabel{position:absolute; transform:translate(-50%,-50%); background:var(--ground);
  border:1px solid var(--accent-dim); color:var(--accent); border-radius:12px;
  font-size:12px; letter-spacing:.06em; padding:2px 11px; white-space:nowrap; cursor:pointer;
  pointer-events:auto; transition:background var(--move-fast); text-transform:uppercase;}
.tlabel:hover{background:var(--accent-wash);}

/* ---------- READER ---------- */
#reader{position:fixed; top:0; right:calc(-1 * var(--reader-w) - 20px); width:var(--reader-w);
  height:100%; z-index:45; background:var(--surface-raised);
  border-left:1px solid var(--border); display:flex; flex-direction:column;
  transition:right .3s cubic-bezier(.25,.7,.3,1);
  box-shadow:-24px 0 70px rgba(90,75,50,.18);}
#reader.open{right:0;}
#reader .top{padding:1.5em 2.2em 1em; border-bottom:1px solid var(--border); position:relative;}
#reader .close{position:absolute; top:14px; right:16px; background:none; border:none;
  color:var(--ink-faint); font-size:18px; cursor:pointer;}
#reader .close:hover{color:var(--ink);}
#reader h2{font-size:24px; margin:.45em 0 .3em;}
#reader .terrline{font-size:11.5px; color:var(--ink-faint); margin-top:2px;}
#rbody{flex:1; overflow-y:auto; padding:1.6em 2.2em 2.5em;}
#rbody::-webkit-scrollbar{width:6px;}
#rbody::-webkit-scrollbar-thumb{background:var(--border-strong); border-radius:3px;}
#rbody>*{max-width:66ch;}
.hook{font-size:18.5px; color:var(--ink-strong); line-height:1.65;
  padding-left:1em; border-left:2px solid var(--accent-dim); margin-bottom:1.1em;}
.story{font-size:15.5px; color:#2b2620;}
.typechip{display:inline-block; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink-muted); border:1px solid var(--border-strong); border-radius:3px; padding:1px 8px;}
details.fold{margin:1.2em 0 0; border:1px solid var(--border); border-radius:var(--r); background:var(--surface-sunk);}
details.fold summary{cursor:pointer; padding:.6em 1.05em; color:var(--ink-muted);
  font-size:13px; list-style:none; user-select:none;}
details.fold summary::-webkit-details-marker{display:none;}
details.fold summary::before{content:'+  '; color:var(--accent); font-weight:500;}
details.fold[open] summary::before{content:'−  ';}
details.fold summary:hover{color:var(--ink);}
details.fold .inner{padding:0 1.05em .9em; font-size:14.5px; color:#332e25;}
.named{margin-top:1.5em; background:var(--surface-sunk); border:1px solid var(--border);
  border-radius:8px; padding:1em 1.3em;}
.named .kicker{display:block; margin-bottom:.35em;}
.named b{color:var(--ink-strong); font-weight:600; font-size:16px;}
.named .def{font-size:14.5px; color:#332e25; margin-top:.2em;}
.sowhat{margin-top:1.4em; font-size:15px; color:#2b2620;}
.sowhat .kicker{display:block; margin-bottom:.3em;}
.closure{margin-top:1.5em; border:1px solid var(--accent-dim); border-radius:8px;
  background:var(--accent-wash); padding:1em 1.3em;}
.closure .kicker{color:var(--accent); display:block; margin-bottom:.3em;}
.closure .txt{font-size:14.5px; color:#4a443c; line-height:1.65;}
.linkrow{margin-top:1.6em; border-top:1px solid var(--border); padding-top:1em;
  display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:.6em 2em;}
.lgroup .kicker{display:block; margin-bottom:.25em;}
.lgroup a{display:block; font-size:14px; padding:.2em 0 .45em; color:#332e25; cursor:pointer; text-decoration:none;}
.lgroup a .t{border-bottom:1px dotted transparent; transition:border-color var(--move-fast); color:var(--ink);}
.lgroup a:hover .t{border-bottom-color:var(--accent);}
.lgroup a .why{display:block; font-size:12px; color:var(--ink-faint); line-height:1.5;}
.nextbtn{margin-top:1.8em; width:100%; max-width:66ch; text-align:left;
  background:var(--surface-sunk); border:1px solid var(--border-strong); border-radius:8px;
  color:var(--ink); font-family:var(--font); font-size:14.5px; padding:.9em 1.3em; cursor:pointer;
  transition:all var(--move-fast);}
.nextbtn:hover{border-color:var(--accent-dim); background:var(--accent-wash);}
.nextbtn .k{color:var(--ink-faint); font-size:11px; letter-spacing:.12em; text-transform:uppercase;
  display:block; margin-bottom:.15em;}
.nextbtn .arr{color:var(--accent); float:right;}

/* sim figure */
figure.frame{background:var(--surface-sunk); border:1px solid var(--border); border-radius:var(--r);
  margin:1.3em 0 0; overflow:hidden;}
figure.frame canvas{width:100%; display:block;}
figure.frame .controls{display:flex; gap:8px; padding:8px 12px; border-top:1px solid var(--border);
  align-items:center; flex-wrap:wrap;}
figure.frame .controls .cl{font-size:11.5px; color:var(--ink-faint);}
figure.frame figcaption{padding:7px 13px 10px; font-size:12.5px; color:var(--ink-muted); line-height:1.55;}
.ghost{background:none; border:1px solid var(--border-strong); color:var(--ink-muted);
  font-family:var(--font); font-size:12px; padding:3px 11px; border-radius:var(--r); cursor:pointer;
  transition:all var(--move-fast);}
.ghost:hover{color:var(--ink); border-color:var(--ink-muted);}
.ghost.active{color:var(--accent); border-color:var(--accent-dim); background:var(--accent-wash);}
figure.frame input[type=range]{flex:1; min-width:100px; accent-color:var(--accent);}

@media(max-width:760px){ :root{--reader-w:100vw;} }
</style>
</head>

<script>
'use strict';
/* ============================================================
   CONTENT v2 — every idea: hook → story → (sim) → mechanism
   fold → the idea named → where it bites → you can now explain.
   Connections: ≤4 per idea, in three plain buckets.
   ============================================================ */
const N = {

a1:{type:"axiom", title:"Rules govern change", x:1259, y:512,
  ess:"Same setup, same unfolding — the universe doesn't roll dice.",
  hook:"Flip a coin. Feels random? Now imagine placing every atom of coin, thumb, and air exactly where it was, and flipping again. Would it land differently?",
  story:"It wouldn't. A billiard break looks wild, but rerun it with every atom in an identical place and every collision repeats exactly. What we call 'random' in daily life is almost always rule-bound motion we can't track — loaded with physics all the way down.",
  mech:"Determinism means: the state of things now, plus the laws of motion, fully fixes what happens next. Nothing extra is needed — no dice anywhere in the chain. The astonishing part, coming up, is that chaos emerges anyway.",
  term:"Determinism", def:"what things are like now, plus the rules, fully fixes what happens next.",
  sowhat:"Traffic, markets, moods — most 'randomness' in your life is hidden clockwork. The surprise you feel is real, but it comes from somewhere else entirely (the next axiom).",
  explain:"why a coin flip is physics rather than magic — and why 'random' usually means 'rules we can't track', not 'no rules'.",
  builds:[], leads:[["b1-laplace","if the rules are perfect, prediction should be too… right?"]], live:[]},

a2:{type:"axiom", title:"Measurement is imperfect", x:1057, y:627,
  ess:"You only ever know the present to a few decimal places.",
  hook:"What's the temperature right now? 24°? 24.3°? 24.3172…°? At some digit you have to shrug. That shrug, it turns out, runs the world.",
  story:"Measure a pendulum's angle: 30°? 30.1°? 30.1002°? Every instrument ever built stops at some decimal place, and below that line the world keeps its secrets. Better instruments push the line down; nothing removes it.",
  mech:"However carefully you look, your picture of 'now' differs from the real 'now' by some sliver. It seems harmless — surely the fifth decimal can't matter? The entire story of chaos is what the world does to that assumption.",
  term:"The sliver", def:"the gap between the world as it is and the world as you measured it. Never zero.",
  sowhat:"Every plan you make rests on measured guesses — your calendar, your budget, your read on other people. All of them carry the sliver.",
  explain:"why 'just measure better' can never fully work, no matter how good the technology gets.",
  builds:[], leads:[["b1-sensitive","what the world does to that sliver"]], live:[]},

a3:{type:"axiom", title:"Everything touches everything", x:1462, y:627,
  ess:"No part of the world evolves in isolation.",
  hook:"Could the weather over one Japanese city in 1945 have changed whether your grandparents ever met?",
  story:"More plausibly than you'd think. The atmosphere over Japan that August was 'just weather' — and also the deciding variable in which city was bombed, who lived, who fled where, who met whom. Systems don't respect the neat boundaries we draw between them.",
  mech:"Coupled systems pass disturbances along: a nudge in one place becomes an input everywhere downstream. Connection is the transmission line along which small causes travel far — no amplifier needed beyond the wiring itself.",
  term:"Coupling", def:"systems feed into each other; nothing evolves alone.",
  sowhat:"Your smallest actions are inputs to systems you will never see the end of. That's not mysticism — it's plumbing.",
  explain:"how 'small' causes reach 'vast' effects with no amplifier beyond ordinary connection.",
  builds:[], leads:[], live:[["b3-kokura","the day this decided two cities' fates"]]},

a4:{type:"axiom", title:"You live one path, once", x:1259, y:771,
  ess:"You are not a crowd averaging out. You are one path.",
  hook:"A treatment works for 95% of patients, and your doctor smiles at the odds. Why might that number mean almost nothing for you?",
  story:"Because it describes a crowd, and you are not a crowd. A hundred strangers each take one risk: wins and losses cancel across them. You take a hundred risks in a row: each loss follows you into the next round. Same odds on paper — entirely different universe.",
  mech:"This is the hinge of the whole sky. History's contingency (the tape runs once) and the economics of ruin (your time-average isn't the crowd's average) are the same fact, seen from physics and from decision-making.",
  term:"One-path life", def:"your experience over time is not the crowd's average — especially where losses carry forward.",
  sowhat:"Every statistic you'll ever read — success rates, average returns, divorce rates — describes crowds. Reading them as personal predictions is a category error.",
  explain:"why 'the odds are good' and 'this is good for me' are two different sentences.",
  builds:[], leads:[["b4-ergodicity","the idea, in full"]], live:[["b4-coinflip","watch the crowd win while the person loses"]]},

"b1-laplace":{type:"story · phenomenon", title:"Laplace's Demon", x:404, y:355,
  ess:"The old dream: know everything now, predict everything forever.",
  hook:"If the universe runs on perfect rules, a big enough computer could print tomorrow's newspaper today. What, exactly, is stopping it?",
  story:"1814 — Laplace imagines an intellect that knows the position of every particle in the universe. To it, 'the future, like the past, would be present before its eyes.' For two centuries this felt inevitable: perfect rules promise perfect forecasts; we just need better machines.",
  mech:"The demon needs two ingredients: the rules (granted — axiom one) and the exact present state. The second is the fatal one. 'Exact' means infinitely many decimal places, and no measurement ever delivers them. The demon starves not for compute, but for decimals.",
  term:"Laplace's Demon", def:"the thought experiment of perfect prediction from perfect knowledge.",
  sowhat:"Every 'with enough data we'll predict X' pitch — markets, elections, your health — is this demon wearing a startup hoodie. Now you know which ingredient they can't buy.",
  explain:"what perfect prediction would actually require — and which requirement is impossible in principle, not just in practice.",
  builds:[["a1","the perfect rules the dream needs"]], leads:[["b1-sensitive","the flaw that kills it"]], live:[["b1-pendulum","watch the dream break in 20 seconds"]]},

"b1-pendulum":{type:"simulation", title:"The double pendulum", sim:"pendulum", x:884, y:309,
  ess:"Two identical pendulums, a hair apart. Watch them.",
  hook:"Below are two pendulums released a hair's breadth apart — 0.001° of difference. Before you watch: how long do you think they stay in sync?",
  story:"A few seconds. They move as one, then drift, disagree, and finally live entirely different lives — and nothing random happened. Replay it and the divergence repeats exactly, beat for beat. Perfect rules, unrepeatable-looking motion.",
  mech:"Attach one pendulum to another and each arm's motion feeds back into the other's. That feedback loop is the whole trick: it takes a microscopic gap and works on it every instant, instead of letting it fade.",
  term:"Chaos", def:"perfectly rule-bound motion that separates from any near-copy of itself.",
  sowhat:"This toy is a life: same person, one tiny difference in one morning, two futures that never re-meet.",
  explain:"how motion can be 100% determined and still impossible to keep track of.",
  builds:[["b1-laplace","the dream this kills"]], leads:[["b1-sensitive","why the gap explodes"]], live:[]},

"b1-sensitive":{type:"mechanism", title:"Sensitive dependence", x:520, y:522,
  ess:"Small errors don't add — they multiply.",
  hook:"Weather agencies own satellites, supercomputers, and armies of physicists. Why do forecasts still fall apart around day ten?",
  story:"Photocopy a photocopy a hundred times: each generation's tiny distortion feeds the next, until the page is noise. A chaotic system photocopies its own state every instant — and your measurement error is the smudge on the original.",
  mech:"Each step stretches the gap between 'what you measured' and 'what is' by some factor, so the gap grows like compound interest. That's why heroic precision buys almost nothing: measure a thousand times better and the forecast extends by only a few days. The horizon is a law, not a budget problem.",
  term:"Sensitive dependence", def:"small differences don't stay small — the system multiplies them at every step.",
  sowhat:"It's why tiny habits compound, tiny lies snowball, and 'I'll fix it later' quietly gets expensive.",
  explain:"why better instruments buy days rather than decades — and why the ten-day wall isn't an engineering failure.",
  builds:[["a2","the sliver that gets amplified"]], leads:[["b1-principle","the punchline"]], live:[["b1-lorenz-story","the day 0.000127 rewrote the weather"]]},

"b1-lorenz-story":{type:"story", title:"Lorenz's rounding error", x:254, y:656,
  ess:"1961: a shortcut of 0.000127 rewrote the weather.",
  hook:"In 1961 a meteorologist went for coffee while his computer re-ran a weather simulation. He came back to a different climate. What had he typed wrong?",
  story:"Almost nothing. Ed Lorenz restarted the run from midway, typing 0.506 instead of the stored 0.506127 — a difference below anything a weather instrument could even detect. The two forecasts agreed for a while, drifted, then described unrecognizably different weather.",
  mech:"The computer was perfectly deterministic — same numbers in, same numbers out. So the divergence proved something enormous: the model itself amplifies sub-measurable differences. Weather isn't hard to predict because we're bad at it. It is structurally resistant.",
  term:"The butterfly effect", def:"Lorenz's discovery that differences too small to measure can rewrite outcomes.",
  sowhat:"The version of your life where you left the house five minutes later is this exact experiment — running once, with no printout to compare.",
  explain:"where 'the butterfly effect' actually comes from: a rounding shortcut, not a poem.",
  builds:[["b1-sensitive","the mechanism caught in the act"]], leads:[["b1-principle","what it proved"]], live:[]},

"b1-principle":{type:"principle", title:"Determinism ≠ predictability", x:716, y:679,
  ess:"The rules can be perfect and the future still unknowable.",
  hook:"The rules are perfect, and computers double in power every couple of years. So do we eventually predict everything — or is something deeper in the way?",
  story:"For centuries the assumption was: unpredictability = ignorance. Learn the rules, sharpen the instruments, and forecasts follow. Chaos broke that equation. A perfectly known, perfectly deterministic system can hide its own future from any finite observer — knowledge was never the bottleneck.",
  mech:"The chain has three links: the rules are fixed (axiom one); your starting picture is off by a sliver (axiom two); the system multiplies that sliver relentlessly (sensitive dependence). Each link is unremarkable. Together they end the demon — beyond some horizon, model and reality part ways, always.",
  term:"Determinism ≠ predictability", def:"knowing the rules does not grant knowing the future. The two come apart.",
  sowhat:"Anyone selling confident long-range predictions about complex systems — pundits, market seers, ten-year roadmaps — is selling the demon. You now know the three links they'd have to break.",
  explain:"the three-step argument that ends perfect prediction — each step obvious, the conclusion not.",
  builds:[["b1-sensitive","the engine of the argument"]], leads:[["b2-attractors","and yet — chaos has a shape"]], live:[]},

"b2-logistic":{type:"simulation", title:"The logistic map", sim:"logistic", x:1837, y:233,
  ess:"One tiny rule. Order shatters into chaos — then reappears.",
  hook:"Below is one line of arithmetic about next year's population. How does something this small become one of the wildest objects in mathematics?",
  story:"Drag the pressure dial. At r=2.8 the population settles politely. At 3.2 it flips between two values. Then four, then eight, doubling faster and faster — until past 3.57, chaos. And then at 3.83, out of nowhere: an island of perfect order inside the storm. One knob did all of that.",
  mech:"The rule says: grow with r, shrink with crowding. The road into chaos is a structured staircase — period 2, 4, 8, 16… piling up to infinity at a precise point. Dripping taps, heart cells, and lasers walk the same staircase. Even the onset of chaos has order in it.",
  term:"Period-doubling", def:"chaos arrives by a staircase — steady, then 2, 4, 8 values — not by a slide.",
  sowhat:"Systems around you rarely drift into chaos; they step into it. The flip from one steady state to two is the staircase's first stair — worth noticing when you see it.",
  explain:"how order shatters on a schedule — and why there's an island of calm at 3.83 that nobody expected.",
  builds:[["b2-attractors","the shape behind the storm"]], leads:[["b2-tension-random","it looks like noise — is it?"]], live:[]},

"b2-lorenz-attractor":{type:"simulation", title:"The Lorenz butterfly", sim:"lorenz", x:2300, y:282,
  ess:"Never repeats. Never leaves.",
  hook:"Two weather-worlds below start a breath apart. They separate fast and never sync again — yet neither ever leaves the same two-winged shape. How can both be true?",
  story:"Watch: the gray and amber trajectories disagree almost immediately — that's the chaos you already know. But keep watching. Both keep tracing the same butterfly, forever. Detail: unpredictable. Shape: inevitable.",
  mech:"The trajectory is pulled onto an attractor — the set of states the system keeps returning near. On the attractor, nearby paths still fly apart (chaos), but no path ever exits (structure). Chaos turns out to be confined unpredictability.",
  term:"Strange attractor", def:"the shape a chaotic system is confined to, even while never repeating itself.",
  sowhat:"You can't predict a person's Tuesday; you can know their character. Same geometry.",
  explain:"how 'never repeats' and 'never leaves' coexist in one system.",
  builds:[["b2-attractors","the idea this draws live"]], leads:[], live:[]},

"b2-attractors":{type:"mechanism", title:"Attractors", x:2069, y:401,
  ess:"Chaos has a home address — you just can't predict the room.",
  hook:"No one on earth can forecast the path of a single leaf in a whirlpool. Anyone can point to where the leaves end up. What's the difference between those two questions?",
  story:"The whirlpool is the answer. The leaf's route: chaotic, hopeless. The funnel: stable, knowable, right there. Systems that look lawless in detail are often loyal to a shape — visiting and revisiting a repertoire of states without ever exactly repeating.",
  mech:"Plot every possible state of a system as a point in an abstract space; its life becomes a wandering curve. Many systems' curves collapse onto attractors — points, loops, or strange fractal shapes. The repertoire is stable even though the moment-to-moment path through it isn't.",
  term:"Attractor", def:"the repertoire of states a system keeps returning near, even without repeating.",
  sowhat:"It's why climate is knowable while weather isn't, and character while moods aren't — a distinction you'll use everywhere.",
  explain:"which questions about a chaotic system are answerable (shape questions) and which never will be (path questions).",
  builds:[["a1","rules are what carve the shape"]], leads:[["b2-principle","what this licenses"]], live:[["b2-logistic","the staircase"],["b2-lorenz-attractor","the butterfly"]]},

"b2-tension-random":{type:"tension", title:"Is chaos just randomness?", x:2392, y:470,
  ess:"It looks like noise. It isn't. The difference is everything.",
  hook:"Print a chaotic readout next to TV static. They look identical. One of them hides total order. How would you ever tell them apart?",
  story:"Interrogate them. Dice have no memory and no shape — averages are all you can ever know about dice. A chaotic system is the opposite: total memory (replay it exactly and it repeats exactly), rigid structure (the attractor), even short-term predictability before the sliver explodes.",
  mech:"The tells: chaos is replayable, stays inside its shape, is predictable for a short window, and walks a structured staircase into disorder. True randomness has none of these. They look alike for exactly one reason — both defeat long-range prediction. Everything else differs.",
  term:"Chaos vs randomness", def:"chaos = memory + structure + short-horizon predictability. Randomness = none of these.",
  sowhat:"Confuse them and you'll either trust averages where your path matters, or see meaningful patterns in genuine noise. Both errors are expensive.",
  explain:"the three tells that separate hidden order from true noise.",
  builds:[["b2-attractors","the structure noise lacks"]], leads:[["b2-principle","what you can still trust"]], live:[]},

"b2-principle":{type:"principle", title:"Unpredictable in detail, patterned in shape", x:1895, y:598,
  ess:"You can't forecast the path. You can trust the shape.",
  hook:"Nobody can predict the future — and yet winter coats sell out every November. What do the coat-buyers know that the forecasters don't?",
  story:"They're answering a different question. Whether it rains on this date next year is a path question — unanswerable; chaos owns it. Whether July in Delhi beats January for heat is a shape question — easy. Weather is chaos; climate is its attractor. Different questions, different physics.",
  mech:"This is the license everything downstream runs on: even where prediction fails, domains keep stable statistical shapes — and shapes can be read, compared, and positioned within. Without attractors, 'reading a domain' would be astrology.",
  term:"Shape-trust", def:"path questions are unanswerable; shape questions often aren't. Ask which one you're asking.",
  sowhat:"Careers, markets, relationships — all have climates worth trusting under their unpredictable weather. Most bad decisions ask a path question and act on a shape answer, or vice versa.",
  explain:"which half of the future chaos actually took from you — and which half it left on the table.",
  builds:[["b2-attractors","why shapes stay stable"]], leads:[["b3-plan","why we still plan"],["b4-principle","what a 'reading' reads"]], live:[]},

"b3-kokura":{type:"story", title:"The cloud over Kokura", x:271, y:962,
  ess:"Clouds saved one city and doomed another. Nobody chose.",
  hook:"August 9, 1945. A bomber circles a city three times, then flies away. What saved a hundred thousand people that morning?",
  story:"Clouds and smoke. Bockscar's orders required visual targeting; Kokura was overcast, so the crew diverted to the secondary target — Nagasaki. Years earlier, Kyoto had been quietly struck off the target list because the US Secretary of War had honeymooned there and loved the city. Weather and a memory, deciding cities.",
  mech:"This is the axioms working together in the open: an unmeasurable atmospheric detail (the sliver), coupled through a bombing protocol (connection) to the fates of hundreds of thousands. The chain from small to vast needed no amplifier beyond the world's ordinary wiring.",
  term:"Historical contingency", def:"history turning on details too small for anyone to measure — or intend.",
  sowhat:"Your own biggest turns — the job, the partner, the city — likely pivoted on details this small. Sit with that for a moment.",
  explain:"how weather-scale noise became history-scale consequence, step by traceable step.",
  builds:[["a3","the coupling that carried it"]], leads:[["b3-contingency","does it always work like this?"]], live:[]},

"b3-contingency":{type:"tension", title:"Contingency vs convergence", x:601, y:1008,
  ess:"Do small changes wash out — or write history?",
  hook:"Rewind your life ten years and press play. Do you end up where you're sitting right now?",
  story:"Biology asked first. Rewind life's tape, said Stephen Jay Gould, and replay it: do you get humans again? Convergence says yes — deviations decay, the attractor wins, eyes and wings get re-invented. Contingency says no — deviations compound, and you get a world with no one in it to ask. Fluke's answer: both are real, in different regimes.",
  mech:"Convergent processes carry restoring forces: markets clear, evolution re-finds good designs, your fitness returns after a bad month. Contingent processes carry amplifying forces: which city was bombed, whom you married. Same world — two regimes, and most systems mix both at different scales.",
  term:"Contingency vs convergence", def:"two regimes: deviations decay (convergent) or compound (contingent).",
  sowhat:"Some parts of life snap back — habits, savings, fitness. Some never do — reputations, marriages, that one email. Know which regime you're standing in before you experiment there.",
  explain:"why 'did that small thing matter?' has two honest answers — and what decides between them.",
  builds:[["b3-kokura","the case for contingency"]], leads:[["b3-principle","what follows for you"]], live:[["b3-timeline","run the tape yourself, 120 times"]]},

"b3-timeline":{type:"simulation", title:"Branching timelines", sim:"timeline", x:312, y:1210,
  ess:"Change one small event. Replay 120 histories. Did it matter?",
  hook:"If you could re-run history 120 times with one tiny change at the start — would the worlds drift back together, or apart forever?",
  story:"You can, below. One slider decides whether deviations decay or feed themselves. Push it toward 'converging' and the amber histories snap back to gray — the nudge didn't matter. Push it toward 'compounding' and the same nudge fans out into permanently different worlds.",
  mech:"That's the entire contingency debate, compressed into one dial. Nothing else changes between the runs — not the noise, not the starting nudge. Only whether the system feeds its deviations or starves them.",
  term:"The regime dial", def:"whether deviations decay or compound decides whether small things matter.",
  sowhat:"Before agonizing over a small decision, ask which way the dial points in that part of your life. Most anxiety is contingency-fear in convergent territory.",
  explain:"what single property separates 'it'll wash out' from 'this changes everything'.",
  builds:[["b3-contingency","the debate this settles"]], leads:[], live:[]},

"b3-principle":{type:"principle", title:"Control nothing, influence everything", x:774, y:1152,
  ess:"Every action is an initial condition.",
  hook:"If chaos runs everything and outcomes can't be steered — why bother acting carefully at all?",
  story:"Because the same physics that takes your control gives your actions reach. In a coupled, amplifying world, nothing you do is inert: every act is an initial condition for everything downstream. Snoozing an alarm once has, occasionally, redirected a life — you just never know which time.",
  mech:"From coupling plus sensitive dependence: influence always propagates, but its endpoint is uncomputable. You are permanently consequential and permanently unable to aim it precisely. Both halves are true at once.",
  term:"Influence without control", def:"outcomes can't be steered; inputs always propagate.",
  sowhat:"The posture that fits the physics: humility about results, seriousness about actions. The control you lose over outcomes returns as weight on everything you do.",
  explain:"why losing control of outcomes makes your actions matter more, not less.",
  builds:[["a3","your actions travel"]], leads:[["b3-plan","then why plan anything?"]], live:[]},

"b3-plan":{type:"tension", title:"Why we still plan", x:543, y:1326,
  ess:"If prediction fails, why isn't planning pointless?",
  hook:"Weather forecasts die at day ten. Your five-year plan is 1,800 days long. Is planning a scam?",
  story:"Only if planning means predicting. Chaos bounds the horizon but doesn't erase structure: you can't plan the path, but you can position within the shape. Nobody knows whether it'll rain on trek day — everybody packs for the mountain's climate anyway.",
  mech:"Because attractors guarantee stable shapes, planning changes meaning: from 'predict, then commit' to 'position, hedge, re-read'. The plan isn't a forecast of the path; it's a posture toward the shape.",
  term:"Positioning", def:"planning re-founded: stand well within a trustworthy shape instead of predicting a path.",
  sowhat:"Don't predict the market — be positioned for its moods. Don't script the career — stand where good surprises tend to land.",

  builds:[["b2-principle","the shapes you can trust"]], leads:[["b4-destination","this becomes the third reading"]], live:[]},

"b4-coinflip":{type:"simulation", title:"The coin-flip split", sim:"coinflip", x:1583, y:979,
  ess:"Same coin, same odds. Crowd fine. Individual ruined.",
  hook:"A casino offers a fair-feeling game: heads doubles your money, tails takes it all. The math says the average player breaks even. So why does everyone who keeps playing go broke?",
  story:"Watch both panels below. Left: a hundred people each play once — half double, half bust, and the crowd average sits calmly at 1.0. Right: one person plays again and again — and one tails ends the game, permanently. The math never changed between the panels. The situation did.",
  mech:"The crowd averages across people; you average across time. Ruin breaks the equivalence: a busted player can't rejoin future rounds, so losses stop cancelling. Then try the 'gentle' variant — no single flip is fatal, the average still grows — and almost every individual path still decays. That one deserves a minute of staring.",
  term:"The ensemble/time split", def:"the crowd's average and your experience over time are different quantities. Ruin splits them forever.",
  sowhat:"'Positive expected value' has bankrupted a lot of smart people. The number wasn't wrong — it just wasn't about them.",
  explain:"why a fair-on-paper game destroys every individual who keeps playing it.",
  builds:[["a4","one path, once"]], leads:[["b4-ergodicity","the idea, named"]], live:[]},

"b4-ergodicity":{type:"mechanism", title:"Ergodicity", x:1901, y:945,
  ess:"When does the crowd's average equal your experience? Mostly: it doesn't.",
  hook:"'This surgery succeeds 95% of the time.' Whose time?",
  story:"The crowd's. Ninety-five of a hundred patients walk out well — that's what the number measures. Your question is different: what happens to the one path that is me, over my one life? When the domain contains ruin — death, bankruptcy, a burned reputation — those two questions stop having the same answer.",
  mech:"A situation is ergodic when the crowd's average does equal your long-run experience — coin flips for pennies you can always afford, say. Absorbing barriers break ergodicity: paths that hit them stop exploring, losses stop cancelling, and the surviving average flatters everyone still standing. Most advice silently assumes no barriers exist.",
  term:"Ergodicity", def:"a domain is ergodic when the crowd's average equals your long-run experience. Ruin breaks it.",
  sowhat:"Before trusting any statistic, one question: does this domain contain ruin? If yes, the average isn't about you.",
  explain:"when statistics genuinely apply to you — and when they quietly describe someone else.",
  builds:[["a4","the one-path fact underneath"]], leads:[["b4-domains","which domains break it"]], live:[["b4-coinflip","the split, live"]]},

"b4-domains":{type:"mechanism", title:"Resetting vs compounding domains", x:2219, y:979,
  ess:"Does failure reset the game — or foreclose the next one?",
  hook:"Bad coffee this morning; a drunk email to your CEO last night. Both are 'mistakes'. Why is only one of them gone by tomorrow?",
  story:"Because the domains keep different books. A bad cup, a bad draft, a botched chord — tomorrow starts clean; the error died with the attempt. A ruined credit score, a blown reputation, a serious health event — tomorrow starts smaller; the error came along. One kind of domain forgives. The other remembers.",
  mech:"The reading is about how errors travel. Resetting domains have independent rounds. Compounding domains carry state — each failure constrains the options that follow. Same effort, same discipline, different physics. 'Fail fast, iterate' is a resetting-domain tool being sold as universal wisdom.",
  term:"Resetting vs compounding", def:"domains differ in whether errors die with the attempt or carry forward into every next round.",
  sowhat:"'Fail fast' is brilliant in the kitchen and catastrophic with your reputation. The advice was never wrong — it came with an unlabeled domain requirement.",
  explain:"the first question to ask of any domain before acting in it: does failure here reset, or follow me?",
  builds:[["b4-ergodicity","why ruin changes the books"]], leads:[["b4-survive","the rule where errors carry"],["b4-danger","where it turns dangerous"]], live:[]},

"b4-survive":{type:"principle", title:"Survive first, optimize second", x:2438, y:1094,
  ess:"Where errors compound, staying in the game outranks winning it.",
  hook:"Two investors: one chases the best possible returns, one refuses ever to be wiped out. Twenty years on, who's usually richer?",
  story:"The refuser, and it isn't close. Not because caution beats ambition — because the best strategy ever discovered is worth nothing on a path that already hit zero. You can't run the next experiment if the last one took you out. This is arithmetic wearing the costume of timidity.",
  mech:"On a single sequential path with ruin in it, maximizing the average outcome is simply the wrong objective — the average includes crowds of parallel yous who don't exist. The right objective: protect the ability to keep playing, then optimize hard within that. In resetting domains the constraint costs nothing; there, swing freely.",
  term:"Survival first", def:"in compounding domains, protect the ability to keep playing before optimizing anything else.",
  sowhat:"Boring emergency fund, guarded burnout line, clean reputation — then bold everywhere the game resets. That split is the whole art.",
  explain:"why 'don't get knocked out' mathematically beats 'win more' wherever losses carry forward.",
  builds:[["b4-domains","where this rule binds"]], leads:[["b4-explore","how bold can you afford to be?"]], live:[]},

"b4-signal":{type:"mechanism", title:"Signal: speed and clarity", x:1612, y:1181,
  ess:"How fast does this domain tell you you're wrong — and how clearly?",
  hook:"Touch a hot stove and you learn in one second. Choose the wrong career and you learn in a decade. What exactly is different about the information coming back?",
  story:"Two dials, not one. Speed: how long between decision and consequence. Clarity: how directly the outcome points at its cause. A stove burn is fast and clear. A chess blunder is fast but murky — which move was it? Marathon training is slow but eventually clear. Bad coffee is instant — and any of four variables could be the culprit.",
  mech:"The dials fail independently, and each failure needs a different fix. Slow signal needs records that outlive your memory of why you decided. Murky signal needs isolating one variable at a time. Knowing which dial is broken tells you which tool to reach for.",
  term:"Signal speed × clarity", def:"how fast consequences arrive, and how directly they point at their cause — two independent dials.",
  sowhat:"Domains that keep score badly quietly train you badly — you'll 'learn' confident nonsense from them for years.",
  explain:"the four combinations of fast/slow and clear/murky — and which combination should scare you.",
  builds:[], leads:[["b4-danger","when both dials fail at once"]], live:[]},

"b4-danger":{type:"mechanism", title:"The danger zone", x:1959, y:1152,
  ess:"Compounding stakes + slow, murky signal: where default advice fails.",
  hook:"Careers, marriages, long-term health. Why do life's highest-stakes domains give the worst feedback?",
  story:"That pairing isn't bad luck. By the time a career, a marriage, or a body announces something is wrong, the error has been compounding for years behind slow, entangled signals. 'Fail fast, learn from mistakes' assumed failure would be cheap and legible. Here it is neither — and this is precisely where people apply it most confidently.",
  mech:"Chaos built this zone: sensitive dependence surfaces consequences far from their causes (slow) and tangled with everything else that happened meanwhile (murky). Chaos explains why such domains exist; ergodicity explains why they're lethal; the next star is the countermeasure.",
  term:"The danger zone", def:"compounding stakes plus slow, murky signal — the combination that defeats default advice.",
  sowhat:"The domains that matter most keep score worst. Expect no rescue from experience alone there — experience is exactly what's compromised.",
  explain:"why 'learn from your mistakes' structurally fails exactly where mistakes cost the most.",
  builds:[["b4-domains","the stakes half"],["b4-signal","the signal half"]], leads:[["b4-process","the countermeasure"]], live:[]},

"b4-process":{type:"mechanism", title:"Process: log, review, outside eye", x:1650, y:1330,
  ess:"When the domain won't keep score, build the scoreboard yourself.",
  hook:"Your memory rewrites the past to flatter you, and the domain won't grade your decisions for years. How are you supposed to learn anything?",
  story:"You manufacture the feedback. A log: the decision as it actually was, reasons and doubts included — not as memory will retell it, which is always tidier. A review ritual: sitting with the record, separating signal from noise. An outside eye: a coach or peer with no stake in flattering you, for the places your own perspective can't be trusted.",
  mech:"Kierkegaard: life is lived forward but understood backward. These tools create the speed and clarity the domain refuses to provide — a prosthetic scoreboard. They are not generic 'good habits': they're the specific response to compounding stakes plus poor signal. Where the game resets and the signal is clear, skip the overhead and let the loops teach.",
  term:"Manufactured feedback", def:"log, review ritual, outside eye — scorekeeping you build where the domain provides none.",
  sowhat:"A decision journal feels bureaucratic right up until the day it catches your memory lying to you. One catch pays for years of entries.",
  explain:"which situations genuinely require process — and where it's just productivity theater.",
  builds:[["b4-danger","the zone this answers"]], leads:[["b4-destination","one question left: where are you going?"]], live:[]},

"b4-destination":{type:"mechanism", title:"Defined vs open destination", x:2330, y:1255,
  ess:"Do you know where you're going — or are you finding out?",
  hook:"Training for a marathon and 'getting into writing' are both goals. Why should you plan them in opposite directions?",
  story:"The marathon has a finish line and a date: work backward from it. The endpoint dictates the training blocks, the weekly build, and — crucially — which signals to watch, so you're not reading your body blind. The writing has no endpoint yet: build upward instead. Small pieces, cheap experiments, and let the destination emerge from what keeps pulling you.",
  mech:"Working backward converts a vague intention into a sequence of decisions with known logic. But imposed on genuinely open work, it means optimizing hard toward the wrong thing. Refusing it on defined work is drift. Navigation is the third reading, downstream of stakes and signal — you can only plan a route across terrain you've already read.",
  term:"Backward vs upward", def:"known endpoints are planned backward; open ones are grown forward from cheap experiments.",
  sowhat:"Most goal advice assumes a finish line. Half your life doesn't have one — stop planning it as if it did.",
  explain:"which of your current projects should be planned backward, and which should be grown.",
  builds:[["b3-plan","where this question came from"]], leads:[["b4-explore","stay the course, or switch?"]], live:[]},

"b4-explore":{type:"tension", title:"Explore vs exploit", x:2470, y:1430,
  ess:"Stay with what works, or try something new? Look forward, not back.",
  hook:"You've given three years to this path — and that's exactly why you can't tell whether to leave it. What question cuts through?",
  story:"Not 'how much have I invested?' — that looks backward, and spent resources don't get a vote. The question is forward-only: from right here, does the alternative carry more promise than the path I'm on? Sunk cost is the gravity you have to consciously switch off.",
  mech:"What the first two readings contribute is the exploration budget. Resetting domain with clear signal: a failed experiment is one cheap data point — explore boldly. Compounding domain with slow signal: some experiments don't stay contained — the budget is set by what the domain can absorb, not by how curious you feel.",
  term:"Forward-looking choice", def:"explore/exploit is decided from here onward. The past has no vote.",
  sowhat:"Your boldness budget isn't a personality trait. It's a property of the domain you're standing in — read it first.",
  explain:"how stakes and signal size your experiments — and why sunk cost is the wrong lens entirely.",
  builds:[["b4-survive","the budget-setter"]], leads:[["b4-fence","keeping experiments cheap"]], live:[]},

"b4-fence":{type:"mechanism", title:"Fence the exploration", x:2090, y:1430,
  ess:"Keep experiments where their failures stay cheap.",
  hook:"Chefs taste in a side pan, never the serving dish. What's the life version of that move?",
  story:"A separate account for the speculative bets. A side project that can't touch production. A rehearsal before the real negotiation. The fence isn't tidiness — it's what keeps you honest about which of your errors reset and which compound.",
  mech:"Mix exploration into working systems and you destroy your own stakes-reading: you can no longer tell which failures are data and which are damage. Fenced, you get both regimes at once — genuinely bold inside the fence where everything resets, genuinely careful outside it where things remember.",
  term:"Fencing", def:"a dedicated space where experimental failures stay cheap and legible.",
  sowhat:"One fenced sandbox per serious domain — money, work, craft — buys you boldness without ruin. Cheap to build, priceless to have.",
  explain:"why mixing experiments into working systems ruins your ability to read either one.",
  builds:[["b4-explore","what needs the fence"]], leads:[["b4-principle","the full method"]], live:[]},

"b4-principle":{type:"principle", title:"Read the domain first", x:1830, y:1560,
  ess:"Stakes, then signal, then destination — in that order.",
  hook:"'Fail fast.' 'Trust the process.' 'Follow your passion.' Why does every famous piece of advice work brilliantly for some people and quietly wreck others?",
  story:"Because all of it is domain-specific advice sold as universal. 'Fail fast' assumes failure resets. 'Trust the process' assumes the process gets feedback. 'Follow your passion' assumes an open destination. Each is excellent — inside its domain. The wreckage happens where advice crosses a border without a passport.",
  mech:"So read before you act, in order. Stakes first: does failure compound here? — that decides what everything else is for. Signal second: will I know when I'm wrong? — only meaningful once you know the stakes. Destination last: backward or upward? — navigation across terrain the first two readings mapped. Skip one, and the later readings can't be done correctly.",
  term:"Reading the domain", def:"three questions, in order, before committing: does failure compound? will I know I'm wrong? is the destination defined?",
  sowhat:"This is the checklist. Three questions before any serious commitment — a job, an investment, a public bet, a life change. It fits on a sticky note.",
  explain:"why the readings are a sequence rather than a menu — and how to run all three on a decision you're facing right now.",
  builds:[["b4-survive","reading one"],["b4-process","reading two"],["b4-destination","reading three"]], leads:[["b2-principle","the license it all rests on"]], live:[]}

const vp = document.getElementById('vp');
const world = document.getElementById('world');
const reader = document.getElementById('reader');
const WW = 2750, WH = 1750;
let cam = {s:0.12, tx:0, ty:0};
let anim = null;
function apply(){
  world.style.transform = `translate(${cam.tx}px, ${cam.ty}px) scale(${cam.s})`;
  lod();
}
function readerW(){ return reader.classList.contains('open') ? (reader.getBoundingClientRect().width||430) : 0; }
function visW(){ return innerWidth - readerW(); }
function centerOn(cx, cy, s){
  cam.s = s;
  cam.tx = visW()/2 - cx*s;
  cam.ty = innerHeight/2 - cy*s;
  apply();
}
function flyTo(cx, cy, s, dur=700){
  if (anim) cancelAnimationFrame(anim);
  const s0=cam.s, cx0=(visW()/2-cam.tx)/s0, cy0=(innerHeight/2-cam.ty)/s0;
  const ls0=Math.log(s0), ls1=Math.log(s);
  const t0=performance.now();
  function step(t){
    let p=Math.min(1,(t-t0)/dur);
    p = p<.5 ? 4*p*p*p : 1-Math.pow(-2*p+2,3)/2;
    centerOn(cx0+(cx-cx0)*p, cy0+(cy-cy0)*p, Math.exp(ls0+(ls1-ls0)*p));
    if (p<1) anim=requestAnimationFrame(step);
  }
  anim=requestAnimationFrame(step);
}
function overviewCam(fly=true){
  const cx=BC.x, cy=BC.y;
  const s = Math.min(visW()/(2*Math.max(cx,WW-cx)), innerHeight/(2*Math.max(cy,WH-cy)))*0.92;
  if (fly) flyTo(cx, cy, s, 800); else centerOn(cx, cy, s);
}
vp.addEventListener('wheel', e=>{
  e.preventDefault();
  if (anim) cancelAnimationFrame(anim);
  const f = Math.exp(-e.deltaY*0.0016);
  const s2 = Math.min(2.2, Math.max(0.06, cam.s*f));
  const wx=(e.clientX-cam.tx)/cam.s, wy=(e.clientY-cam.ty)/cam.s;
  cam.s=s2; cam.tx=e.clientX-wx*s2; cam.ty=e.clientY-wy*s2;
  apply();
}, {passive:false});
const ptrs = new Map();
let panStart=null, pinchStart=null, moved=0;
vp.addEventListener('pointerdown', e=>{
  if (e.target.closest('.tlabel')) return;
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (ptrs.size===1){
    moved=0;
    panStart={mx:e.clientX, my:e.clientY, tx:cam.tx, ty:cam.ty};
    vp.classList.add('dragging');
  } else if (ptrs.size===2){
    const [p1,p2]=[...ptrs.values()];
    pinchStart={d:Math.hypot(p1.x-p2.x,p1.y-p2.y), s:cam.s,
      wx:((p1.x+p2.x)/2-cam.tx)/cam.s, wy:((p1.y+p2.y)/2-cam.ty)/cam.s};
    panStart=null;
  }
});
addEventListener('pointermove', e=>{
  if (!ptrs.has(e.pointerId)) return;
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (ptrs.size===1 && panStart){
    if (anim) cancelAnimationFrame(anim);
    moved += Math.abs(e.movementX||0)+Math.abs(e.movementY||0);
    cam.tx = panStart.tx + (e.clientX-panStart.mx);
    cam.ty = panStart.ty + (e.clientY-panStart.my);
    apply();
  } else if (ptrs.size===2 && pinchStart){
    if (anim) cancelAnimationFrame(anim);
    const [p1,p2]=[...ptrs.values()];
    const d=Math.hypot(p1.x-p2.x,p1.y-p2.y);
    const s2=Math.min(2.2, Math.max(0.06, pinchStart.s*d/pinchStart.d));
    const cx=(p1.x+p2.x)/2, cy=(p1.y+p2.y)/2;
    cam.s=s2; cam.tx=cx-pinchStart.wx*s2; cam.ty=cy-pinchStart.wy*s2;
    apply();
  }
});
function ptrUp(e){ ptrs.delete(e.pointerId);
  if (ptrs.size<2) pinchStart=null;
  if (ptrs.size===0){ panStart=null; vp.classList.remove('dragging'); } }
addEventListener('pointerup', ptrUp);

/* map highlight: few directional lines with plain labels */
function highlight(id){
  clearHighlight();
  const n = N[id];
  const nb = new Set([id]);
  const conns = [
    ...n.builds.map(([t])=>({t, lab:'builds on', into:true})),
    ...n.leads.map(([t])=>({t, lab:'leads to', into:false})),
    ...n.live.map(([t])=>({t, lab:'see it live', into:false}))
  ];
  conns.forEach(c=>nb.add(c.t));
  ALL.forEach(x=>{
    mkEls[x].classList.toggle('dimmed', !nb.has(x));
    mkEls[x].classList.toggle('neighbor', nb.has(x) && x!==id);
    mkEls[x].classList.toggle('focused', x===id);
  });
  const here = dotCenter(id);
  conns.forEach(c=>{
    const there = dotCenter(c.t);
    let from = c.into ? {...there} : {...here};
    let to   = c.into ? {...here} : {...there};
    {
      const ddx=to.x-from.x, ddy=to.y-from.y, LL=Math.hypot(ddx,ddy)||1;
      const ux=ddx/LL, uy=ddy/LL, off=30;
      from = {x:from.x+ux*off, y:from.y+uy*off};
      to   = {x:to.x-ux*off,   y:to.y-uy*off};
    }
    const dx=to.x-from.x, dy=to.y-from.y, dist=Math.hypot(dx,dy)||1;
    const cx=(from.x+to.x)/2 - dy/dist*dist*0.12, cy=(from.y+to.y)/2 + dx/dist*dist*0.12;
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M ${from.x} ${from.y} Q ${cx} ${cy} ${to.x} ${to.y}`);
    p.setAttribute('fill','none');
    p.setAttribute('stroke','rgba(150,112,47,0.45)');
    p.setAttribute('stroke-width','2.5');
    p.setAttribute('stroke-dasharray','9,8');
    p.setAttribute('class','tline');
    p.setAttribute('marker-end','url(#arr)');
    tsvg.appendChild(p);
    const lbl = document.createElement('div');
    lbl.className='tlabel';
    lbl.style.left = (.25*from.x+.5*cx+.25*to.x)+'px';
    lbl.style.top = (.25*from.y+.5*cy+.25*to.y)+'px';
    lbl.textContent = c.lab;
    lbl.addEventListener('click', e=>{ e.stopPropagation(); openIdea(c.t); });
    world.appendChild(lbl);
    tlabels.push(lbl);
  });
}
function clearHighlight(){
  ALL.forEach(x=>mkEls[x].classList.remove('dimmed','neighbor','focused'));
  [...tsvg.querySelectorAll('path')].forEach(p=>p.remove());

function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0;

const SIMS = {};

SIMS.pendulum = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=400;
  const ctx=cv.getContext('2d');
  const g=9.81,L=1,W=700,H=400,ox=W/2,oy=96,len=80;
  let A=[2.1,0,2.5,0],B=[2.1+0.0000175,0,2.5,0],trA=[],trB=[],t=0,raf;
  const deriv=s=>{const[t1,w1,t2,w2]=s,d=t1-t2,den=3-Math.cos(2*d);
    return[w1,(-g*3*Math.sin(t1)-g*Math.sin(t1-2*t2)-2*Math.sin(d)*(w2*w2*L+w1*w1*L*Math.cos(d)))/(L*den),
      w2,(2*Math.sin(d)*(w1*w1*L*2+g*2*Math.cos(t1)+w2*w2*L*Math.cos(d)))/(L*den)];};
  const rk4=(s,dt)=>{const k1=deriv(s),k2=deriv(s.map((v,i)=>v+dt/2*k1[i])),
    k3=deriv(s.map((v,i)=>v+dt/2*k2[i])),k4=deriv(s.map((v,i)=>v+dt*k3[i]));
    return s.map((v,i)=>v+dt/6*(k1[i]+2*k2[i]+2*k3[i]+k4[i]));};
  const bob=s=>[[ox+len*Math.sin(s[0]),oy+len*Math.cos(s[0])],
    [ox+len*Math.sin(s[0])+len*Math.sin(s[2]),oy+len*Math.cos(s[0])+len*Math.cos(s[2])]];
  function frame(){
    for(let i=0;i<6;i++){A=rk4(A,0.009);B=rk4(B,0.009);t+=0.009;}
    const[a1,a2]=bob(A),[b1,b2]=bob(B);
    trA.push(a2);trB.push(b2);
    if(trA.length>400){trA.shift();trB.shift();}
    ctx.fillStyle=SUNK;ctx.fillRect(0,0,W,H);
    const trail=(tr,col)=>{ctx.beginPath();
      tr.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));
      ctx.strokeStyle=col;ctx.globalAlpha=.32;ctx.lineWidth=1.4;ctx.stroke();ctx.globalAlpha=1;};
    trail(trA,GRAY);trail(trB,AMBER);
    const pend=(p1,p2,col)=>{ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.beginPath();
      ctx.moveTo(ox,oy);ctx.lineTo(p1[0],p1[1]);ctx.lineTo(p2[0],p2[1]);ctx.stroke();
      ctx.fillStyle=col;[p1,p2].forEach(p=>{ctx.beginPath();ctx.arc(p[0],p[1],6,0,7);ctx.fill();});};
    pend(a1,a2,GRAY);pend(b1,b2,AMBER);
    const d=Math.hypot(a2[0]-b2[0],a2[1]-b2[1]);
    ctx.fillStyle=GRAY;ctx.font='15px Inter, sans-serif';
    ctx.fillText(`t = ${t.toFixed(1)}s · separation ${d<1?d.toFixed(3):d.toFixed(0)} px`,14,H-16);
    raf=requestAnimationFrame(frame);
  }
  raf=requestAnimationFrame(frame);
  fig.querySelectorAll('.ghost').forEach(b=>b.onclick=()=>{
    setActive(fig,b);
    A=[2.1,0,2.5,0];B=[2.1+parseFloat(b.dataset.d),0,2.5,0];trA=[];trB=[];t=0;});
  return ()=>cancelAnimationFrame(raf);
};

SIMS.logistic = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=430;
  const ctx=cv.getContext('2d');
  const W=700,H=430,BH=300;
  const off=document.createElement('canvas');off.width=W;off.height=BH;
  const octx=off.getContext('2d');
  octx.fillStyle=SUNK;octx.fillRect(0,0,W,BH);
  octx.fillStyle='rgba(61,56,51,0.15)';
  for(let px=0;px<W;px++){
    const r=2.5+px/W*1.5;let x=0.4;
    for(let i=0;i<300;i++)x=r*x*(1-x);
    for(let i=0;i<130;i++){x=r*x*(1-x);octx.fillRect(px,BH-x*BH,1.2,1.2);}
  }
  let r=3.2;
  const behavior=r=>{
    if(r<3)return"settles to one steady value";
    if(r<3.449)return"flips between two values";
    if(r<3.544)return"flips among four";
    if(r<3.5699)return"doubling toward chaos";
    if(r>3.828&&r<3.858)return"the island of order";
    return"chaos — never settles, never repeats";};
  function draw(){
    ctx.fillStyle=SUNK;ctx.fillRect(0,0,W,H);
    ctx.drawImage(off,0,0);
    const px=(r-2.5)/1.5*W;
    ctx.strokeStyle=AMBER;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(px,0);ctx.lineTo(px,BH);ctx.stroke();
    ctx.strokeStyle=BRD;ctx.beginPath();ctx.moveTo(0,BH+4);ctx.lineTo(W,BH+4);ctx.stroke();
    let x=0.4;const pts=[];
    for(let i=0;i<90;i++){x=r*x*(1-x);pts.push(x);}
    ctx.strokeStyle=INKC;ctx.globalAlpha=.8;ctx.lineWidth=1.5;ctx.beginPath();
    pts.forEach((v,i)=>{const X=i/89*W,Y=H-8-v*(H-BH-38);i?ctx.lineTo(X,Y):ctx.moveTo(X,Y);});
    ctx.stroke();ctx.globalAlpha=1;
    ctx.fillStyle=GRAY;ctx.font='15px Inter, sans-serif';
    ctx.fillText(`r = ${r.toFixed(3)} — ${behavior(r)}`,12,BH+24);
  }
  draw();
  const slider=fig.querySelector('input');
  slider.oninput=()=>{r=parseFloat(slider.value);draw();};
  fig.querySelectorAll('.ghost').forEach(b=>b.onclick=()=>{
    r=parseFloat(b.dataset.r);slider.value=r;draw();});
  return ()=>{};
};

SIMS.lorenz = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=400;
  const ctx=cv.getContext('2d');
  const W=700,H=400,s=10,rho=28,beta=8/3,dt=0.006;
  let A,B,trA,trB,raf;
  const reset=()=>{A=[1,1,20];B=[1.0001,1,20];trA=[];trB=[];};
  reset();
  const step=p=>{const[x,y,z]=p;
    return[x+dt*s*(y-x),y+dt*(x*(rho-z)-y),z+dt*(x*y-beta*z)];};
  const px=p=>[W/2+p[0]*11.5,H-26-p[2]*7.4];
  function frame(){
    for(let i=0;i<5;i++){A=step(A);B=step(B);
      trA.push(px(A));trB.push(px(B));
      if(trA.length>2200){trA.shift();trB.shift();}}
    ctx.fillStyle=SUNK;ctx.fillRect(0,0,W,H);
    const draw=(tr,col,al)=>{ctx.strokeStyle=col;ctx.globalAlpha=al;ctx.lineWidth=1.2;
      ctx.beginPath();tr.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));
      ctx.stroke();ctx.globalAlpha=1;
      const last=tr[tr.length-1];
      if(last){ctx.fillStyle=col;ctx.beginPath();ctx.arc(last[0],last[1],4.5,0,7);ctx.fill();}};
    draw(trA,GRAY,.5);draw(trB,AMBER,.6);
    raf=requestAnimationFrame(frame);
  }
  raf=requestAnimationFrame(frame);
  fig.querySelector('.ghost').onclick=reset;
  return ()=>cancelAnimationFrame(raf);
};

SIMS.coinflip = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=440;
  const ctx=cv.getContext('2d');
  const W=700,H=440;
  let mode='A',raf,frameN=0,data=null;
  const buildA=()=>({
    crowd:Array.from({length:100},()=>Math.random()<.5?2:0),
    path:(()=>{let w=1;const p=[1];
      while(p[p.length-1]>0&&p.length<12){w=Math.random()<.5?w*2:0;p.push(w);}
      return p;})()});
  const buildB=()=>{
    const R=mulberry32(Math.floor(Math.random()*1e9));const paths=[];
    for(let p=0;p<36;p++){let w=1;const arr=[1];
      for(let t=0;t<100;t++){w*=R()<.5?1.5:0.6;arr.push(w);}paths.push(arr);}
    return{paths};};
  const start=()=>{frameN=0;data=mode==='A'?buildA():buildB();
    cancelAnimationFrame(raf);raf=requestAnimationFrame(frame);};
  function frame(){
    frameN++;
    ctx.fillStyle=SUNK;ctx.fillRect(0,0,W,H);
    ctx.font='14px Inter, sans-serif';
    if(mode==='A'){
      const round=Math.min(11,Math.floor(frameN/40));
      const flipped=frameN>40;
      ctx.fillStyle=GRAY;ctx.fillText('100 people · one flip each',24,28);
      data.crowd.forEach((v,i)=>{
        const cx=38+(i%10)*26,cy=54+Math.floor(i/10)*26;
        if(!flipped){ctx.fillStyle=FAINT;ctx.beginPath();ctx.arc(cx,cy,6.5,0,7);ctx.fill();}
        else if(v>0){ctx.fillStyle=INKC;ctx.beginPath();ctx.arc(cx,cy,6.5,0,7);ctx.fill();}
        else{ctx.strokeStyle=FAINT;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(cx,cy,6.5,0,7);ctx.stroke();}
      });
      const mean=data.crowd.reduce((a,b)=>a+b,0)/100;
      ctx.fillStyle=INKC;
      ctx.fillText(flipped?`crowd average: ${mean.toFixed(2)}× — fine`:'about to flip…',24,340);
      ctx.fillStyle=GRAY;ctx.fillText('1 person · flip after flip',390,28);
      const shown=data.path.slice(0,Math.max(1,round));
      ctx.strokeStyle=AMBER;ctx.lineWidth=2.5;ctx.beginPath();
      shown.forEach((v,i)=>{const X=390+i*25,Y=v>0?280-Math.log2(Math.max(v,1))*30:310;
        i?ctx.lineTo(X,Y):ctx.moveTo(X,Y);});
      ctx.stroke();
      shown.forEach((v,i)=>{const X=390+i*25,Y=v>0?280-Math.log2(Math.max(v,1))*30:310;
        ctx.fillStyle=v>0?AMBER:GRAY;ctx.fillRect(X-3,Y-3,6,6);});
      const last=shown[shown.length-1];
      ctx.fillStyle=last>0?INKC:GRAY;
      ctx.fillText(last>0?`wealth: ${last}× — one tails ends it`:'ruined — permanently',390,340);
      ctx.fillStyle=GRAY;ctx.font='12.5px Inter, sans-serif';
      ctx.fillText('The crowd averages across people; the person averages across',24,392);
      ctx.fillText('time — and ruin ends the averaging.',24,412);
      if(round>=11&&data.path[data.path.length-1]===0&&frameN%200===0)start();
    }else{
      const round=Math.min(100,Math.floor(frameN/3));
      ctx.fillStyle=GRAY;
      ctx.fillText('36 individuals (gray) · crowd average (amber) · typical (dashed)',24,26);
      const y=v=>250-Math.log10(Math.max(v,1e-4))*42;
      ctx.strokeStyle=BRD;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(24,y(1));ctx.lineTo(W-14,y(1));ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle=FAINT;ctx.font='12px Inter, sans-serif';ctx.fillText('start = 1×',W-84,y(1)-6);
      data.paths.forEach(p=>{
        ctx.strokeStyle='rgba(138,128,105,0.4)';ctx.lineWidth=1;ctx.beginPath();
        for(let t=0;t<=round;t++){const X=24+t/100*(W-46),Y=Math.min(H-56,y(p[t]));
          t?ctx.lineTo(X,Y):ctx.moveTo(X,Y);}
        ctx.stroke();});
      ctx.strokeStyle=AMBER;ctx.lineWidth=3;ctx.beginPath();
      for(let t=0;t<=round;t++){const X=24+t/100*(W-46),Y=y(Math.pow(1.05,t));
        t?ctx.lineTo(X,Y):ctx.moveTo(X,Y);}
      ctx.stroke();
      ctx.strokeStyle=INKC;ctx.setLineDash([6,5]);ctx.lineWidth=1.8;ctx.beginPath();
      for(let t=0;t<=round;t++){const X=24+t/100*(W-46),Y=Math.min(H-56,y(Math.pow(0.9487,t)));
        t?ctx.lineTo(X,Y):ctx.moveTo(X,Y);}
      ctx.stroke();ctx.setLineDash([]);
      ctx.font='14px Inter, sans-serif';
      ctx.fillStyle=AMBER;ctx.fillText(`crowd average after ${round}: ${Math.pow(1.05,round).toFixed(1)}× ↑`,24,382);
      ctx.fillStyle=INKC;ctx.fillText(`typical individual: ${Math.pow(0.9487,round).toFixed(3)}× ↓`,24,404);
      ctx.fillStyle=GRAY;ctx.font='12.5px Inter, sans-serif';
      ctx.fillText('No single flip is fatal — and almost everyone still loses.',24,428);
    }
    raf=requestAnimationFrame(frame);
  }
  fig.querySelectorAll('.ghost').forEach(b=>b.onclick=()=>{
    if(b.dataset.m){mode=b.dataset.m;setActive(fig,b);}
    start();});
  start();
  return ()=>cancelAnimationFrame(raf);
};

SIMS.timeline = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=400;
  const ctx=cv.getContext('2d');
  const W=700,H=400,NP=120,NT=140;
  function draw(k){
    const R=mulberry32(7);
    const base=[],pert=[];
    for(let p=0;p<NP;p++){
      let xb=0,xp=2.6;const tb=[0],tp=[2.6];
      for(let t=0;t<NT;t++){
        xb+=k*xb+(R()-.5)*1.7;xp+=k*xp+(R()-.5)*1.7;
        tb.push(xb);tp.push(xp);}
      base.push(tb);pert.push(tp);}
    let mx=4;
    base.concat(pert).forEach(p=>p.forEach(v=>{if(Math.abs(v)>mx)mx=Math.abs(v);}));
    const y=v=>H/2-v/mx*(H/2-42);
    ctx.fillStyle=SUNK;ctx.fillRect(0,0,W,H);
    const set=(S,col)=>{ctx.strokeStyle=col;ctx.lineWidth=1;
      S.forEach(p=>{ctx.beginPath();
        for(let t=0;t<=NT;t++){const X=t/NT*W,Y=y(p[t]);t?ctx.lineTo(X,Y):ctx.moveTo(X,Y);}
        ctx.stroke();});};
    set(base,'rgba(138,128,105,0.1)');set(pert,'rgba(150,112,47,0.12)');
    const mean=S=>{const m=[];for(let t=0;t<=NT;t++){let s=0;S.forEach(p=>s+=p[t]);m.push(s/S.length);}return m;};
    const line=(m,col)=>{ctx.strokeStyle=col;ctx.lineWidth=3;ctx.beginPath();
      for(let t=0;t<=NT;t++){const X=t/NT*W,Y=y(m[t]);t?ctx.lineTo(X,Y):ctx.moveTo(X,Y);}
      ctx.stroke();};
    line(mean(base),GRAY);line(mean(pert),AMBER);
    ctx.fillStyle=INKC;ctx.font='14px Inter, sans-serif';
    let verdict;
    if(k<-0.01)verdict=`the nudge washed out — convergent world: it didn't matter.`;
    else if(k>0.01)verdict=`the nudge compounded — permanently different histories.`;
    else verdict=`pure drift — the nudge neither dies nor grows.`;
    ctx.fillText(verdict,16,H-16);
  }
  draw(0.04);
  fig.querySelector('input').oninput=e=>draw(parseFloat(e.target.value));
  return ()=>{};
};
