<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Systems Thinking — Orrery</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
:root{
  --ground:#f2ecdf; --surface-sunk:#ece4d2; --surface-raised:#faf6ec;
  --border:#ddd2bc; --border-strong:#c9bda1;
  --ink:#26221d; --ink-strong:#14110e; --ink-muted:#5b5343; --ink-faint:#83765b;
  --accent:#96702f; --accent-dim:#b08d4f; --accent-wash:rgba(150,112,47,0.08);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --r:4px; --reader-w:min(760px, 58vw); --move-fast:150ms ease;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%; overflow:hidden; background:var(--ground); color:var(--ink);
  font-family:var(--font); font-size:15.5px; line-height:1.75; overscroll-behavior:none;}
h1,h2,h3{color:var(--ink-strong); font-weight:600; line-height:1.3;}
.kicker{font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink-muted); font-weight:500;}

/* header — all navigation lives top right */
#hdr{position:fixed; top:0; left:0; right:0; z-index:40; height:56px;
  display:flex; align-items:center; gap:1.1rem; padding:0 1.4rem;
  background:linear-gradient(180deg, rgba(242,236,223,.96), rgba(242,236,223,.75), transparent);
  pointer-events:none; transition:right .3s cubic-bezier(.25,.7,.3,1);}
body.reader-open #hdr{right:var(--reader-w);}
#hdr>*{pointer-events:auto;}
#hdr .t{font-size:15px; font-weight:600; color:var(--ink-strong);}
#hdr .sub{font-size:11.5px; color:var(--ink-muted);}
#hdr .spacer{flex:1;}
#count{font-size:12px; color:var(--ink-faint); white-space:nowrap;}
.hbtn{background:rgba(250,246,236,.92); border:1px solid var(--border-strong); color:var(--ink-muted);
  font-family:var(--font); font-size:12.5px; padding:6px 13px; border-radius:var(--r); cursor:pointer;
  transition:all var(--move-fast); white-space:nowrap;}
.hbtn:hover{color:var(--ink); border-color:var(--ink-muted);}
.hbtn:disabled{opacity:.35; cursor:default;}
#navcluster{display:flex; align-items:center; gap:10px; opacity:0; pointer-events:none; transition:opacity .2s ease;
  background:rgba(37,37,37,.92); border:1px solid var(--border-strong); border-radius:8px; padding:3px 6px;}
#navcluster.on{opacity:1; pointer-events:auto;}
#navcluster .hbtn{background:none; border:none; font-size:24px; font-weight:300; color:var(--ink-faint); padding:0 6px; line-height:1;}
#navcluster .hbtn:hover{color:var(--ink-muted);}
#navcluster .hbtn:disabled{opacity:.25;}

/* viewport & sky */
#vp{position:fixed; inset:0; cursor:grab; touch-action:none;
  background:radial-gradient(ellipse at 50% 40%, #f6f1e4 0%, #f2ecdf 55%, #e9e0cb 100%);}
#vp.dragging{cursor:grabbing;}
#vp.dragging, #vp.dragging *{user-select:none;}
#world{position:absolute; top:0; left:0; width:2750px; height:1750px;
  transform-origin:0 0; will-change:transform;}
#world::before{content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(circle, rgba(110,95,65,.14) 1.2px, transparent 1.2px),
                   radial-gradient(circle, rgba(110,95,65,.08) 1px, transparent 1px);
  background-size:380px 380px, 150px 150px;
  background-position:0 0, 70px 100px; opacity:.8;}

/* constellation names */
.tlab{position:absolute; pointer-events:auto; cursor:pointer; user-select:none; text-align:center;}
.tlab .big{font-size:40px; font-weight:500; letter-spacing:.5em; line-height:1.3;
  text-transform:uppercase; white-space:nowrap;}
.tlab .sum{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf;
  font-size:19px; color:#665c44; margin-top:.5em; letter-spacing:.18em; text-transform:uppercase;}
.tlab:hover .big{filter:brightness(1.35);}
.tlab.core .big{font-size:19px; letter-spacing:.26em;}
.tlab.core .sum{font-size:9px; letter-spacing:.14em;}
.tlab.core .big{text-shadow:0 0 6px #f2ecdf,0 0 6px #f2ecdf,0 0 3px #f2ecdf;}
.mk.coredot{width:auto; gap:0;}
.mk.coredot .dot{box-shadow:0 0 0 3px rgba(111,100,85,0.14);}

/* stars */
.mk{position:absolute; cursor:pointer; user-select:none;
  display:flex; gap:14px; width:330px; align-items:flex-start;}
.mk .dot{border-radius:50%; flex-shrink:0;
  transition:transform .2s ease, box-shadow .4s ease, opacity .4s ease, background .4s ease;}
.mk:hover .dot{transform:scale(1.3);}
.mk .dtext{min-width:0; padding-top:1px;}
.mk .lbl{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf,0 0 3px #f2ecdf;
  font-size:19px; color:#26221d; font-weight:500; line-height:1.3;}
.mk .lbl .seq{font-size:12px; color:#83765b; font-weight:400; margin-right:.5em;}
.mk .ess{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf,0 0 3px #f2ecdf;
  font-size:14px; color:#584f3e; line-height:1.45; margin-top:4px; max-width:290px;
  opacity:0; transition:opacity .3s ease;}
.mk.showess .ess{opacity:1;}
.mk .sims-badge{font-size:12px; color:var(--accent-dim); margin-top:3px; display:none;}
.mk.hasim .sims-badge{display:block;}
.mk.focused .dot{transform:scale(1.35);}
.mk.focused .lbl{color:var(--ink-strong);}
.mk.neighbor .lbl{color:#14110e;}
.mk.dimmed{opacity:.35;}

/* connection overlay — few, directional, labeled plainly */
#tsvg, #astsvg, #flowsvg{position:absolute; top:0; left:0; pointer-events:none; overflow:visible;}
@keyframes dashdrift{to{stroke-dashoffset:-64;}}
.tline{animation:dashdrift 6s linear infinite;}
.tlabel{position:absolute; transform:translate(-50%,-50%); background:var(--ground);
  border:1px solid var(--accent-dim); color:var(--accent); border-radius:12px;
  font-size:12px; letter-spacing:.06em; padding:2px 11px; white-space:nowrap; cursor:pointer;
  pointer-events:auto; transition:background var(--move-fast); text-transform:uppercase;}
.tlabel:hover{background:var(--accent-wash);}

/* ---------- READER ---------- */
#reader{position:fixed; top:0; right:calc(-1 * var(--reader-w) - 20px); width:var(--reader-w);
  height:100%; z-index:45; background:var(--surface-raised);
  border-left:1px solid var(--border); display:flex; flex-direction:column;
  transition:right .3s cubic-bezier(.25,.7,.3,1);
  box-shadow:-24px 0 70px rgba(90,75,50,.18);}
#reader.open{right:0;}
#reader .top{padding:1.5em 2.2em 1em; border-bottom:1px solid var(--border); position:relative;}
#reader .close{position:absolute; top:14px; right:16px; background:none; border:none;
  color:var(--ink-faint); font-size:18px; cursor:pointer;}
#reader .close:hover{color:var(--ink);}
#reader h2{font-size:24px; margin:.45em 0 .3em;}
#reader .terrline{font-size:11.5px; color:var(--ink-faint); margin-top:2px;}
#rbody{flex:1; overflow-y:auto; padding:1.6em 2.2em 2.5em;}
#rbody::-webkit-scrollbar{width:6px;}
#rbody::-webkit-scrollbar-thumb{background:var(--border-strong); border-radius:3px;}
#rbody>*{max-width:66ch;}
.hook{font-size:18.5px; color:var(--ink-strong); line-height:1.65;
  padding-left:1em; border-left:2px solid var(--accent-dim); margin-bottom:1.1em;}
.story{font-size:15.5px; color:#2b2620;}
.typechip{display:inline-block; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink-muted); border:1px solid var(--border-strong); border-radius:3px; padding:1px 8px;}
details.fold{margin:1.2em 0 0; border:1px solid var(--border); border-radius:var(--r); background:var(--surface-sunk);}
details.fold summary{cursor:pointer; padding:.6em 1.05em; color:var(--ink-muted);
  font-size:13px; list-style:none; user-select:none;}
details.fold summary::-webkit-details-marker{display:none;}
details.fold summary::before{content:'+  '; color:var(--accent); font-weight:500;}
details.fold[open] summary::before{content:'−  ';}
details.fold summary:hover{color:var(--ink);}
details.fold .inner{padding:0 1.05em .9em; font-size:14.5px; color:#332e25;}
.named{margin-top:1.5em; background:var(--surface-sunk); border:1px solid var(--border);
  border-radius:8px; padding:1em 1.3em;}
.named .kicker{display:block; margin-bottom:.35em;}
.named b{color:var(--ink-strong); font-weight:600; font-size:16px;}
.named .def{font-size:14.5px; color:#332e25; margin-top:.2em;}
.sowhat{margin-top:1.4em; font-size:15px; color:#2b2620;}
.sowhat .kicker{display:block; margin-bottom:.3em;}
.closure{margin-top:1.5em; border:1px solid var(--accent-dim); border-radius:8px;
  background:var(--accent-wash); padding:1em 1.3em;}
.closure .kicker{color:var(--accent); display:block; margin-bottom:.3em;}
.closure .txt{font-size:14.5px; color:#4a443c; line-height:1.65;}
.linkrow{margin-top:1.6em; border-top:1px solid var(--border); padding-top:1em;
  display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:.6em 2em;}
.lgroup .kicker{display:block; margin-bottom:.25em;}
.lgroup a{display:block; font-size:14px; padding:.2em 0 .45em; color:#332e25; cursor:pointer; text-decoration:none;}
.lgroup a .t{border-bottom:1px dotted transparent; transition:border-color var(--move-fast); color:var(--ink);}
.lgroup a:hover .t{border-bottom-color:var(--accent);}
.lgroup a .why{display:block; font-size:12px; color:var(--ink-faint); line-height:1.5;}
.nextbtn{margin-top:1.8em; width:100%; max-width:66ch; text-align:left;
  background:var(--surface-sunk); border:1px solid var(--border-strong); border-radius:8px;
  color:var(--ink); font-family:var(--font); font-size:14.5px; padding:.9em 1.3em; cursor:pointer;
  transition:all var(--move-fast);}
.nextbtn:hover{border-color:var(--accent-dim); background:var(--accent-wash);}
.nextbtn .k{color:var(--ink-faint); font-size:11px; letter-spacing:.12em; text-transform:uppercase;
  display:block; margin-bottom:.15em;}
.nextbtn .arr{color:var(--accent); float:right;}

/* sim figure */
figure.frame{background:var(--surface-sunk); border:1px solid var(--border); border-radius:var(--r);
  margin:1.3em 0 0; overflow:hidden;}
figure.frame canvas{width:100%; display:block;}
figure.frame .controls{display:flex; gap:8px; padding:8px 12px; border-top:1px solid var(--border);
  align-items:center; flex-wrap:wrap;}
figure.frame .controls .cl{font-size:11.5px; color:var(--ink-faint);}
figure.frame figcaption{padding:7px 13px 10px; font-size:12.5px; color:var(--ink-muted); line-height:1.55;}
.ghost{background:none; border:1px solid var(--border-strong); color:var(--ink-muted);
  font-family:var(--font); font-size:12px; padding:3px 11px; border-radius:var(--r); cursor:pointer;
  transition:all var(--move-fast);}
.ghost:hover{color:var(--ink); border-color:var(--ink-muted);}
.ghost.active{color:var(--accent); border-color:var(--accent-dim); background:var(--accent-wash);}
figure.frame input[type=range]{flex:1; min-width:100px; accent-color:var(--accent);}

@media(max-width:760px){ :root{--reader-w:100vw;} }
</style>
</head>
<body>

<div id="hdr">
  <div>
    <div class="t">Systems Thinking</div>
    <div class="sub">a celestial chart of ideas · follow the flow or wander freely</div>
  </div>
  <div class="spacer"></div>
  <div id="navcluster">
    <button class="hbtn" id="navPrev" title="previous idea">‹</button>
    <button class="hbtn" id="navNext" title="next idea">›</button>
  </div>
  <button class="hbtn" id="overviewBtn">Overview&nbsp;·&nbsp;Esc</button>
</div>

<div id="vp"><div id="world"></div></div>

<div id="reader">
  <div class="top">
    <button class="close" id="rClose">✕</button>
    <span class="typechip" id="rChip"></span>
    <h2 id="rTitle"></h2>
    <div class="terrline" id="rTerr"></div>
  </div>
  <div id="rbody"></div>
</div>

<script>
'use strict';
/* ============================================================
   CONTENT v2 — every idea: hook → story → (sim) → mechanism
   fold → the idea named → where it bites → you can now explain.
   Connections: ≤4 per idea, in three plain buckets.
   ============================================================ */
const N = {

a1:{type:"axiom", title:"The world runs in loops, not lines", x:1259, y:512,
  ess:"Almost nothing is a straight A → B → C. Things loop back, lag, and feed on themselves.",
  hook:"You fixed the problem — and six months later it returned, worse. What if the fix was the cause?",
  story:"We're trained to think in straight lines: this causes that. Systems thinking is the discipline of noticing that reality is woven into loops, delays, and feedback — where B loops back to change A, and the cause you're chasing is often just a symptom of a deeper structure.",
  mech:"Once you see loops instead of lines, the questions change. Not 'what caused this?' but 'what structure keeps producing this pattern over time?'",
  term:"Systems thinking", def:"seeing behavior as the product of interconnected loops, stocks, and delays rather than linear cause and effect.",
  sowhat:"When a problem keeps coming back despite your fixes, stop chasing the immediate cause and look for the loop producing it.",
  builds:[], leads:[["a2","structure over people"],["b1-laplace","the anatomy underneath"]], live:[]},
a2:{type:"axiom", title:"Structure produces behavior", x:1057, y:627,
  ess:"If the same problem returns under every new person in a role, the role's structure is the cause.",
  hook:"You fired the manager. The same dysfunction came back under the next one. So who was really to blame?",
  story:"Meadows' central move: ask not who caused this, but what structure produces this pattern — and would it produce the same pattern no matter who stood in that role? Replace every student and teacher in a school; if the incentives stay, the outcomes stay.",
  mech:"Change the elements but keep the structure and behavior barely moves; change the structure and behavior transforms. This is why 'just replace the people in charge' so often fails.",
  term:"Structure-behavior link", def:"a system's persistent behavior is generated by its structure, not the individuals within it.",
  sowhat:"Before blaming a person, ask if the role itself would defeat anyone. Fix the structure, not the occupant.",
  builds:[], leads:[["a3","what a system is made of"],["b4-process","the trap of blaming people"]], live:[]},
a3:{type:"axiom", title:"Elements, interconnections, purpose", x:1462, y:627,
  ess:"A system is parts, the relationships between them, and a purpose — best read from what it actually does.",
  hook:"A system's mission statement says one thing; its behavior says another. Which one is its real purpose?",
  story:"Meadows: a system is a set of things interconnected so as to produce its own behavior over time. Three parts — elements (the visible bits), interconnections (rules, flows, relationships), and purpose (what it's really for, inferred from what it does, not what it claims).",
  mech:"The interconnections and purpose usually matter far more than the elements. A purpose is revealed by behavior: if a system reliably produces X, producing X is closer to its true purpose than any stated goal.",
  term:"Elements / interconnections / purpose", def:"the three components of any system; the latter two dominate its behavior.",
  sowhat:"To understand any organization, watch what it consistently produces — that reveals its real purpose better than its mission statement.",
  builds:[], leads:[["b1-laplace","the tangible layer: stocks"],["b4-destination","and purpose as leverage"]], live:[]},
a4:{type:"axiom", title:"Ask endogenous first", x:1259, y:771,
  ess:"Before blaming an outside shock, ask whether the system's own feedback produced the behavior.",
  hook:"A recession hits. Was it 'a shock' — or the predictable output of a loop that finally hit its limit?",
  story:"Systems have exogenous inputs (from outside, like sunlight on a forest) and endogenous feedback (generated by their own prior output, like soil depletion from the forest's own growth). Our instinct is to blame an external shock; the discipline is to ask first whether the system explains itself.",
  mech:"A crisis blamed on 'a shock' versus one understood as a debt-fueled reinforcing loop hitting its constraint are different diagnoses — and only the endogenous one tells you how to prevent the next.",
  term:"Endogenous vs exogenous", def:"behavior generated by the system's own feedback versus caused by outside inputs.",
  sowhat:"When something goes wrong, resist the hunt for someone to blame. First ask what in the system's own structure made this likely.",
  builds:[], leads:[["b2-logistic","the feedback that explains it"],["a1","loops, not lines"]], live:[]},

"b1-laplace":{type:"mechanism", title:"Stocks: the nouns", x:404, y:355,
  ess:"A stock is anything that accumulates — measurable at a snapshot in time.",
  hook:"Water in a bathtub, money in an account, trust in a relationship, CO2 in the air — what do they share?",
  story:"A stock is any accumulation you could measure right now: inventory in a warehouse, debt on the books, carbon in the atmosphere. Stocks are the nouns of a system — the things that are there.",
  mech:"Stocks are what we notice and care about, but they can only change through their flows. Understanding a system starts with naming its key stocks.",
  term:"Stock", def:"a quantity that accumulates and can be measured at a single moment.",
  sowhat:"When analyzing any situation, first ask: what's the stock here — the thing building up or draining down? That's what actually matters.",
  builds:[["a3","the visible layer"]], leads:[["b1-pendulum","the verbs that change them"]], live:[]},
"b1-pendulum":{type:"mechanism", title:"Flows: the verbs", x:884, y:309,
  ess:"A flow is the rate of change into or out of a stock — the tap and the drain.",
  hook:"A bathtub has a tap and a drain. Which one sets the water level?",
  story:"A flow is a rate: water in through the tap, out through the drain. Flows are the verbs of a system — the filling and draining, hiring and quitting, borrowing and repaying.",
  mech:"Crucially, a stock changes only because of the difference between its flows, never because of one flow alone. A wide-open drain can still overflow the tub if the tap runs faster.",
  term:"Flow", def:"the rate at which a stock increases or decreases over time.",
  sowhat:"Don't judge a single flow in isolation. The level only moves on the net — inflow minus outflow.",
  builds:[["b1-laplace","flows act on stocks"]], leads:[["b1-sensitive","the net is what counts"]], live:[]},
"b1-sensitive":{type:"mechanism", title:"The stock moves only on the net", sim:"bathtub", x:520, y:522,
  ess:"Level changes on inflow minus outflow — which is why 'reasonable' numbers still overflow.",
  hook:"Tap half-open, drain fully open. Safe? Not if the tap still adds faster than the drain removes.",
  story:"The bathtub is the whole discipline in miniature: the water level rises whenever inflow exceeds outflow, falls when it doesn't, and holds steady only when they match. Each flow can look 'reasonable' alone and still combine into a flood.",
  mech:"This single idea explains a shocking number of confusions, because humans instinctively track flows and forget it's the difference that moves the stock.",
  term:"Net flow", def:"inflow minus outflow; the only thing that changes a stock's level.",
  sowhat:"Whenever two opposing flows are in play, watch the gap between them — not either number on its own.",
  builds:[["b1-pendulum","two flows, one net"]], leads:[["b1-lorenz-story","a famous confusion"]], live:[]},
"b1-lorenz-story":{type:"story", title:"Deficit is not debt", x:254, y:656,
  ess:"The debt (a stock) can rise even while the deficit (a flow) falls — people confuse the two constantly.",
  hook:"'The deficit is shrinking!' Great — so the debt is shrinking too, right? Not even close.",
  story:"Government debt is a stock; the deficit is the yearly flow adding to it. A falling deficit is still a positive inflow — so the debt keeps climbing, just more slowly. People hear 'deficit down' and assume 'debt down,' mixing a flow up with a stock.",
  mech:"Same trap with climate: cutting emissions (the inflow) by half still raises CO2 (the stock) as long as inflow beats natural absorption. Climate is a stock problem masquerading in flow language.",
  term:"Stock-flow confusion", def:"mistaking a change in a flow for a change in the underlying stock.",
  sowhat:"When a number is falling, ask whether it's a flow or a stock. A shrinking inflow can still be filling the tub.",
  builds:[["b1-sensitive","the net, misread"]], leads:[["b1-principle","and why stocks lag"]], live:[]},
"b1-principle":{type:"principle", title:"Stocks give systems memory", x:716, y:679,
  ess:"Flows can change instantly; stocks can't — so systems respond to fixes only after a delay.",
  hook:"You changed the policy today. Why does nothing visibly improve for months?",
  story:"Stocks create memory and inertia. You can flip a flow in an instant — turn the tap — but the stock has to fill or drain before you see the effect. A system's past is stored in its stocks.",
  mech:"This built-in lag is why interventions seem to 'do nothing' at first, and why patience (and delays, coming up) are central to reading systems honestly.",
  term:"System inertia", def:"the resistance and lag created because stocks change only gradually via flows.",
  sowhat:"Expect a gap between a good change and its visible payoff. The stock has to move before results show — don't abandon a fix too early.",
  builds:[["b1-laplace","stocks store the past"]], leads:[["b2-logistic","now: the loops"]], live:[]},

"b2-logistic":{type:"mechanism", title:"Balancing loops seek a goal", sim:"thermostat", x:1837, y:233,
  ess:"Self-correcting loops push a stock toward a target — producing stability, and resistance to change.",
  hook:"Why does your body hold near 37°C, a market price settle, a room return to its set temperature?",
  story:"A balancing (negative) feedback loop resists change and seeks a goal. A thermostat: temperature drops → heater on → temperature rises → heater off. The loop always pushes the stock back toward its target.",
  mech:"Balancing loops make systems stable — and stubborn. They're why so many well-meant interventions get quietly neutralized as the system pushes back. Meadows calls this policy resistance.",
  term:"Balancing feedback", def:"a self-correcting loop that drives a stock toward a goal and resists disturbance.",
  sowhat:"If your fix keeps getting undone, you're probably fighting a balancing loop. Find its goal — that's what you actually have to change.",
  builds:[["a4","feedback explains behavior"]], leads:[["b2-attractors","the other kind of loop"]], live:[]},
"b2-attractors":{type:"mechanism", title:"Reinforcing loops amplify", sim:"reinforcing", x:2069, y:401,
  ess:"They magnify change in whatever direction it's already going — exponential growth, or collapse.",
  hook:"Money earning compound interest, a rumor spreading, a population growing — what's the common engine?",
  story:"A reinforcing (positive) feedback loop amplifies: more money → more interest → even more money; more people know → more tellers → even more know. These loops produce exponential growth or exponential collapse and never stabilize on their own.",
  mech:"Left unchecked, a reinforcing loop always runs to an extreme until it hits some external limit. The 'gain' — how fast it compounds — is a powerful leverage point later.",
  term:"Reinforcing feedback", def:"a loop that amplifies change, producing exponential growth or decline.",
  sowhat:"Spot the reinforcing loops in your life — savings, skills, resentment, debt. They compound quietly, for you or against you.",
  builds:[["a4","feedback explains behavior"]], leads:[["b2-lorenz-attractor","the two, fighting"]], live:[]},
"b2-lorenz-attractor":{type:"mechanism", title:"Which loop dominates", x:2300, y:282,
  ess:"Real systems are both loop types fighting; whichever wins right now sets the visible behavior.",
  hook:"Why does the same disease look 'exponential' in month one and 'under control' in month four?",
  story:"Systems are a tangle of reinforcing and balancing loops pulling against each other. A forest fire spreads by reinforcement (more heat → faster spread) until a balancing limit (fuel runs out, firefighters arrive). An epidemic is reinforcing early, then balancing as susceptibles run low — the same virus, a shifted dominance.",
  mech:"The visible behavior is just a scoreboard of which loop is currently winning. A change in behavior often means a shift in dominance, not a change in the parts.",
  term:"Loop dominance", def:"the currently stronger feedback loop that determines a system's visible behavior.",
  sowhat:"When behavior suddenly shifts, don't assume something new arrived. Ask which loop just took over.",
  builds:[["b2-logistic","balancing"],["b2-attractors","and reinforcing"]], leads:[["b2-tension-random","and the delays between them"]], live:[]},
"b2-tension-random":{type:"mechanism", title:"Delays cause overshoot", sim:"delay", x:2392, y:470,
  ess:"A lag between action and effect makes you overcorrect — and overshoot the target.",

const vp = document.getElementById('vp');
const world = document.getElementById('world');
const reader = document.getElementById('reader');
const WW = 2750, WH = 1750;
let cam = {s:0.12, tx:0, ty:0};
let anim = null;
function apply(){
  world.style.transform = `translate(${cam.tx}px, ${cam.ty}px) scale(${cam.s})`;
  lod();
}
function readerW(){ return reader.classList.contains('open') ? (reader.getBoundingClientRect().width||430) : 0; }
function visW(){ return innerWidth - readerW(); }
function centerOn(cx, cy, s){
  cam.s = s;
  cam.tx = visW()/2 - cx*s;
  cam.ty = innerHeight/2 - cy*s;
  apply();
}
function flyTo(cx, cy, s, dur=700){
  if (anim) cancelAnimationFrame(anim);
  const s0=cam.s, cx0=(visW()/2-cam.tx)/s0, cy0=(innerHeight/2-cam.ty)/s0;
  const ls0=Math.log(s0), ls1=Math.log(s);
  const t0=performance.now();
  function step(t){
    let p=Math.min(1,(t-t0)/dur);
    p = p<.5 ? 4*p*p*p : 1-Math.pow(-2*p+2,3)/2;
    centerOn(cx0+(cx-cx0)*p, cy0+(cy-cy0)*p, Math.exp(ls0+(ls1-ls0)*p));
    if (p<1) anim=requestAnimationFrame(step);
  }
  anim=requestAnimationFrame(step);
}
function overviewCam(fly=true){
  const cx=BC.x, cy=BC.y;
  const s = Math.min(visW()/(2*Math.max(cx,WW-cx)), innerHeight/(2*Math.max(cy,WH-cy)))*0.92;
  if (fly) flyTo(cx, cy, s, 800); else centerOn(cx, cy, s);
}
vp.addEventListener('wheel', e=>{
  e.preventDefault();
  if (anim) cancelAnimationFrame(anim);
  const f = Math.exp(-e.deltaY*0.0016);
  const s2 = Math.min(2.2, Math.max(0.06, cam.s*f));
  const wx=(e.clientX-cam.tx)/cam.s, wy=(e.clientY-cam.ty)/cam.s;
  cam.s=s2; cam.tx=e.clientX-wx*s2; cam.ty=e.clientY-wy*s2;
  apply();
}, {passive:false});
const ptrs = new Map();
let panStart=null, pinchStart=null, moved=0;
vp.addEventListener('pointerdown', e=>{
  if (e.target.closest('.tlabel')) return;
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (ptrs.size===1){
    moved=0;
    panStart={mx:e.clientX, my:e.clientY, tx:cam.tx, ty:cam.ty};
    vp.classList.add('dragging');
  } else if (ptrs.size===2){
    const [p1,p2]=[...ptrs.values()];
    pinchStart={d:Math.hypot(p1.x-p2.x,p1.y-p2.y), s:cam.s,
      wx:((p1.x+p2.x)/2-cam.tx)/cam.s, wy:((p1.y+p2.y)/2-cam.ty)/cam.s};
    panStart=null;
  }
});
addEventListener('pointermove', e=>{
  if (!ptrs.has(e.pointerId)) return;
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (ptrs.size===1 && panStart){
    if (anim) cancelAnimationFrame(anim);
    moved += Math.abs(e.movementX||0)+Math.abs(e.movementY||0);
    cam.tx = panStart.tx + (e.clientX-panStart.mx);
    cam.ty = panStart.ty + (e.clientY-panStart.my);
    apply();
  } else if (ptrs.size===2 && pinchStart){
    if (anim) cancelAnimationFrame(anim);
    const [p1,p2]=[...ptrs.values()];
    const d=Math.hypot(p1.x-p2.x,p1.y-p2.y);
    const s2=Math.min(2.2, Math.max(0.06, pinchStart.s*d/pinchStart.d));
    const cx=(p1.x+p2.x)/2, cy=(p1.y+p2.y)/2;
    cam.s=s2; cam.tx=cx-pinchStart.wx*s2; cam.ty=cy-pinchStart.wy*s2;
    apply();
  }
});
function ptrUp(e){ ptrs.delete(e.pointerId);
  if (ptrs.size<2) pinchStart=null;
  if (ptrs.size===0){ panStart=null; vp.classList.remove('dragging'); } }
addEventListener('pointerup', ptrUp);

  clearHighlight();

    ...n.builds.map(([t])=>({t, lab:'builds on', into:true})),

    ...n.live.map(([t])=>({t, lab:'see it live', into:false}))
  ];

    mkEls[x].classList.toggle('dimmed', !nb.has(x));
    mkEls[x].classList.toggle('neighbor', nb.has(x) && x!==id);
    mkEls[x].classList.toggle('focused', x===id);
  });
  const here = dotCenter(id);
  conns.forEach(c=>{
    const there = dotCenter(c.t);
    let from = c.into ? {...there} : {...here};
    let to   = c.into ? {...here} : {...there};
    {
      const ddx=to.x-from.x, ddy=to.y-from.y, LL=Math.hypot(ddx,ddy)||1;
      const ux=ddx/LL, uy=ddy/LL, off=30;
      from = {x:from.x+ux*off, y:from.y+uy*off};
      to   = {x:to.x-ux*off,   y:to.y-uy*off};
    }
    const dx=to.x-from.x, dy=to.y-from.y, dist=Math.hypot(dx,dy)||1;
    const cx=(from.x+to.x)/2 - dy/dist*dist*0.12, cy=(from.y+to.y)/2 + dx/dist*dist*0.12;
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M ${from.x} ${from.y} Q ${cx} ${cy} ${to.x} ${to.y}`);
    p.setAttribute('fill','none');
    p.setAttribute('stroke','rgba(150,112,47,0.45)');
    p.setAttribute('stroke-width','2.5');
    p.setAttribute('stroke-dasharray','9,8');
    p.setAttribute('class','tline');
    p.setAttribute('marker-end','url(#arr)');
    tsvg.appendChild(p);

    lbl.style.left = (.25*from.x+.5*cx+.25*to.x)+'px';
    lbl.style.top = (.25*from.y+.5*cy+.25*to.y)+'px';
    lbl.textContent = c.lab;
    lbl.addEventListener('click', e=>{ e.stopPropagation(); openIdea(c.t); });
    world.appendChild(lbl);
    tlabels.push(lbl);
  });

function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0;

const SIMS = {};

function wrapText(ctx, text, x, y, maxW, lh){
  const words=text.split(' '); let line='', yy=y;
  for(const w of words){ const t=line?line+' '+w:w;
    if(ctx.measureText(t).width>maxW && line){ ctx.fillText(line,x,yy); line=w; yy+=lh; }
    else line=t; }
  if(line) ctx.fillText(line,x,yy); return yy;
}

SIMS.bathtub = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=380;
  const ctx=cv.getContext('2d'); const W=700,H=380;
  let tap=6, drain=3, level=40, raf;
  const tubX=250, tubY=110, tubW=200, tubH=200;
  function frame(){
    const net=(tap-drain);
    level += net*0.15;
    let overflow=false;
    if(level>100){ level=100; overflow=true; }
    if(level<0) level=0;
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    // tub
    ctx.strokeStyle=BRD; ctx.lineWidth=3; ctx.strokeRect(tubX,tubY,tubW,tubH);
    // water
    const wh=tubH*level/100;
    ctx.fillStyle= overflow?'rgba(138,92,92,0.5)':'rgba(74,102,132,0.45)';
    ctx.fillRect(tubX+2,tubY+tubH-wh, tubW-4, wh);
    // tap
    ctx.fillStyle=AMBER; ctx.fillRect(tubX+40,tubY-30,10,30);
    for(let k=0;k<tap;k++){ ctx.fillStyle='rgba(74,102,132,0.6)'; ctx.fillRect(tubX+44, tubY-30+ (Date.now()/40+k*12)%(tubH*level/100+30), 2,6); }
    ctx.fillStyle=INKC; ctx.font='12px Inter, sans-serif'; ctx.fillText("tap (inflow) "+tap, tubX+56, tubY-14);
    // drain
    ctx.fillStyle=GRAY; ctx.fillText("drain (outflow) "+drain, tubX+56, tubY+tubH+18);
    ctx.fillStyle=INKC; ctx.font='15px Inter, sans-serif';
    ctx.fillText("water level (the stock): "+Math.round(level), tubX-30, tubY+tubH+44);
    ctx.fillStyle= net>0?'#8a5c5c':(net<0?GRAY:AMBER); ctx.font='13px Inter, sans-serif';
    ctx.fillText("net flow: "+(net>0?'+':'')+net+(net>0?' — filling'+(overflow?' (OVERFLOW)':''):net<0?' — draining':' — steady'), tubX-30, tubY+tubH+64);
    ctx.fillStyle=GRAY; ctx.font='12px Inter, sans-serif';
    wrapText(ctx,"The level moves only on the difference. A wide-open drain still overflows the tub if the tap runs faster.",30,40,W-60,18);
    raf=requestAnimationFrame(frame);
  }
  raf=requestAnimationFrame(frame);
  fig.querySelector('#tap').oninput=e=>tap=+e.target.value;
  fig.querySelector('#drain').oninput=e=>drain=+e.target.value;
  return ()=>cancelAnimationFrame(raf);
};

SIMS.thermostat = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=380;
  const ctx=cv.getContext('2d'); const W=700,H=380;
  const target=21; let temp=21, hist=[], raf, heating=false;
  function frame(){
    heating = temp < target-0.2;
    if(temp<target) temp += (target-temp)*0.04 + 0.05;
    else temp += (target-temp)*0.04;
    temp += (Math.random()-0.5)*0.05;
    hist.push(temp); if(hist.length>400) hist.shift();
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    const px=50, py=50, pw=W-90, ph=H-120;
    const Y=t=>py+ph*(1-(t-15)/12);
    ctx.strokeStyle=AMBER; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(px,Y(target)); ctx.lineTo(px+pw,Y(target)); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=AMBER; ctx.font='12px Inter, sans-serif'; ctx.fillText("target 21°C", px+pw-80, Y(target)-6);
    ctx.strokeStyle=GRAY; ctx.lineWidth=2; ctx.beginPath();
    hist.forEach((t,i)=>{ const x=px+pw*i/400; i?ctx.lineTo(x,Y(t)):ctx.moveTo(x,Y(t)); }); ctx.stroke();
    ctx.fillStyle=INKC; ctx.font='15px Inter, sans-serif';
    ctx.fillText("room: "+temp.toFixed(1)+"°C   heater: "+(heating?"ON":"off"), px, py-16);
    ctx.fillStyle=GRAY; ctx.font='12px Inter, sans-serif';
    wrapText(ctx,"The balancing loop always hauls the stock back to its goal. Open a window (disturb it) and watch it self-correct — the same resistance your interventions will meet.",30,H-40,W-60,18);
    raf=requestAnimationFrame(frame);
  }
  raf=requestAnimationFrame(frame);
  fig.querySelector('.ghost').onclick=()=>{ temp -= 6; };
  return ()=>cancelAnimationFrame(raf);
};

SIMS.reinforcing = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=380;
  const ctx=cv.getContext('2d'); const W=700,H=380; let mode="grow", raf, t=0;
  function frame(){
    t=Math.min(100,t+0.6);
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    const px=50, py=40, pw=W-90, ph=H-100;
    const X=i=>px+pw*i/100;
    const f = mode==="grow" ? (i=>Math.pow(1.045,i)) : (i=>100*Math.pow(0.955,i));
    let mx = mode==="grow" ? f(100) : 100;
    const Y=v=> py+ph*(1 - v/mx);
    ctx.strokeStyle=BRD; ctx.beginPath(); ctx.moveTo(px,py+ph); ctx.lineTo(px+pw,py+ph); ctx.stroke();
    ctx.strokeStyle=AMBER; ctx.lineWidth=2.5; ctx.beginPath();
    for(let i=0;i<=t;i+=1){ i?ctx.lineTo(X(i),Y(f(i))):ctx.moveTo(X(i),Y(f(i))); } ctx.stroke();
    ctx.fillStyle=INKC; ctx.font='15px Inter, sans-serif';
    ctx.fillText(mode==="grow"?"more → more → even more (exponential growth)":"less → less → even less (exponential collapse)", px, py-14);
    ctx.fillStyle=GRAY; ctx.font='12px Inter, sans-serif';
    wrapText(ctx,"A reinforcing loop never stabilizes on its own — it runs to an extreme until it hits an outside limit.",30,H-40,W-60,18);
    if(t<100) raf=requestAnimationFrame(frame);
  }
  raf=requestAnimationFrame(frame);
  fig.querySelectorAll('.ghost').forEach(b=>b.onclick=()=>{
    fig.querySelectorAll('.ghost').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); mode=b.dataset.m; t=0; cancelAnimationFrame(raf); raf=requestAnimationFrame(frame); });
  return ()=>cancelAnimationFrame(raf);
};

SIMS.delay = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=380;
  const ctx=cv.getContext('2d'); const W=700,H=380; let delay=2;
  function draw(){
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    const px=50, py=50, pw=W-90, ph=H-120, target=0;
    const Y=v=>py+ph/2 - v*ph*0.4;
    ctx.strokeStyle=AMBER; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(px,Y(0)); ctx.lineTo(px+pw,Y(0)); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=AMBER; ctx.font='12px Inter, sans-serif'; ctx.fillText("target temperature", px+pw-120, Y(0)-6);
    // simulate a person correcting a delayed system
    const N=160; let state=-1, hist=[]; const buf=[];
    let gain=0.5;
    for(let i=0;i<N;i++){
      const perceived = buf.length>delay ? buf[buf.length-1-delay] : -1;
      const action = -perceived*gain;
      state += action*0.5;
      buf.push(state); hist.push(state);
    }
    ctx.strokeStyle=GRAY; ctx.lineWidth=2; ctx.beginPath();
    hist.forEach((v,i)=>{ const x=px+pw*i/N; i?ctx.lineTo(x,Y(v)):ctx.moveTo(x,Y(v)); }); ctx.stroke();
    ctx.fillStyle=INKC; ctx.font='15px Inter, sans-serif';
    ctx.fillText("delay = "+delay+(delay<=2?"  → settles smoothly":delay<=6?"  → oscillates":"  → wild overshoot"), px, py-16);
    ctx.fillStyle=GRAY; ctx.font='12px Inter, sans-serif';
    wrapText(ctx,"You keep correcting because you see no result yet — and by the time the delayed effects land, you've pushed far past the target.",30,H-40,W-60,18);
  }
  draw(); fig.querySelector('input').oninput=e=>{ delay=+e.target.value; draw(); }; return ()=>{};
};

SIMS.tipping = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=380;
  const ctx=cv.getContext('2d'); const W=700,H=380; let load=20;
  const thr=70;
  function state(x){ // nonlinear: flat, then sharp flip near threshold
    return 1/(1+Math.exp(-(x-thr)/3));
  }
  function draw(){
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    const px=50, py=50, pw=W-90, ph=H-130;
    const X=x=>px+pw*x/100, Y=v=>py+ph*(1-v);
    ctx.strokeStyle=BRD; ctx.beginPath(); ctx.moveTo(px,py+ph); ctx.lineTo(px+pw,py+ph); ctx.stroke();
    ctx.fillStyle=FAINT; ctx.font='12px Inter, sans-serif'; ctx.fillText("pollution load →", px+pw-110, py+ph+20);
    ctx.save(); ctx.translate(px-8, py+40); ctx.rotate(-Math.PI/2); ctx.fillText("lake health (0 = dead)", 0,0); ctx.restore();
    ctx.strokeStyle=GRAY; ctx.lineWidth=2.5; ctx.beginPath();
    for(let x=0;x<=100;x+=1){ const v=1-state(x); x===0?ctx.moveTo(X(x),Y(v)):ctx.lineTo(X(x),Y(v)); } ctx.stroke();
    const v=1-state(load);
    ctx.strokeStyle=INKC; ctx.setLineDash([3,3]); ctx.beginPath(); ctx.moveTo(X(load),py); ctx.lineTo(X(load),py+ph); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle= v>0.5?'rgba(79,112,80,0.9)':'#8a5c5c'; ctx.beginPath(); ctx.arc(X(load),Y(v),6,0,7); ctx.fill();
    ctx.fillStyle=INKC; ctx.font='15px Inter, sans-serif';
    ctx.fillText(load<thr-8?"Load "+load+" — clear. Decades of this look identical.":load<thr+4?"Load "+load+" — at the threshold. About to flip…":"Load "+load+" — flipped: algae-choked, almost overnight.", 40, H-42);
    ctx.fillStyle=GRAY; ctx.font='12px Inter, sans-serif';
    wrapText(ctx,"Linear extrapolation from the flat part is exactly the wrong tool near a tipping point — 'fine so far' predicts nothing.",40,H-20,W-80,18);
  }
  draw(); fig.querySelector('input').oninput=e=>{ load=+e.target.value; draw(); }; return ()=>{};
};

SIMS.leverage = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=400;
  const ctx=cv.getContext('2d'); const W=700,H=400; let sel=12;
  const rungs=[
    [12,"Numbers — taxes, subsidies, standards","Feels big, changes little. Where nearly all debate happens."],
    [6,"Information flows — who knows what","Cheap and strong: restoring a missing feedback loop shifts behavior."],
    [5,"Rules — incentives, constraints","The rules shape every move within the game, more than any single move."],
    [2,"Paradigm — the shared mindset","The deepest lever: goals and rules all descend from it. Resisted hardest."]];
  const power={12:0.12,6:0.55,5:0.7,2:0.95};
  function draw(){
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    ctx.fillStyle=FAINT; ctx.font='12px Inter, sans-serif';
    ctx.fillText("weak", 40, 60); ctx.fillText("strong", 40, H-70);
    // ladder
    const x=90, top=60, bot=H-70, n=rungs.length;
    rungs.forEach((r,i)=>{
      const y=top + (bot-top)*i/(n-1);
      const on = r[0]===sel;
      ctx.strokeStyle= on?AMBER:BRD; ctx.lineWidth= on?3:1.5;
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+40,y); ctx.stroke();
      ctx.fillStyle= on?AMBER:GRAY; ctx.beginPath(); ctx.arc(x,y,on?7:5,0,7); ctx.fill();
      ctx.fillStyle= on?INKC:GRAY; ctx.font=on?'15px Inter, sans-serif':'13px Inter, sans-serif';
      ctx.fillText("#"+r[0]+"  "+r[1], x+56, y+5);
    });
    const r=rungs.find(z=>z[0]===sel);
    // power bar
    const by=H-40;
    ctx.fillStyle=BRD; ctx.fillRect(90, by, W-180, 14);
    ctx.fillStyle=AMBER; ctx.fillRect(90, by, (W-180)*power[sel], 14);
    ctx.fillStyle=INKC; ctx.font='13px Inter, sans-serif';
    wrapText(ctx, r[2], 90, by-16, W-180, 18);
  }
  draw();
  fig.querySelectorAll('.ghost').forEach(b=>b.onclick=()=>{
    fig.querySelectorAll('.ghost').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); sel=+b.dataset.l; draw(); });
  return ()=>{};
};
