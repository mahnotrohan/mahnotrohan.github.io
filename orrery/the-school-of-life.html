<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The School of Life — Orrery</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
:root{
  --ground:#f2ecdf; --surface-sunk:#ece4d2; --surface-raised:#faf6ec;
  --border:#ddd2bc; --border-strong:#c9bda1;
  --ink:#26221d; --ink-strong:#14110e; --ink-muted:#5b5343; --ink-faint:#83765b;
  --accent:#96702f; --accent-dim:#b08d4f; --accent-wash:rgba(150,112,47,0.08);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --r:4px; --reader-w:min(760px, 58vw); --move-fast:150ms ease;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%; overflow:hidden; background:var(--ground); color:var(--ink);
  font-family:var(--font); font-size:15.5px; line-height:1.75; overscroll-behavior:none;}
h1,h2,h3{color:var(--ink-strong); font-weight:600; line-height:1.3;}
.kicker{font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink-muted); font-weight:500;}

/* header — all navigation lives top right */
#hdr{position:fixed; top:0; left:0; right:0; z-index:40; height:56px;
  display:flex; align-items:center; gap:1.1rem; padding:0 1.4rem;
  background:linear-gradient(180deg, rgba(242,236,223,.96), rgba(242,236,223,.75), transparent);
  pointer-events:none; transition:right .3s cubic-bezier(.25,.7,.3,1);}
body.reader-open #hdr{right:var(--reader-w);}
#hdr>*{pointer-events:auto;}
#hdr .t{font-size:15px; font-weight:600; color:var(--ink-strong);}
#hdr .sub{font-size:11.5px; color:var(--ink-muted);}
#hdr .spacer{flex:1;}
#count{font-size:12px; color:var(--ink-faint); white-space:nowrap;}
.hbtn{background:rgba(250,246,236,.92); border:1px solid var(--border-strong); color:var(--ink-muted);
  font-family:var(--font); font-size:12.5px; padding:6px 13px; border-radius:var(--r); cursor:pointer;
  transition:all var(--move-fast); white-space:nowrap;}
.hbtn:hover{color:var(--ink); border-color:var(--ink-muted);}
.hbtn:disabled{opacity:.35; cursor:default;}
#navcluster{display:flex; align-items:center; gap:10px; opacity:0; pointer-events:none; transition:opacity .2s ease;
  background:rgba(37,37,37,.92); border:1px solid var(--border-strong); border-radius:8px; padding:3px 6px;}
#navcluster.on{opacity:1; pointer-events:auto;}
#navcluster .hbtn{background:none; border:none; font-size:24px; font-weight:300; color:var(--ink-faint); padding:0 6px; line-height:1;}
#navcluster .hbtn:hover{color:var(--ink-muted);}
#navcluster .hbtn:disabled{opacity:.25;}

/* viewport & sky */
#vp{position:fixed; inset:0; cursor:grab; touch-action:none;
  background:radial-gradient(ellipse at 50% 40%, #f6f1e4 0%, #f2ecdf 55%, #e9e0cb 100%);}
#vp.dragging{cursor:grabbing;}
#vp.dragging, #vp.dragging *{user-select:none;}
#world{position:absolute; top:0; left:0; width:2750px; height:1750px;
  transform-origin:0 0; will-change:transform;}
#world::before{content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(circle, rgba(110,95,65,.14) 1.2px, transparent 1.2px),
                   radial-gradient(circle, rgba(110,95,65,.08) 1px, transparent 1px);
  background-size:380px 380px, 150px 150px;
  background-position:0 0, 70px 100px; opacity:.8;}

/* constellation names */
.tlab{position:absolute; pointer-events:auto; cursor:pointer; user-select:none; text-align:center;}
.tlab .big{font-size:40px; font-weight:500; letter-spacing:.5em; line-height:1.3;
  text-transform:uppercase; white-space:nowrap;}
.tlab .sum{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf;
  font-size:19px; color:#665c44; margin-top:.5em; letter-spacing:.18em; text-transform:uppercase;}
.tlab:hover .big{filter:brightness(1.35);}

/* stars */
.mk{position:absolute; cursor:pointer; user-select:none;
  display:flex; gap:14px; width:330px; align-items:flex-start;}
.mk .dot{border-radius:50%; flex-shrink:0;
  transition:transform .2s ease, box-shadow .4s ease, opacity .4s ease, background .4s ease;}
.mk:hover .dot{transform:scale(1.3);}
.mk .dtext{min-width:0; padding-top:1px;}
.mk .lbl{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf,0 0 3px #f2ecdf;
  font-size:19px; color:#26221d; font-weight:500; line-height:1.3;}
.mk .lbl .seq{font-size:12px; color:#83765b; font-weight:400; margin-right:.5em;}
.mk .ess{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf,0 0 3px #f2ecdf;
  font-size:14px; color:#584f3e; line-height:1.45; margin-top:4px; max-width:290px;
  opacity:0; transition:opacity .3s ease;}
.mk.showess .ess{opacity:1;}
.mk .sims-badge{font-size:12px; color:var(--accent-dim); margin-top:3px; display:none;}
.mk.hasim .sims-badge{display:block;}
.mk.focused .dot{transform:scale(1.35);}
.mk.focused .lbl{color:var(--ink-strong);}
.mk.neighbor .lbl{color:#14110e;}
.mk.dimmed{opacity:.35;}

/* connection overlay — few, directional, labeled plainly */
#tsvg, #astsvg, #flowsvg{position:absolute; top:0; left:0; pointer-events:none; overflow:visible;}
@keyframes dashdrift{to{stroke-dashoffset:-64;}}
.tline{animation:dashdrift 6s linear infinite;}
.tlabel{position:absolute; transform:translate(-50%,-50%); background:var(--ground);
  border:1px solid var(--accent-dim); color:var(--accent); border-radius:12px;
  font-size:12px; letter-spacing:.06em; padding:2px 11px; white-space:nowrap; cursor:pointer;
  pointer-events:auto; transition:background var(--move-fast); text-transform:uppercase;}
.tlabel:hover{background:var(--accent-wash);}

/* ---------- READER ---------- */
#reader{position:fixed; top:0; right:calc(-1 * var(--reader-w) - 20px); width:var(--reader-w);
  height:100%; z-index:45; background:var(--surface-raised);
  border-left:1px solid var(--border); display:flex; flex-direction:column;
  transition:right .3s cubic-bezier(.25,.7,.3,1);
  box-shadow:-24px 0 70px rgba(90,75,50,.18);}
#reader.open{right:0;}
#reader .top{padding:1.5em 2.2em 1em; border-bottom:1px solid var(--border); position:relative;}
#reader .close{position:absolute; top:14px; right:16px; background:none; border:none;
  color:var(--ink-faint); font-size:18px; cursor:pointer;}
#reader .close:hover{color:var(--ink);}
#reader h2{font-size:24px; margin:.45em 0 .3em;}
#reader .terrline{font-size:11.5px; color:var(--ink-faint); margin-top:2px;}
#rbody{flex:1; overflow-y:auto; padding:1.6em 2.2em 2.5em;}
#rbody::-webkit-scrollbar{width:6px;}
#rbody::-webkit-scrollbar-thumb{background:var(--border-strong); border-radius:3px;}
#rbody>*{max-width:66ch;}
.hook{font-size:18.5px; color:var(--ink-strong); line-height:1.65;
  padding-left:1em; border-left:2px solid var(--accent-dim); margin-bottom:1.1em;}
.story{font-size:15.5px; color:#2b2620;}
.typechip{display:inline-block; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink-muted); border:1px solid var(--border-strong); border-radius:3px; padding:1px 8px;}
details.fold{margin:1.2em 0 0; border:1px solid var(--border); border-radius:var(--r); background:var(--surface-sunk);}
details.fold summary{cursor:pointer; padding:.6em 1.05em; color:var(--ink-muted);
  font-size:13px; list-style:none; user-select:none;}
details.fold summary::-webkit-details-marker{display:none;}
details.fold summary::before{content:'+  '; color:var(--accent); font-weight:500;}
details.fold[open] summary::before{content:'−  ';}
details.fold summary:hover{color:var(--ink);}
details.fold .inner{padding:0 1.05em .9em; font-size:14.5px; color:#332e25;}
.named{margin-top:1.5em; background:var(--surface-sunk); border:1px solid var(--border);
  border-radius:8px; padding:1em 1.3em;}
.named .kicker{display:block; margin-bottom:.35em;}
.named b{color:var(--ink-strong); font-weight:600; font-size:16px;}
.named .def{font-size:14.5px; color:#332e25; margin-top:.2em;}
.sowhat{margin-top:1.4em; font-size:15px; color:#2b2620;}
.sowhat .kicker{display:block; margin-bottom:.3em;}
.closure{margin-top:1.5em; border:1px solid var(--accent-dim); border-radius:8px;
  background:var(--accent-wash); padding:1em 1.3em;}
.closure .kicker{color:var(--accent); display:block; margin-bottom:.3em;}
.closure .txt{font-size:14.5px; color:#4a443c; line-height:1.65;}
.linkrow{margin-top:1.6em; border-top:1px solid var(--border); padding-top:1em;
  display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:.6em 2em;}
.lgroup .kicker{display:block; margin-bottom:.25em;}
.lgroup a{display:block; font-size:14px; padding:.2em 0 .45em; color:#332e25; cursor:pointer; text-decoration:none;}
.lgroup a .t{border-bottom:1px dotted transparent; transition:border-color var(--move-fast); color:var(--ink);}
.lgroup a:hover .t{border-bottom-color:var(--accent);}
.lgroup a .why{display:block; font-size:12px; color:var(--ink-faint); line-height:1.5;}
.nextbtn{margin-top:1.8em; width:100%; max-width:66ch; text-align:left;
  background:var(--surface-sunk); border:1px solid var(--border-strong); border-radius:8px;
  color:var(--ink); font-family:var(--font); font-size:14.5px; padding:.9em 1.3em; cursor:pointer;
  transition:all var(--move-fast);}
.nextbtn:hover{border-color:var(--accent-dim); background:var(--accent-wash);}
.nextbtn .k{color:var(--ink-faint); font-size:11px; letter-spacing:.12em; text-transform:uppercase;
  display:block; margin-bottom:.15em;}
.nextbtn .arr{color:var(--accent); float:right;}

/* sim figure */
figure.frame{background:var(--surface-sunk); border:1px solid var(--border); border-radius:var(--r);
  margin:1.3em 0 0; overflow:hidden;}
figure.frame canvas{width:100%; display:block;}
figure.frame .controls{display:flex; gap:8px; padding:8px 12px; border-top:1px solid var(--border);
  align-items:center; flex-wrap:wrap;}
figure.frame .controls .cl{font-size:11.5px; color:var(--ink-faint);}
figure.frame figcaption{padding:7px 13px 10px; font-size:12.5px; color:var(--ink-muted); line-height:1.55;}
.ghost{background:none; border:1px solid var(--border-strong); color:var(--ink-muted);
  font-family:var(--font); font-size:12px; padding:3px 11px; border-radius:var(--r); cursor:pointer;
  transition:all var(--move-fast);}
.ghost:hover{color:var(--ink); border-color:var(--ink-muted);}
.ghost.active{color:var(--accent); border-color:var(--accent-dim); background:var(--accent-wash);}
figure.frame input[type=range]{flex:1; min-width:100px; accent-color:var(--accent);}

@media(max-width:760px){ :root{--reader-w:100vw;} }
</style>
</head>
<body>

<div id="hdr">
  <div>
    <div class="t">The School of Life</div>
    <div class="sub">a celestial chart of ideas · follow the flow or wander freely</div>
  </div>
  <div class="spacer"></div>
  <div id="navcluster">
    <button class="hbtn" id="navPrev" title="previous idea">‹</button>
    <button class="hbtn" id="navNext" title="next idea">›</button>
  </div>
  <button class="hbtn" id="overviewBtn">Overview&nbsp;·&nbsp;Esc</button>
</div>

<div id="vp"><div id="world"></div></div>

<div id="reader">
  <div class="top">
    <button class="close" id="rClose">✕</button>
    <span class="typechip" id="rChip"></span>
    <h2 id="rTitle"></h2>
    <div class="terrline" id="rTerr"></div>
  </div>
  <div id="rbody"></div>
</div>

<script>
'use strict';
/* ============================================================
   CONTENT v2 — every idea: hook → story → (sim) → mechanism
   fold → the idea named → where it bites → you can now explain.
   Connections: ≤4 per idea, in three plain buckets.
   ============================================================ */
const N = {

a1:{type:"axiom", title:"No one taught us how to live", x:1259, y:512,
  ess:"We're schooled in maths and grammar but never in how to feel, love, or cope.",
  hook:"You spent years on trigonometry. How many hours were you taught on handling anxiety, or choosing a partner?",
  story:"We assume emotional wisdom arrives on its own with age. The School of Life's founding claim is that it doesn't — the most important skills of living are simply never taught, so most of us improvise badly.",
  mech:"If living well is a set of learnable skills we were never given, then our struggles aren't personal failings but gaps in an education no one provided. That reframing is the whole starting point.",
  term:"Emotional education", def:"the missing curriculum of self-knowledge, relationships, and coping we were never formally taught.",
  sowhat:"Your emotional messes may be less about being broken and more about never having been taught the skills. They can be learned now.",
  builds:[], leads:[["b1-laplace","the missing curriculum"],["b1-principle","and what maturity really is"]], live:[]},
a2:{type:"axiom", title:"We are all a bit broken", x:1057, y:627,
  ess:"Everyone is anxious, confused, and flawed underneath. It's the normal condition, not a defect.",
  hook:"What if the calm, sorted people you envy are, up close, just as much of a mess as you?",
  story:"We compare our chaotic insides to everyone else's composed outsides and conclude we're uniquely damaged. In truth, imperfection is universal — the human default, shared by all, including the people we admire.",
  mech:"Accepting universal brokenness dissolves the shame of being flawed and the loneliness of thinking you're the only one. It's the ground for compassion — toward yourself and everyone else.",
  term:"Universal brokenness", def:"the recognition that emotional flaw and confusion are the shared human norm.",
  sowhat:"You're not uniquely broken — you're normally broken. That single fact can lift an enormous, invisible weight.",
  builds:[], leads:[["b1-sensitive","we're all still children"],["b4-fence","so be kind to the broken"]], live:[]},
a3:{type:"axiom", title:"Childhood is still running us", x:1462, y:627,
  ess:"How we love, fear, and react was largely scripted long ago — and we've forgotten the script.",
  hook:"Why do you keep reacting to a partner or boss with a feeling that seems far too big for the moment?",
  story:"The patterns laid down in childhood — how love felt, what we feared, how we were soothed or hurt — become templates we replay for decades, mistaking old reflexes for present-day truth.",
  mech:"Because the origins are hidden, the reactions feel like simple facts about now. Tracing a disproportionate feeling back to its childhood template is how it loosens its grip.",
  term:"Emotional inheritance", def:"the childhood templates that unconsciously shape how we relate as adults.",
  sowhat:"When a reaction feels too big for its trigger, it's usually old. Ask what childhood scene it's really replaying.",
  builds:[], leads:[["b2-attractors","why we pick who we pick"],["a4","and how to loosen it"]], live:[]},
a4:{type:"axiom", title:"Self-knowledge sets you free", x:1259, y:771,
  ess:"You can't stop a pattern you can't see. Naming it is the first loosening.",
  hook:"Can you change a habit you don't know you have? So what has to come first?",
  story:"The School of Life's route to freedom isn't willpower but insight: understanding why we do what we do robs our automatic patterns of their power. What is understood no longer runs us blindly.",
  mech:"Awareness inserts a pause between trigger and reaction where choice can live. Self-knowledge doesn't erase our flaws — it lets us hold them consciously rather than be driven by them.",
  term:"Self-knowledge", def:"understanding one's own emotional patterns and their origins, as the basis for change.",
  sowhat:"Insight, not self-discipline, is the lever. Understand the pattern and it stops being your autopilot.",
  builds:[], leads:[["b1-principle","maturity as self-knowledge"],["b4-destination","and self-compassion"]], live:[]},

"b1-laplace":{type:"mechanism", title:"The missing curriculum", x:404, y:355,
  ess:"The skills we most need to live well are precisely the ones school skips.",
  hook:"If you designed a school for living, what would be on the timetable that yours never had?",
  story:"Handling anxiety, choosing a partner, communicating anger, finding meaningful work, facing mortality — these are the load-bearing skills of a life, and almost no formal education touches them.",
  mech:"We're left to pick them up by accident, from families who often didn't have them either. The gap explains why so many capable, educated people feel quietly lost.",
  term:"The curriculum of living", def:"the emotional and practical life-skills absent from conventional education.",
  sowhat:"Treat the hard parts of life as subjects you can actually study, not mysteries you're supposed to just know.",
  builds:[["a1","emotional education, spelled out"]], leads:[["b1-pendulum","starting with emotional intelligence"]], live:[]},
"b1-pendulum":{type:"mechanism", title:"Emotional intelligence", x:884, y:309,
  ess:"The core skill: understanding and working with feelings — yours and others'.",
  hook:"We call people 'smart' for solving equations. Why not for handling a grieving friend or their own rage?",
  story:"Emotional intelligence — naming what you feel, sensing what others feel, and responding wisely — predicts a good life far better than raw cleverness. It's a competence, and like any, it can be developed.",
  mech:"It's built from self-awareness and imagination about others' inner states. The School of Life treats it as the master life-skill on which relationships, work, and calm all depend.",
  term:"Emotional intelligence", def:"the learnable skill of understanding and managing emotions in oneself and others.",
  sowhat:"Cleverness got you through school; emotional intelligence gets you through life. It's worth deliberate practice.",
  builds:[["a1","the heart of the missing curriculum"]], leads:[["b1-sensitive","admitting our immaturity"]], live:[]},
"b1-sensitive":{type:"mechanism", title:"We're all still children", x:520, y:522,
  ess:"Grown-ups are just tall children carrying unhealed hurts and unmet needs.",
  hook:"Watch two adults fight over the dishes. How old do they suddenly sound?",
  story:"Maturity is mostly a performance; underneath, the frightened, needy child persists in everyone. Adult tantrums, sulks, and defensiveness are that child breaking through the costume.",
  mech:"Seeing the child in others (and yourself) replaces contempt with tenderness. The rude colleague, the cold parent — each is a wounded child who never got the education this whole chart describes.",
  term:"The inner child", def:"the persistent childhood self, with its old needs and fears, beneath the adult surface.",
  sowhat:"When someone (or you) behaves badly, picture the frightened child underneath. It turns judgment into patience.",
  builds:[["a2","brokenness has an age"]], leads:[["b1-lorenz-story","where philosophy helps"]], live:[]},
"b1-lorenz-story":{type:"story", title:"Philosophy as consolation", x:254, y:656,
  ess:"The old thinkers were writing self-help — practical medicine for the troubled mind.",
  hook:"What if Seneca and the Stoics weren't dusty academics but the original therapists?",
  story:"Long before psychology, philosophers offered concrete consolation: the Stoics on anxiety and control, Epicurus on what truly brings pleasure, Montaigne on self-acceptance. Philosophy began as therapy for living.",
  mech:"The School of Life revives this: mining history's wisest minds for usable tools, not exam answers. Their consolations still work because the human predicament hasn't changed.",
  term:"Philosophy as therapy", def:"treating philosophical wisdom as practical guidance for emotional life.",
  sowhat:"When you're struggling, the ancients often got there first. Read them as advisors, not artifacts.",
  builds:[["a1","education from history"]], leads:[["b1-principle","toward maturity"]], live:[]},
"b1-principle":{type:"principle", title:"Maturity is knowing your madness", x:716, y:679,
  ess:"The mature aren't sane — they just know exactly how they're crazy, and warn you.",
  hook:"Who's safer to love: someone who insists they're perfectly normal, or someone who can list their flaws?",
  story:"Maturity isn't the absence of neurosis but honest, humorous acquaintance with it. The mature person can say 'here's how I get difficult' — and that self-knowledge is what makes them bearable to live with.",
  mech:"Traces to self-knowledge: you can't warn others about, or manage, a madness you refuse to see. Owning your specific craziness is the most reassuring thing you can offer.",
  term:"Mature self-awareness", def:"honest, good-humored knowledge of one's own emotional flaws.",
  sowhat:"Aim not to be flawless but to know your flaws well enough to flag them. That's what makes you safe to be close to.",
  builds:[["a4","self-knowledge, applied"],["b1-sensitive","the child, acknowledged"]], leads:[["b2-logistic","the hardest arena: love"]], live:[]},

"b2-logistic":{type:"tension", title:"The errors of Romanticism", sim:"romantic", x:1837, y:233,
  ess:"Our whole idea of love is built on a beautiful, ruinous set of myths.",
  hook:"Do you secretly believe the right person would just 'get' you, without your having to explain?",
  story:"Romanticism taught us love means instant recognition, effortless understanding, no need to explain, and no real conflict if it's true. Measured against that fantasy, every real relationship looks like a failure.",
  mech:"These inherited beliefs — soulmates, love at first sight, intuition over communication — set impossible standards. The School of Life argues most heartbreak is Romanticism's fault, not our partner's.",
  term:"Romanticism", def:"the modern ideology of love as instinctive, effortless, and conflict-free.",
  sowhat:"Half your relationship disappointments may be a myth's fault, not your partner's. Question the standard, not just the person.",
  builds:[["a1","beliefs we were never taught to examine"]], leads:[["b2-attractors","who we then choose"]], live:[]},
"b2-attractors":{type:"mechanism", title:"We marry our unfinished business", x:2069, y:401,
  ess:"We're drawn to partners who recreate the emotional patterns of childhood — comfortable, not healthy.",
  hook:"Why do people so often fall for someone who frustrates them in oddly familiar ways?",
  story:"We don't seek what's good for us; we seek what feels like home — even when home was painful. The distant parent, the volatile household: we unconsciously chase partners who echo them, mistaking familiarity for love.",
  mech:"Rooted in emotional inheritance: our template for love was set young, so 'chemistry' often just means 'this reactivates my childhood.' Knowing this lets you question a pull instead of obeying it.",
  term:"Attachment templates", def:"childhood patterns that steer us toward familiar, not necessarily healthy, partners.",
  sowhat:"That electric 'chemistry' may be your childhood calling. Worth asking whether it's love or just familiarity.",
  builds:[["a3","childhood, in our choices"]], leads:[["b2-lorenz-attractor","and how we then fail to speak"]], live:[]},
"b2-lorenz-attractor":{type:"phenomenon", title:"The tyranny of sulking", x:2300, y:282,
  ess:"Sulking is the strange belief that a true love should read your mind — so you refuse to explain.",
  hook:"Ever gone silent and cold, secretly furious that they should just KNOW what's wrong?",
  story:"To sulk is to be hurt and refuse to say why, punishing someone for failing to guess. Underneath is a touching, impossible hope: that being truly loved means never having to spell out your needs.",
  mech:"It's Romanticism turned toxic — the myth of effortless understanding weaponized into silence. The cure is unglamorous: patiently, vulnerably explaining, like a not-yet-mind-reader talking to another.",
  term:"Sulking", def:"withdrawing in wounded silence, expecting a loved one to intuit the grievance.",
  sowhat:"When you catch yourself sulking, translate it into a sentence. 'They should just know' is the myth talking.",
  builds:[["b2-logistic","Romanticism's bad debt"]], leads:[["b2-tension-random","so learn to listen"]], live:[]},
"b2-tension-random":{type:"mechanism", title:"The art of listening", x:2392, y:470,
  ess:"Good listening isn't waiting to talk — it's helping the other person think.",
  hook:"When was the last time someone listened so well you understood yourself better?",
  story:"Most 'listening' is a queue for our own turn. Real listening draws people out — encouraging, gently questioning, reflecting back — so they arrive at clarity they couldn't reach alone. It's a rare and enormous gift.",
  mech:"It requires setting your ego aside and getting curious about another interior. Done well, it defuses conflict and deepens intimacy more than any clever advice could.",
  term:"Generous listening", def:"attentive, drawing-out listening that helps another person clarify their own mind.",
  sowhat:"In your next hard conversation, aim to understand, not to reply. The listening itself often is the help.",
  builds:[["b1-pendulum","emotional intelligence in action"]], leads:[["b2-principle","love as a skill"]], live:[]},
"b2-principle":{type:"principle", title:"Love is a skill, not a feeling", x:1895, y:598,

const vp = document.getElementById('vp');
const world = document.getElementById('world');
const reader = document.getElementById('reader');
const WW = 2750, WH = 1750;
let cam = {s:0.12, tx:0, ty:0};
let anim = null;
function apply(){
  world.style.transform = `translate(${cam.tx}px, ${cam.ty}px) scale(${cam.s})`;
  lod();
}
function readerW(){ return reader.classList.contains('open') ? (reader.getBoundingClientRect().width||430) : 0; }
function visW(){ return innerWidth - readerW(); }
function centerOn(cx, cy, s){
  cam.s = s;
  cam.tx = visW()/2 - cx*s;
  cam.ty = innerHeight/2 - cy*s;
  apply();
}
function flyTo(cx, cy, s, dur=700){
  if (anim) cancelAnimationFrame(anim);
  const s0=cam.s, cx0=(visW()/2-cam.tx)/s0, cy0=(innerHeight/2-cam.ty)/s0;
  const ls0=Math.log(s0), ls1=Math.log(s);
  const t0=performance.now();
  function step(t){
    let p=Math.min(1,(t-t0)/dur);
    p = p<.5 ? 4*p*p*p : 1-Math.pow(-2*p+2,3)/2;
    centerOn(cx0+(cx-cx0)*p, cy0+(cy-cy0)*p, Math.exp(ls0+(ls1-ls0)*p));
    if (p<1) anim=requestAnimationFrame(step);
  }
  anim=requestAnimationFrame(step);
}
function overviewCam(fly=true){
  const s = Math.min(visW()/WW, innerHeight/WH)*0.92;
  if (fly) flyTo(WW/2, WH/2, s, 800); else centerOn(WW/2, WH/2, s);
}
vp.addEventListener('wheel', e=>{
  e.preventDefault();
  if (anim) cancelAnimationFrame(anim);
  const f = Math.exp(-e.deltaY*0.0016);
  const s2 = Math.min(2.2, Math.max(0.06, cam.s*f));
  const wx=(e.clientX-cam.tx)/cam.s, wy=(e.clientY-cam.ty)/cam.s;
  cam.s=s2; cam.tx=e.clientX-wx*s2; cam.ty=e.clientY-wy*s2;
  apply();
}, {passive:false});
const ptrs = new Map();
let panStart=null, pinchStart=null, moved=0;
vp.addEventListener('pointerdown', e=>{
  if (e.target.closest('.tlabel')) return;
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (ptrs.size===1){
    moved=0;
    panStart={mx:e.clientX, my:e.clientY, tx:cam.tx, ty:cam.ty};
    vp.classList.add('dragging');
  } else if (ptrs.size===2){
    const [p1,p2]=[...ptrs.values()];
    pinchStart={d:Math.hypot(p1.x-p2.x,p1.y-p2.y), s:cam.s,
      wx:((p1.x+p2.x)/2-cam.tx)/cam.s, wy:((p1.y+p2.y)/2-cam.ty)/cam.s};
    panStart=null;
  }
});
addEventListener('pointermove', e=>{
  if (!ptrs.has(e.pointerId)) return;
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (ptrs.size===1 && panStart){
    if (anim) cancelAnimationFrame(anim);
    moved += Math.abs(e.movementX||0)+Math.abs(e.movementY||0);
    cam.tx = panStart.tx + (e.clientX-panStart.mx);
    cam.ty = panStart.ty + (e.clientY-panStart.my);
    apply();
  } else if (ptrs.size===2 && pinchStart){
    if (anim) cancelAnimationFrame(anim);
    const [p1,p2]=[...ptrs.values()];
    const d=Math.hypot(p1.x-p2.x,p1.y-p2.y);
    const s2=Math.min(2.2, Math.max(0.06, pinchStart.s*d/pinchStart.d));
    const cx=(p1.x+p2.x)/2, cy=(p1.y+p2.y)/2;
    cam.s=s2; cam.tx=cx-pinchStart.wx*s2; cam.ty=cy-pinchStart.wy*s2;
    apply();
  }
});
function ptrUp(e){ ptrs.delete(e.pointerId);
  if (ptrs.size<2) pinchStart=null;
  if (ptrs.size===0){ panStart=null; vp.classList.remove('dragging'); } }
addEventListener('pointerup', ptrUp);
addEventListener('pointercancel', ptrUp);
vp.addEventListener('dblclick', e=>{

});
addEventListener('keydown', e=>{

});

{

const tsvg = document.createElementNS('http://www.w3.org/2000/svg','svg');

ALL.forEach(id=>{

function lod(){
  const ess = cam.s > 0.55;
  if (lod._k===ess) return;
  lod._k = ess;
  Object.values(mkEls).forEach(m=>m.classList.toggle('showess', ess));

/* ============================================================
   READER
   ============================================================ */
let focusId = null, stopSim = null;

function linkGroup(kicker, items){
  if (!items.length) return '';
  return `<div class="lgroup"><span class="kicker">${kicker}</span>
    ${items.map(([t,why])=>`<a data-t="${t}"><span class="t">${N[t].title}</span>
      <span class="why">${why}</span></a>`).join('')}
  </div>`;
}

function openIdea(id){
  const n = N[id];
  if (stopSim){ stopSim(); stopSim=null; }
  focusId = id;
  const chip = document.getElementById('rChip');
  chip.textContent = n.type;
  chip.style.borderColor = hueOf(id)+'66'; chip.style.color = hueOf(id);
  document.getElementById('rTitle').textContent = n.title;
  document.getElementById('rTerr').textContent = terrOf(id) + (SEQ[id]?` · step ${SEQ[id]} of ${TOUR.length}`:'');
  const nextId = SEQ[id] && SEQ[id] < TOUR.length ? TOUR[SEQ[id]] : null;
  document.getElementById('rbody').innerHTML = `
    <div class="hook">${n.hook}</div>
    <div class="story">${n.story}</div>
    ${n.sim ? simHTML(n.sim) : ''}
    ${n.mech ? `<details class="fold"><summary>How it actually works</summary><div class="inner">${n.mech}</div></details>` : ''}
    <div class="named"><span class="kicker">the idea, named</span>
      <b>${n.term}</b><div class="def">${n.def}</div></div>
    <div class="sowhat"><span class="kicker">where it bites</span>${n.sowhat}</div>
    <div class="linkrow">
      ${linkGroup('builds on', n.builds)}
      ${linkGroup('leads to', n.leads)}
      ${linkGroup('see it live', n.live)}
    </div>
    ${nextId ? `<button class="nextbtn" data-t="${nextId}"><span class="k">next in the flow · ${SEQ[nextId]} of ${TOUR.length}</span>${N[nextId].title}<span class="arr">→</span></button>`
             : (SEQ[id]===TOUR.length ? `<button class="nextbtn" id="finishBtn"><span class="k">end of the flow</span>Back to the chart<span class="arr">↑</span></button>` : '')}`;
  document.querySelectorAll('#rbody [data-t]').forEach(a=>
    a.addEventListener('click', ()=>openIdea(a.dataset.t)));
  const fin = document.getElementById('finishBtn');
  if (fin) fin.onclick = ()=>{ closeReader(); overviewCam(); };
  const fig = document.querySelector('#rbody figure.frame');
  if (fig) stopSim = SIMS[fig.dataset.sim](fig);
  document.getElementById('rbody').scrollTop = 0;
  reader.classList.add('open');
  document.body.classList.add('reader-open');
  highlight(id);
  syncNav();
  const rs = Math.min(0.95, Math.max(0.62, cam.s));
  setTimeout(()=>flyTo(n.x+180, n.y+60, rs), 60);
}
function closeReader(){
  if (stopSim){ stopSim(); stopSim=null; }
  reader.classList.remove('open');
  document.body.classList.remove('reader-open');
  focusId = null;
  clearHighlight();
  syncNav();
}
document.getElementById('rClose').onclick = closeReader;

/* map highlight: few directional lines with plain labels */
function highlight(id){
  clearHighlight();
  const n = N[id];
  const nb = new Set([id]);
  const conns = [
    ...n.builds.map(([t])=>({t, lab:'builds on', into:true})),
    ...n.leads.map(([t])=>({t, lab:'leads to', into:false})),
    ...n.live.map(([t])=>({t, lab:'see it live', into:false}))
  ];
  conns.forEach(c=>nb.add(c.t));
  ALL.forEach(x=>{
    mkEls[x].classList.toggle('dimmed', !nb.has(x));
    mkEls[x].classList.toggle('neighbor', nb.has(x) && x!==id);
    mkEls[x].classList.toggle('focused', x===id);
  });
  const here = dotCenter(id);
  conns.forEach(c=>{
    const there = dotCenter(c.t);
    let from = c.into ? {...there} : {...here};
    let to   = c.into ? {...here} : {...there};
    {
      const ddx=to.x-from.x, ddy=to.y-from.y, LL=Math.hypot(ddx,ddy)||1;
      const ux=ddx/LL, uy=ddy/LL, off=30;
      from = {x:from.x+ux*off, y:from.y+uy*off};
      to   = {x:to.x-ux*off,   y:to.y-uy*off};
    }
    const dx=to.x-from.x, dy=to.y-from.y, dist=Math.hypot(dx,dy)||1;
    const cx=(from.x+to.x)/2 - dy/dist*dist*0.12, cy=(from.y+to.y)/2 + dx/dist*dist*0.12;
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M ${from.x} ${from.y} Q ${cx} ${cy} ${to.x} ${to.y}`);
    p.setAttribute('fill','none');
    p.setAttribute('stroke','rgba(150,112,47,0.45)');
    p.setAttribute('stroke-width','2.5');
    p.setAttribute('stroke-dasharray','9,8');
    p.setAttribute('class','tline');
    p.setAttribute('marker-end','url(#arr)');
    tsvg.appendChild(p);
    const lbl = document.createElement('div');
    lbl.className='tlabel';
    lbl.style.left = (.25*from.x+.5*cx+.25*to.x)+'px';
    lbl.style.top = (.25*from.y+.5*cy+.25*to.y)+'px';
    lbl.textContent = c.lab;
    lbl.addEventListener('click', e=>{ e.stopPropagation(); openIdea(c.t); });
    world.appendChild(lbl);
    tlabels.push(lbl);
  });
}
function clearHighlight(){
  ALL.forEach(x=>mkEls[x].classList.remove('dimmed','neighbor','focused'));
  [...tsvg.querySelectorAll('path')].forEach(p=>p.remove());
  tlabels.forEach(l=>l.remove()); tlabels.length=0;
}

/* ============================================================
   NAV — top-right cluster drives the default flow
   ============================================================ */
function syncNav(){
  const i = focusId ? TOUR.indexOf(focusId) : -1;
  document.getElementById('navcluster').classList.toggle('on', !!focusId);
  document.getElementById('navPrev').disabled = i===0;
  document.getElementById('navNext').disabled = i===TOUR.length-1;
}
function navStep(dir){
  const i = focusId ? TOUR.indexOf(focusId) : -1;
  if (i<0){ openIdea(TOUR[0]); return; }
  const j = i+dir;
  if (j>=0 && j<TOUR.length) openIdea(TOUR[j]);
}
document.getElementById('navPrev').onclick = ()=>navStep(-1);
document.getElementById('navNext').onclick = ()=>navStep(1);

/* ============================================================
   SIMULATIONS
   ============================================================ */
const INKC='#3d3833', GRAY='#8a8069', FAINT='#b0a68c', AMBER='#96702f', SUNK='#ece4d2', BRD='#d5c9ae';
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0;
  let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t;
  return ((t^t>>>14)>>>0)/4294967296; }; }
function setActive(fig, btn){
  fig.querySelectorAll('.ghost').forEach(b=>{ if(b.dataset.d!==undefined||b.dataset.m!==undefined) b.classList.remove('active');});
  if (btn) btn.classList.add('active');
}
function simHTML(kind){
  const caps = {
    romantic:"The same relationship, seen two ways. The Romantic ideal sets a standard no love survives; the realistic view is where love can actually live.",
    envyclue:"Click who you envy. Each pang, read closely, points past the person to a specific thing you want — envy as a quiet map.",
    goodenough:"Slide from perfectionism to good-enough. Misery is the gap between your life and your ideal — lower the ideal and the gap closes."
  };
  const ctl = {
    romantic:`<button class="ghost active" data-v="ideal">the Romantic ideal</button>
      <button class="ghost" data-v="real">a realistic love</button>`,
    envyclue:`<span class="cl">you envy…</span>
      <button class="ghost active" data-e="0">the ex-colleague</button>
      <button class="ghost" data-e="1">the traveller</button>
      <button class="ghost" data-e="2">the artist</button>`,
    goodenough:`<span class="cl">standard</span><input type="range" min="0" max="100" step="5" value="100">`
  };
  return `<figure class="frame" data-sim="${kind}">
    <canvas></canvas>
    <div class="controls">${ctl[kind]}</div>
    <figcaption>${caps[kind]}</figcaption>
  </figure>`;
}
const SIMS = {};

function wrapText(ctx, text, x, y, maxW, lh){
  const words=text.split(' '); let line='', yy=y;
  for(const w of words){ const t=line?line+' '+w:w;
    if(ctx.measureText(t).width>maxW && line){ ctx.fillText(line,x,yy); line=w; yy+=lh; }
    else line=t; }
  if(line) ctx.fillText(line,x,yy); return yy;
}

SIMS.romantic = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=380;
  const ctx=cv.getContext('2d'); const W=700,H=380; let v="ideal";
  const ideal=["They will sense what I need without my saying it.","If it's real love, there won't be much conflict.","We were made for each other — one perfect match exists.","Desire should stay effortless and constant.","To explain a need is to admit the love has failed."];
  const real=["They can't read my mind; I'll have to explain, kindly and often.","Conflict is normal — the question is how we repair it.","No one is a perfect match; love is learning to accommodate a flawed other.","Desire ebbs and flows; that's not a verdict on the relationship.","Naming a need is a skill of love, not evidence against it."];
  function draw(){
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    const list = v==="ideal"?ideal:real;
    ctx.fillStyle = v==="ideal" ? '#8a5c5c' : AMBER; ctx.font='16px Inter, sans-serif';
    ctx.fillText(v==="ideal"?"The Romantic ideal":"A realistic love", 40, 44);
    ctx.font='14.5px Inter, sans-serif'; let y=88;
    list.forEach(t=>{ ctx.fillStyle= v==="ideal"?GRAY:INKC; ctx.fillText("•", 40, y); y=wrapText(ctx,t,60,y,W-100,22)+30; });
    ctx.fillStyle=GRAY; ctx.font='13px Inter, sans-serif';
    wrapText(ctx, v==="ideal" ? "Held to this standard, every real relationship reads as a failure — and we blame the partner, not the myth."
                              : "None of this is less romantic. It's the version in which two flawed people can actually love each other.", 40, H-40, W-80, 18);
  }
  draw();
  fig.querySelectorAll('.ghost').forEach(b=>b.onclick=()=>{
    fig.querySelectorAll('.ghost').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); v=b.dataset.v; draw(); });
  return ()=>{};
};

SIMS.envyclue = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=380;
  const ctx=cv.getContext('2d'); const W=700,H=380; let e=0;
  const items=[
    {who:"the ex-colleague who got promoted",surface:"You don't want their job, their boss, or their hours.",clue:"You want to feel your work is seen and to matter more. That's the real signal — chase recognition, not their title."},
    {who:"the friend always travelling",surface:"You don't actually want to live out of a suitcase.",clue:"You want more freedom and novelty in your weeks. The clue points to spaciousness — buildable at home, not just abroad."},
    {who:"the artist making their own work",surface:"You don't envy the precarious income or the doubt.",clue:"You want to make something of your own, on your own terms. The pang names a creative need going unfed."}];
  function draw(){
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    const it=items[e];
    ctx.fillStyle=GRAY; ctx.font='13px Inter, sans-serif'; ctx.fillText("you envy…", 40, 40);
    ctx.fillStyle=INKC; ctx.font='19px Inter, sans-serif'; wrapText(ctx,it.who,40,70,W-80,26);
    ctx.fillStyle=FAINT; ctx.font='13.5px Inter, sans-serif';
    let y=wrapText(ctx,it.surface,40,140,W-80,20)+30;
    ctx.fillStyle=AMBER; ctx.font='11px Inter, sans-serif'; ctx.fillText("THE CLUE", 40, y); y+=22;
    ctx.fillStyle=INKC; ctx.font='15px Inter, sans-serif'; wrapText(ctx,it.clue,40,y,W-80,22);
    ctx.fillStyle=GRAY; ctx.font='13px Inter, sans-serif';
    wrapText(ctx,"You never envy a whole life — only a slice. That slice is the desire worth naming.",40,H-30,W-80,18);
  }
  draw();
  fig.querySelectorAll('.ghost').forEach(b=>b.onclick=()=>{
    fig.querySelectorAll('.ghost').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); e=+b.dataset.e; draw(); });
  return ()=>{};
};

SIMS.goodenough = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=380;
  const ctx=cv.getContext('2d'); const W=700,H=380; let std=100;
  const px=60, py=50, pw=W-110, ph=H-130;
  function draw(){
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    // misery = gap between ideal(std) and reality(~62)
    const reality=62;
    const gap=Math.max(0, std-reality);
    ctx.strokeStyle=BRD; ctx.beginPath(); ctx.moveTo(px,py+ph); ctx.lineTo(px+pw,py+ph); ctx.stroke();
    // reality bar
    const bx=px+pw*0.28, bw=90;
    ctx.fillStyle='rgba(138,128,105,0.5)'; const rh=ph*reality/100; ctx.fillRect(bx,py+ph-rh,bw,rh);
    ctx.fillStyle=INKC; ctx.font='12px Inter, sans-serif'; ctx.fillText("your real life", bx-4, py+ph+20);
    // ideal bar
    const ix=px+pw*0.62;
    ctx.fillStyle='rgba(150,112,47,0.5)'; const ih=ph*std/100; ctx.fillRect(ix,py+ph-ih,bw,ih);
    ctx.fillStyle=AMBER; ctx.fillText("your standard", ix-4, py+ph+20);
    // gap bracket
    ctx.strokeStyle='#8a5c5c'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(ix+bw+16,py+ph-rh); ctx.lineTo(ix+bw+16,py+ph-ih); ctx.stroke();
    ctx.fillStyle='#8a5c5c'; ctx.font='13px Inter, sans-serif';
    ctx.fillText("misery = "+Math.round(gap), ix+bw+24, py+ph-(rh+ih)/2);
    ctx.fillStyle=INKC; ctx.font='14px Inter, sans-serif';
    ctx.fillText(std>=90?"Perfectionism: the gap (and the suffering) is huge.":std<=65?"Good enough: the gap nearly closes — peace.":"Lowering the standard shrinks the gap.", 40, H-42);
    ctx.fillStyle=GRAY; ctx.font='13px Inter, sans-serif';
    wrapText(ctx,"Your life barely moved. Only the standard did — and with it, almost all the unhappiness. Not settling: sanity.",40,H-20,W-80,18);
  }
  draw();
  fig.querySelector('input').oninput=e=>{ std=+e.target.value; draw(); };
  return ()=>{};
};
