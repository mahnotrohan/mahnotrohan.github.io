<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thinking, Fast and Slow — Orrery</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
:root{
  --ground:#f2ecdf; --surface-sunk:#ece4d2; --surface-raised:#faf6ec;
  --border:#ddd2bc; --border-strong:#c9bda1;
  --ink:#26221d; --ink-strong:#14110e; --ink-muted:#5b5343; --ink-faint:#83765b;
  --accent:#96702f; --accent-dim:#b08d4f; --accent-wash:rgba(150,112,47,0.08);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --r:4px; --reader-w:min(760px, 58vw); --move-fast:150ms ease;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%; overflow:hidden; background:var(--ground); color:var(--ink);
  font-family:var(--font); font-size:15.5px; line-height:1.75; overscroll-behavior:none;}
h1,h2,h3{color:var(--ink-strong); font-weight:600; line-height:1.3;}
.kicker{font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink-muted); font-weight:500;}

/* header — all navigation lives top right */
#hdr{position:fixed; top:0; left:0; right:0; z-index:40; height:56px;
  display:flex; align-items:center; gap:1.1rem; padding:0 1.4rem;
  background:linear-gradient(180deg, rgba(242,236,223,.96), rgba(242,236,223,.75), transparent);
  pointer-events:none; transition:right .3s cubic-bezier(.25,.7,.3,1);}
body.reader-open #hdr{right:var(--reader-w);}
#hdr>*{pointer-events:auto;}
#hdr .t{font-size:15px; font-weight:600; color:var(--ink-strong);}
#hdr .sub{font-size:11.5px; color:var(--ink-muted);}
#hdr .spacer{flex:1;}
#count{font-size:12px; color:var(--ink-faint); white-space:nowrap;}
.hbtn{background:rgba(250,246,236,.92); border:1px solid var(--border-strong); color:var(--ink-muted);
  font-family:var(--font); font-size:12.5px; padding:6px 13px; border-radius:var(--r); cursor:pointer;
  transition:all var(--move-fast); white-space:nowrap;}
.hbtn:hover{color:var(--ink); border-color:var(--ink-muted);}
.hbtn:disabled{opacity:.35; cursor:default;}
#nudge{border-color:var(--accent-dim); color:var(--accent);}
#nudge:hover{background:var(--accent-wash);}
#navcluster{display:flex; align-items:center; gap:5px; background:none; border:none; padding:0;}
#navcluster .hbtn{background:rgba(250,246,236,.92); border:1px solid var(--border-strong); color:var(--ink-muted);
  font-size:15px; width:30px; height:30px; padding:0; display:flex; align-items:center; justify-content:center;}
#navcluster.idle #navPrev, #navcluster.idle #navNext{display:none;}
#navStep{font-size:13px; color:var(--ink); background:rgba(250,246,236,.92); border:1px solid var(--border-strong);
  border-radius:var(--r); padding:6px 14px; text-align:center; cursor:default; white-space:nowrap;
  transition:all var(--move-fast);}
#navcluster.idle #navStep{cursor:pointer;}
#navcluster.idle #navStep:hover{border-color:var(--ink-muted); color:var(--ink-strong);}
#navStep .tot{color:var(--ink-faint);}

/* viewport & sky */
#vp{position:fixed; inset:0; cursor:grab; touch-action:none;
  background:radial-gradient(ellipse at 50% 40%, #f6f1e4 0%, #f2ecdf 55%, #e9e0cb 100%);}
#vp.dragging{cursor:grabbing;}
#vp.dragging, #vp.dragging *{user-select:none;}
#world{position:absolute; top:0; left:0; width:2750px; height:1750px;
  transform-origin:0 0; will-change:transform;}
#world::before{content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(circle, rgba(110,95,65,.14) 1.2px, transparent 1.2px),
                   radial-gradient(circle, rgba(110,95,65,.08) 1px, transparent 1px);
  background-size:380px 380px, 150px 150px;
  background-position:0 0, 70px 100px; opacity:.8;}

/* constellation names */
.tlab{position:absolute; pointer-events:auto; cursor:pointer; user-select:none; text-align:center;}
.tlab .big{font-size:40px; font-weight:500; letter-spacing:.5em; line-height:1.3;
  text-transform:uppercase; white-space:nowrap;}
.tlab .sum{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf;
  font-size:19px; color:#665c44; margin-top:.5em; letter-spacing:.18em; text-transform:uppercase;}
.tlab:hover .big{filter:brightness(1.35);}

/* stars */
.mk{position:absolute; cursor:pointer; user-select:none;
  display:flex; gap:14px; width:330px; align-items:flex-start;}
.mk .dot{border-radius:50%; flex-shrink:0;
  transition:transform .2s ease, box-shadow .4s ease, opacity .4s ease, background .4s ease;}
.mk:hover .dot{transform:scale(1.3);}
.mk .dtext{min-width:0; padding-top:1px;}
.mk .lbl{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf,0 0 3px #f2ecdf;
  font-size:19px; color:#26221d; font-weight:500; line-height:1.3;}
.mk .lbl .seq{font-size:12px; color:#83765b; font-weight:400; margin-right:.5em;}
.mk .ess{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf,0 0 3px #f2ecdf;
  font-size:14px; color:#584f3e; line-height:1.45; margin-top:4px; max-width:290px;
  opacity:0; transition:opacity .3s ease;}
.mk.showess .ess{opacity:1;}
.mk .sims-badge{font-size:12px; color:var(--accent-dim); margin-top:3px; display:none;}
.mk.hasim .sims-badge{display:block;}
.mk.fading .dot{opacity:.55;}
.mk.fading .lbl{color:#75684f;}
.mk.focused .dot{transform:scale(1.35);}
.mk.focused .lbl{color:var(--ink-strong);}
.mk.neighbor .lbl{color:#14110e;}
.mk.dimmed{opacity:.35;}

/* connection overlay — few, directional, labeled plainly */
#tsvg, #astsvg, #flowsvg{position:absolute; top:0; left:0; pointer-events:none; overflow:visible;}
@keyframes dashdrift{to{stroke-dashoffset:-64;}}
.tline{animation:dashdrift 6s linear infinite;}
.tlabel{position:absolute; transform:translate(-50%,-50%); background:var(--ground);
  border:1px solid var(--accent-dim); color:var(--accent); border-radius:12px;
  font-size:12px; letter-spacing:.06em; padding:2px 11px; white-space:nowrap; cursor:pointer;
  pointer-events:auto; transition:background var(--move-fast); text-transform:uppercase;}
.tlabel:hover{background:var(--accent-wash);}

/* ---------- READER ---------- */
#reader{position:fixed; top:0; right:calc(-1 * var(--reader-w) - 20px); width:var(--reader-w);
  height:100%; z-index:45; background:var(--surface-raised);
  border-left:1px solid var(--border); display:flex; flex-direction:column;
  transition:right .3s cubic-bezier(.25,.7,.3,1);
  box-shadow:-24px 0 70px rgba(90,75,50,.18);}
#reader.open{right:0;}
#reader .top{padding:1.5em 2.2em 1em; border-bottom:1px solid var(--border); position:relative;}
#reader .close{position:absolute; top:14px; right:16px; background:none; border:none;
  color:var(--ink-faint); font-size:18px; cursor:pointer;}
#reader .close:hover{color:var(--ink);}
#reader h2{font-size:24px; margin:.45em 0 .3em;}
#reader .terrline{font-size:11.5px; color:var(--ink-faint); margin-top:2px;}
#rbody{flex:1; overflow-y:auto; padding:1.6em 2.2em 2.5em;}
#rbody::-webkit-scrollbar{width:6px;}
#rbody::-webkit-scrollbar-thumb{background:var(--border-strong); border-radius:3px;}
#rbody>*{max-width:66ch;}
.hook{font-size:18.5px; color:var(--ink-strong); line-height:1.65;
  padding-left:1em; border-left:2px solid var(--accent-dim); margin-bottom:1.1em;}
.story{font-size:15.5px; color:#2b2620;}
.typechip{display:inline-block; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink-muted); border:1px solid var(--border-strong); border-radius:3px; padding:1px 8px;}
details.fold{margin:1.2em 0 0; border:1px solid var(--border); border-radius:var(--r); background:var(--surface-sunk);}
details.fold summary{cursor:pointer; padding:.6em 1.05em; color:var(--ink-muted);
  font-size:13px; list-style:none; user-select:none;}
details.fold summary::-webkit-details-marker{display:none;}
details.fold summary::before{content:'+  '; color:var(--accent); font-weight:500;}
details.fold[open] summary::before{content:'−  ';}
details.fold summary:hover{color:var(--ink);}
details.fold .inner{padding:0 1.05em .9em; font-size:14.5px; color:#332e25;}
.named{margin-top:1.5em; background:var(--surface-sunk); border:1px solid var(--border);
  border-radius:8px; padding:1em 1.3em;}
.named .kicker{display:block; margin-bottom:.35em;}
.named b{color:var(--ink-strong); font-weight:600; font-size:16px;}
.named .def{font-size:14.5px; color:#332e25; margin-top:.2em;}
.sowhat{margin-top:1.4em; font-size:15px; color:#2b2620;}
.sowhat .kicker{display:block; margin-bottom:.3em;}
.closure{margin-top:1.5em; border:1px solid var(--accent-dim); border-radius:8px;
  background:var(--accent-wash); padding:1em 1.3em;}
.closure .kicker{color:var(--accent); display:block; margin-bottom:.3em;}
.closure .txt{font-size:14.5px; color:#4a443c; line-height:1.65;}
.linkrow{margin-top:1.6em; border-top:1px solid var(--border); padding-top:1em;
  display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:.6em 2em;}
.lgroup .kicker{display:block; margin-bottom:.25em;}
.lgroup a{display:block; font-size:14px; padding:.2em 0 .45em; color:#332e25; cursor:pointer; text-decoration:none;}
.lgroup a .t{border-bottom:1px dotted transparent; transition:border-color var(--move-fast); color:var(--ink);}
.lgroup a:hover .t{border-bottom-color:var(--accent);}
.lgroup a .why{display:block; font-size:12px; color:var(--ink-faint); line-height:1.5;}
.nextbtn{margin-top:1.8em; width:100%; max-width:66ch; text-align:left;
  background:var(--surface-sunk); border:1px solid var(--border-strong); border-radius:8px;
  color:var(--ink); font-family:var(--font); font-size:14.5px; padding:.9em 1.3em; cursor:pointer;
  transition:all var(--move-fast);}
.nextbtn:hover{border-color:var(--accent-dim); background:var(--accent-wash);}
.nextbtn .k{color:var(--ink-faint); font-size:11px; letter-spacing:.12em; text-transform:uppercase;
  display:block; margin-bottom:.15em;}
.nextbtn .arr{color:var(--accent); float:right;}
.seen{font-size:11.5px; color:var(--ink-faint); margin-top:1.2em;}
.seen b{color:var(--accent-dim); font-weight:500;}

/* sim figure */
figure.frame{background:var(--surface-sunk); border:1px solid var(--border); border-radius:var(--r);
  margin:1.3em 0 0; overflow:hidden;}
figure.frame canvas{width:100%; display:block;}
figure.frame .controls{display:flex; gap:8px; padding:8px 12px; border-top:1px solid var(--border);
  align-items:center; flex-wrap:wrap;}
figure.frame .controls .cl{font-size:11.5px; color:var(--ink-faint);}
figure.frame figcaption{padding:7px 13px 10px; font-size:12.5px; color:var(--ink-muted); line-height:1.55;}
.ghost{background:none; border:1px solid var(--border-strong); color:var(--ink-muted);
  font-family:var(--font); font-size:12px; padding:3px 11px; border-radius:var(--r); cursor:pointer;
  transition:all var(--move-fast);}
.ghost:hover{color:var(--ink); border-color:var(--ink-muted);}
.ghost.active{color:var(--accent); border-color:var(--accent-dim); background:var(--accent-wash);}
figure.frame input[type=range]{flex:1; min-width:100px; accent-color:var(--accent);}

@media(max-width:760px){ :root{--reader-w:100vw;} }
</style>
</head>
<body>

<div id="hdr">
  <div>
    <div class="t">Thinking, Fast and Slow</div>
    <div class="sub">a night sky of ideas · stars brighten as you revisit them</div>
  </div>
  <div class="spacer"></div>
  <span id="count"></span>
  <button class="hbtn" id="nudge" style="display:none"></button>
  <div id="navcluster">
    <button class="hbtn" id="navPrev" title="previous idea">‹</button>
    <span id="navStep">▶ Begin the tour</span>
    <button class="hbtn" id="navNext" title="next idea">›</button>
  </div>
  <button class="hbtn" id="overviewBtn">Overview&nbsp;·&nbsp;Esc</button>
</div>

<div id="vp"><div id="world"></div></div>

<div id="reader">
  <div class="top">
    <button class="close" id="rClose">✕</button>
    <span class="typechip" id="rChip"></span>
    <h2 id="rTitle"></h2>
    <div class="terrline" id="rTerr"></div>
  </div>
  <div id="rbody"></div>
</div>

<script>
'use strict';
/* ============================================================
   CONTENT v2 — every idea: hook → story → (sim) → mechanism
   fold → the idea named → where it bites → you can now explain.
   Connections: ≤4 per idea, in three plain buckets.
   ============================================================ */
const N = {
a1:{type:"axiom", title:"Two minds share one head", x:1259, y:482,
  l0:"Two minds share one head: one fast and automatic, one slow and effortful.",
  l1:"System 1 answers before you ask — 2+2, a hostile face, the word after 'bread and…'. System 2 is the one that grinds through 17×24, the effortful self you think of as you.",
  l2:"Almost everything you do begins as a System 1 impulse that System 2 merely endorses. The whole book is the story of that division of labour — and of where it quietly fools you.",
  threads:[["seen up close","s1-fast"],["the slow one","s1-slow"]]},
a2:{type:"axiom", title:"Attention is a budget", x:1057, y:626,
  l0:"Attention is a budget, and System 2 is lazy — most of life runs on autopilot.",
  l1:"Thinking hard costs real fuel: your pupils widen, your blood sugar drops, you go blind to everything else. So the mind spends as little as it can and lets System 1 drive.",
  l2:"Because effort is scarce and unpleasant, we wave through System 1's fast answers far more often than we should. The laziness isn't a bug — it's the design.",
  threads:[["why the mind coasts","s1-ease"],["the lazy controller","s1-lazy"]]},
a3:{type:"axiom", title:"What you see is all there is", x:1462, y:626,
  l0:"The mind builds a whole story from whatever it has — and ignores what it doesn't.",
  l1:"System 1 never asks what's missing; it makes the best story from the evidence in front of it. Kahneman's name for this is WYSIATI — what you see is all there is.",
  l2:"The goal is coherence, not completeness. This one habit powers overconfidence, framing, and most biases — the mind is a machine for jumping to conclusions.",
  threads:[["powers the biases","s2-substitution"],["breeds false confidence","s3-narrative"]]},
a4:{type:"axiom", title:"Confidence is a feeling", x:1259, y:771,
  l0:"We feel certainty, not accuracy. The sense of knowing is manufactured, not earned.",
  l1:"A story that hangs together feels true whether or not it is. Confidence measures how neatly the pieces fit — not how much you actually know.",
  l2:"So subjective certainty is a terrible guide to correctness. Experts and amateurs alike feel sure, because the feeling comes from coherence, not evidence.",
  threads:[["the illusion it builds","s3-validity"],["why we trust the gut","s3-formulas"]]},

"s1-fast":{type:"phenomenon", title:"System 1: the fast mind", x:277, y:262,
  l0:"The mind that answers before you ask — effortless, instant, always on.",
  l1:"It reads a word, senses a mood, completes 'bread and…', flinches from a snake. No sense of effort, no decision to engage — it simply delivers.",
  l2:"System 1 is brilliant and indispensable: it runs your skills and instincts. Its flaw is that it can't tell a good answer from a merely confident one.",
  threads:[["rests on","a1"],["the slow partner","s1-slow"],["how it stays fast","s1-ease"]]},
"s1-slow":{type:"mechanism", title:"System 2: the slow mind", x:624, y:222,
  l0:"The effortful self that grinds through 17×24 — capable, deliberate, easily tired.",
  l1:"System 2 is what you mean by 'I': it reasons, checks, holds focus. But it's slow and costly, and would rather rubber-stamp System 1 than do the work.",
  l2:"Its great power is the veto — it can override a fast impulse. Its great failing is that it rarely bothers, because catching System 1's errors costs effort it won't spend.",
  threads:[["rests on","a1"],["the fast partner","s1-fast"],["too lazy to check","s1-lazy"]]},
"s1-ease":{type:"mechanism", title:"Cognitive ease", x:254, y:528,
  l0:"Whatever is easy to process feels true, good, and familiar.",
  l1:"Clear fonts, repeated claims, rhyming slogans, a good mood — each makes an idea slide in without friction, and the mind reads that smoothness as truth.",
  l2:"Ease is System 1's shortcut for 'safe and familiar'. Strain flips System 2 on and makes you skeptical — which is why a hard-to-read font can actually cut errors.",
  threads:[["rests on","a2"],["exploited by","s2-anchor"],["repeats become truth","s1-priming"]]},
"s1-priming":{type:"mechanism · story", title:"The associative machine", x:520, y:407,
  l0:"One idea silently summons a crowd of others — and steers you without your knowing.",
  l1:"See EAT and you finish SO_P as SOUP; see WASH and you get SOAP. Words about the elderly make people leave the room walking slower. The mind primes, and the body follows.",
  l2:"System 1 links everything to everything — words, feelings, actions all cross-firing. You experience the result as your own free thought, never the nudge behind it.",
  threads:[["rests on","a1"],["rides on ease","s1-ease"]]},
"s1-lazy":{type:"principle", title:"The lazy controller", x:716, y:563,
  l0:"You identify with System 2 — but System 1 writes most of the script.",
  l1:"The self you experience as reasoning is mostly a press secretary, endorsing conclusions System 1 already reached. Real control is knowing the few moments worth the effort to check.",
  l2:"From the two-system split plus scarce attention: since System 2 won't check everything, wisdom is spotting the high-stakes moments where it must. Naming the trap is the start of the cure.",
  threads:[["rests on","a2"],["the fast author","s1-fast"],["the reluctant editor","s1-slow"]]},

"s2-substitution":{type:"mechanism", title:"The substitution trick", x:1837, y:233,
  l0:"Faced with a hard question, the mind quietly answers an easier one instead.",
  l1:"'How happy am I with life?' becomes 'what's my mood right now?'. 'Is this CEO any good?' becomes 'does he look the part?'. You answer the easy one and feel you answered the hard one.",
  l2:"This swap is the engine under most heuristics: the mind maps a difficult target onto a handy question it can answer fast. Cheap, usually fine, occasionally disastrous.",
  threads:[["rests on","a3"],["one swap","s2-anchor"],["another swap","s2-availability"],["and another","s2-represent"]]},
"s2-anchor":{type:"mechanism", title:"Anchoring", sim:"anchoring", x:2219, y:210,
  l0:"Any number you just saw drags your next estimate toward it — even a random one.",
  l1:"Kahneman spun a rigged wheel, then asked what percent of UN nations are African. Wheel on 10 → people guessed 25%. Wheel on 65 → they guessed 45%. A number they knew was random moved them 20 points.",
  l2:"Anchors work by priming: the mind adjusts away from the starting value and stops too soon. It happens even when the anchor is obviously meaningless — which is why the first offer matters so much.",
  threads:[["a form of","s2-substitution"],["rides on priming","s1-priming"]]},
"s2-availability":{type:"mechanism", title:"Availability", x:2069, y:384,
  l0:"We judge how likely something is by how easily examples come to mind.",
  l1:"Plane crashes feel common because they're vivid and on the news; quiet killers like diabetes feel rare. Ease of recall, not real frequency, sets the gut estimate.",
  l2:"It swaps 'how easily can I recall this?' for 'how often does it happen?'. Media, recency and drama all inflate the number — availability is why we fear the wrong things.",
  threads:[["a form of","s2-substitution"],["fed by vividness","s1-ease"]]},
"s2-represent":{type:"mechanism", title:"Stereotypes vs base rates", x:2392, y:453,
  l0:"We match to a stereotype and ignore how common the thing actually is.",
  l1:"Told someone is shy and loves order, we cry 'librarian' — forgetting there are far more shy men in other jobs than there are librarians at all. The stereotype drowns out the base rate.",
  l2:"Judging by resemblance ignores prior odds, sample size, and regression. It's why a good story beats a boring statistic, and why we read tiny samples as if they were laws.",
  threads:[["a form of","s2-substitution"],["ignores","s2-regression"]]},
"s2-regression":{type:"mechanism", title:"Regression to the mean", sim:"regression", x:1895, y:569,
  l0:"After an extreme result, the next one is usually milder — no cause required.",
  l1:"The rookie who tore up his first season slumps; the pilot praised for a great landing does worse next time, the one scolded does better. We invent causes for what is just luck averaging out.",
  l2:"Any performance is skill plus luck. When luck spikes high or low it tends not to repeat, so extremes drift back toward average — and we credit praise or blame for what regression alone explains.",
  threads:[["ignored by","s2-represent"],["a cause we invent","s3-narrative"]]},

"s3-narrative":{type:"mechanism", title:"Hindsight & the tidy story", x:271, y:962,
  l0:"We turn the messy past into a clean story that felt inevitable all along.",
  l1:"Once we know how it ended we rewrite the start: 'of course that startup won.' Hindsight erases how uncertain it truly was, and the neat story quietly buries the luck.",
  l2:"The mind craves coherence, so it manufactures causes and forgets it was ever surprised. The world then looks far more predictable than it is — and confident storytellers get rewarded.",
  threads:[["rests on","a3"],["invents causes for","s2-regression"],["breeds","s3-validity"]]},
"s3-validity":{type:"tension", title:"The illusion of validity", x:600, y:1008,
  l0:"Feeling sure about a judgment is no evidence that the judgment is any good.",
  l1:"Kahneman rated soldiers' leadership with great confidence; the ratings barely predicted anything — and the confidence survived untouched. The feeling of validity is about coherence, not accuracy.",
  l2:"Skill forms only where the world is regular and feedback is fast. Where it isn't — stock picks, long-range forecasts — confident experts do little better than chance, and know it least.",
  threads:[["rests on","a4"],["grows from","s3-narrative"],["so prefer","s3-formulas"]]},
"s3-formulas":{type:"principle", title:"When formulas beat experts", x:311, y:1210,
  l0:"In noisy, low-feedback fields, a simple checklist usually beats the expert gut.",
  l1:"Decades of studies: plain formulas match or beat trained specialists at predicting parole, illness, even wine prices. Experts are inconsistent — the same case judged twice gets two answers. A formula never wavers.",
  l2:"Trust intuition only where skill can actually form: a regular world with fast, clear feedback — a chess master, a nurse. Everywhere else, discipline and rules beat the confident hunch.",
  threads:[["rests on","a4"],["answers","s3-validity"]]},
"s3-planning":{type:"mechanism", title:"The planning fallacy", x:774, y:1152,
  l0:"Plans are built from best-case stories, so projects run long, over budget, over hope.",
  l1:"The kitchen reno, the thesis, the software launch — each takes longer and costs more than anyone planned. We picture the smooth path and ignore the base rate of all that usually goes wrong.",
  l2:"The cure is the outside view: drop your specific plan and ask how long similar projects actually took. Real cases already include the delays your optimistic story left out.",
  threads:[["rests on","a3"],["a face of","s3-optimism"]]},
"s3-optimism":{type:"principle", title:"Optimism & the inside view", x:543, y:1326,
  l0:"We overrate our odds because we see our own case from the inside.",
  l1:"Most founders know the failure rate and still feel it won't apply to them. The inside view — our vivid, detailed plan — crowds out the dull statistics that actually predict the result.",
  l2:"Optimism fuels courage, so it isn't all bad — but unchecked it hides risk. The correction is cheap: deliberately take the outside view before you commit.",

const vp = document.getElementById('vp');
const world = document.getElementById('world');
const reader = document.getElementById('reader');
const WW = 2750, WH = 1750;
let cam = {s:0.12, tx:0, ty:0};
let anim = null;
function apply(){
  world.style.transform = `translate(${cam.tx}px, ${cam.ty}px) scale(${cam.s})`;
  lod();
}
function readerW(){ return reader.classList.contains('open') ? (reader.getBoundingClientRect().width||430) : 0; }
function visW(){ return innerWidth - readerW(); }
function centerOn(cx, cy, s){
  cam.s = s;
  cam.tx = visW()/2 - cx*s;
  cam.ty = innerHeight/2 - cy*s;
  apply();
}
function flyTo(cx, cy, s, dur=700){
  if (anim) cancelAnimationFrame(anim);
  const s0=cam.s, cx0=(visW()/2-cam.tx)/s0, cy0=(innerHeight/2-cam.ty)/s0;
  const ls0=Math.log(s0), ls1=Math.log(s);
  const t0=performance.now();
  function step(t){
    let p=Math.min(1,(t-t0)/dur);
    p = p<.5 ? 4*p*p*p : 1-Math.pow(-2*p+2,3)/2;
    centerOn(cx0+(cx-cx0)*p, cy0+(cy-cy0)*p, Math.exp(ls0+(ls1-ls0)*p));
    if (p<1) anim=requestAnimationFrame(step);
  }
  anim=requestAnimationFrame(step);
}
function overviewCam(fly=true){
  const s = Math.min(visW()/WW, innerHeight/WH)*0.92;
  if (fly) flyTo(WW/2, WH/2, s, 800); else centerOn(WW/2, WH/2, s);
}
vp.addEventListener('wheel', e=>{
  e.preventDefault();
  if (anim) cancelAnimationFrame(anim);
  const f = Math.exp(-e.deltaY*0.0016);
  const s2 = Math.min(2.2, Math.max(0.06, cam.s*f));
  const wx=(e.clientX-cam.tx)/cam.s, wy=(e.clientY-cam.ty)/cam.s;
  cam.s=s2; cam.tx=e.clientX-wx*s2; cam.ty=e.clientY-wy*s2;
  apply();
}, {passive:false});
const ptrs = new Map();
let panStart=null, pinchStart=null, moved=0;
vp.addEventListener('pointerdown', e=>{
  if (e.target.closest('.tlabel')) return;
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (ptrs.size===1){
    moved=0;
    panStart={mx:e.clientX, my:e.clientY, tx:cam.tx, ty:cam.ty};
    vp.classList.add('dragging');
  } else if (ptrs.size===2){
    const [p1,p2]=[...ptrs.values()];
    pinchStart={d:Math.hypot(p1.x-p2.x,p1.y-p2.y), s:cam.s,
      wx:((p1.x+p2.x)/2-cam.tx)/cam.s, wy:((p1.y+p2.y)/2-cam.ty)/cam.s};
    panStart=null;
  }
});
addEventListener('pointermove', e=>{
  if (!ptrs.has(e.pointerId)) return;
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (ptrs.size===1 && panStart){
    if (anim) cancelAnimationFrame(anim);
    moved += Math.abs(e.movementX||0)+Math.abs(e.movementY||0);
    cam.tx = panStart.tx + (e.clientX-panStart.mx);
    cam.ty = panStart.ty + (e.clientY-panStart.my);
    apply();
  } else if (ptrs.size===2 && pinchStart){
    if (anim) cancelAnimationFrame(anim);
    const [p1,p2]=[...ptrs.values()];
    const d=Math.hypot(p1.x-p2.x,p1.y-p2.y);
    const s2=Math.min(2.2, Math.max(0.06, pinchStart.s*d/pinchStart.d));
    const cx=(p1.x+p2.x)/2, cy=(p1.y+p2.y)/2;
    cam.s=s2; cam.tx=cx-pinchStart.wx*s2; cam.ty=cy-pinchStart.wy*s2;
    apply();
  }
});
function ptrUp(e){ ptrs.delete(e.pointerId);
  if (ptrs.size<2) pinchStart=null;
  if (ptrs.size===0){ panStart=null; vp.classList.remove('dragging'); } }
addEventListener('pointerup', ptrUp);
addEventListener('pointercancel', ptrUp);

const MEMKEY = 'chaos-constellation-memory';
let MEM = {};
try{ MEM = JSON.parse(localStorage.getItem(MEMKEY)||'{}'); }catch(e){}
const FADE_MS = 3*24*3600*1000;
function saveMem(){ try{ localStorage.setItem(MEMKEY, JSON.stringify(MEM)); }catch(e){} }
function ago(t){
  const d = Date.now()-t;
  if (d<90*1000) return 'just now';
  if (d<3600*1000) return Math.round(d/60000)+'m ago';
  if (d<24*3600*1000) return Math.round(d/3600000)+'h ago';
  return Math.round(d/(24*3600000))+'d ago';
}
function refreshMemory(){
  let fading = [];
  ALL.forEach(id=>{
    const rec = MEM[id];
    mkEls[id].classList.toggle('visited', !!rec);
    const isFading = !!rec && (Date.now()-rec.last > FADE_MS);
    mkEls[id].classList.toggle('fading', isFading);
    if (isFading) fading.push(id);
    const hue = hueOf(id), dot = mkEls[id].querySelector('.dot');
    if (isFading){ dot.style.background='transparent'; dot.style.border=`2px solid ${hue}99`; dot.style.boxShadow='none'; }
    else if (rec){ dot.style.background=hue; dot.style.border='none';
      dot.style.boxShadow = `0 0 0 ${2+Math.min(rec.n,6)*1.5}px ${hue}22`; }
    else { dot.style.background=hue+'59'; dot.style.border=`2px solid ${hue}`; dot.style.boxShadow='none'; }
  });
  document.getElementById('count').textContent =
    `${Object.keys(MEM).length} of ${ALL.length} ideas visited`;
  const btn = document.getElementById('nudge');
  if (fading.length){
    btn.style.display='';
    btn.textContent = `${fading.length} idea${fading.length>1?'s':''} fading — revisit`;
    btn.onclick = ()=>openIdea(fading.sort((a,b)=>MEM[a].last-MEM[b].last)[0]);
  } else btn.style.display='none';
}

let focusId = null, stopSim = null;

function connsList(n){
  if(n.builds||n.leads||n.live){
    return [].concat(
      (n.builds||[]).map(x=>({t:x[0],lab:'builds on',into:true})),
      (n.leads||[]).map(x=>({t:x[0],lab:'leads to',into:false})),
      (n.live||[]).map(x=>({t:x[0],lab:'see it live',into:false})));
  }
  return (n.threads||[]).map(x=>({t:x[1],lab:x[0],into:false}));
}
function renderLinks(n){
  if(n.builds||n.leads||n.live){
    return linkGroup('builds on', n.builds||[]) + linkGroup('leads to', n.leads||[]) + linkGroup('see it live', n.live||[]);
  }
  return linkGroup('connections', (n.threads||[]).map(x=>[x[1], x[0]]));
}
function linkGroup(kicker, items){
  if (!items.length) return '';
  return `<div class="lgroup"><span class="kicker">${kicker}</span>
    ${items.map(([t,why])=>`<a data-t="${t}"><span class="t">${N[t].title}</span>
      <span class="why">${why}</span></a>`).join('')}
  </div>`;
}

function openIdea(id){
  const n = N[id];
  const rec = MEM[id] || (MEM[id] = {n:0, last:0});
  rec.n++; rec.last = Date.now(); saveMem();
  if (stopSim){ stopSim(); stopSim=null; }
  focusId = id;
  const chip = document.getElementById('rChip');
  chip.textContent = n.type;
  chip.style.borderColor = hueOf(id)+'66'; chip.style.color = hueOf(id);
  document.getElementById('rTitle').textContent = n.title;
  document.getElementById('rTerr').textContent = terrOf(id) + (SEQ[id]?` · step ${SEQ[id]} of ${TOUR.length}`:'');
  const nextId = SEQ[id] && SEQ[id] < TOUR.length ? TOUR[SEQ[id]] : null;
  document.getElementById('rbody').innerHTML = `
    ${n.hook ? `<div class="hook">${n.hook}</div>` : `<div class="hook">${n.l0||''}</div>`}
    <div class="story">${n.story||n.l1||''}</div>
    ${n.sim ? simHTML(n.sim) : ''}
    ${(n.mech||n.l2) ? `<details class="fold"><summary>How it actually works</summary><div class="inner">${n.mech||n.l2}</div></details>` : ''}
    ${n.term ? `<div class="named"><span class="kicker">the idea, named</span><b>${n.term}</b><div class="def">${n.def}</div></div>` : ''}
    ${n.sowhat ? `<div class="sowhat"><span class="kicker">where it bites</span>${n.sowhat}</div>` : ''}
    <div class="linkrow">${renderLinks(n)}</div>
    ${nextId ? `<button class="nextbtn" data-t="${nextId}"><span class="k">next in the flow · ${SEQ[nextId]} of ${TOUR.length}</span>${N[nextId].title}<span class="arr">→</span></button>`
             : (SEQ[id]===TOUR.length ? `<button class="nextbtn" id="finishBtn"><span class="k">end of the flow</span>Back to the sky<span class="arr">↑</span></button>` : '')}
    <div class="seen">visited <b>${rec.n}×</b> · last ${ago(rec.last)}</div>`;
  document.querySelectorAll('#rbody [data-t]').forEach(a=>
    a.addEventListener('click', ()=>openIdea(a.dataset.t)));
  const fin = document.getElementById('finishBtn');
  if (fin) fin.onclick = ()=>{ closeReader(); overviewCam(); };
  const fig = document.querySelector('#rbody figure.frame');
  if (fig) stopSim = SIMS[fig.dataset.sim](fig);
  document.getElementById('rbody').scrollTop = 0;
  reader.classList.add('open');
  document.body.classList.add('reader-open');
  highlight(id);
  refreshMemory();
  syncNav();
  const rs = Math.min(0.95, Math.max(0.62, cam.s));
  setTimeout(()=>flyTo(n.x+180, n.y+60, rs), 60);
}
function closeReader(){
  if (stopSim){ stopSim(); stopSim=null; }
  reader.classList.remove('open');
  document.body.classList.remove('reader-open');
  focusId = null;
  clearHighlight();
  syncNav();
}
document.getElementById('rClose').onclick = closeReader;

/* map highlight: few directional lines with plain labels */
function highlight(id){
  clearHighlight();
  const n = N[id];
  const nb = new Set([id]);
  const conns = connsList(n);
  conns.forEach(c=>nb.add(c.t));
  ALL.forEach(x=>{
    mkEls[x].classList.toggle('dimmed', !nb.has(x));
    mkEls[x].classList.toggle('neighbor', nb.has(x) && x!==id);
    mkEls[x].classList.toggle('focused', x===id);
  });
  const here = dotCenter(id);
  conns.forEach(c=>{
    const there = dotCenter(c.t);
    let from = c.into ? {...there} : {...here};
    let to   = c.into ? {...here} : {...there};
    {
      const ddx=to.x-from.x, ddy=to.y-from.y, LL=Math.hypot(ddx,ddy)||1;
      const ux=ddx/LL, uy=ddy/LL, off=30;
      from = {x:from.x+ux*off, y:from.y+uy*off};
      to   = {x:to.x-ux*off,   y:to.y-uy*off};
    }
    const dx=to.x-from.x, dy=to.y-from.y, dist=Math.hypot(dx,dy)||1;
    const cx=(from.x+to.x)/2 - dy/dist*dist*0.12, cy=(from.y+to.y)/2 + dx/dist*dist*0.12;
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M ${from.x} ${from.y} Q ${cx} ${cy} ${to.x} ${to.y}`);
    p.setAttribute('fill','none');
    p.setAttribute('stroke','rgba(150,112,47,0.45)');
    p.setAttribute('stroke-width','2.5');
    p.setAttribute('stroke-dasharray','9,8');
    p.setAttribute('class','tline');
    p.setAttribute('marker-end','url(#arr)');
    tsvg.appendChild(p);
    const lbl = document.createElement('div');
    lbl.className='tlabel';
    lbl.style.left = (.25*from.x+.5*cx+.25*to.x)+'px';
    lbl.style.top = (.25*from.y+.5*cy+.25*to.y)+'px';
    lbl.textContent = c.lab;
    lbl.addEventListener('click', e=>{ e.stopPropagation(); openIdea(c.t); });
    world.appendChild(lbl);
    tlabels.push(lbl);
  });
}
function clearHighlight(){
  ALL.forEach(x=>mkEls[x].classList.remove('dimmed','neighbor','focused'));
  [...tsvg.querySelectorAll('path')].forEach(p=>p.remove());
  tlabels.forEach(l=>l.remove()); tlabels.length=0;
}

/* ============================================================
   NAV — top-right cluster drives the default flow
   ============================================================ */
function syncNav(){
  const cl = document.getElementById('navcluster');
  const lbl = document.getElementById('navStep');
  const i = focusId ? TOUR.indexOf(focusId) : -1;
  if (i < 0){
    cl.classList.add('idle');
    lbl.innerHTML = '▶ Begin the tour';
  } else {
    cl.classList.remove('idle');
    lbl.innerHTML = `Step ${i+1} <span class="tot">/ ${TOUR.length}</span>`;
    document.getElementById('navPrev').disabled = i<=0;
    document.getElementById('navNext').disabled = i===TOUR.length-1;
  }
}
document.getElementById('navStep').onclick = ()=>{ if(TOUR.indexOf(focusId)<0) openIdea(TOUR[0]); };
function navStep(dir){
  const i = focusId ? TOUR.indexOf(focusId) : -1;
  if (i<0){ openIdea(TOUR[0]); return; }
  const j = i+dir;
  if (j>=0 && j<TOUR.length) openIdea(TOUR[j]);
}
document.getElementById('navPrev').onclick = ()=>navStep(-1);
document.getElementById('navNext').onclick = ()=>navStep(1);

/* ============================================================
   SIMULATIONS
   ============================================================ */
const INKC='#3d3833', GRAY='#8a8069', FAINT='#b0a68c', AMBER='#96702f', SUNK='#ece4d2', BRD='#d5c9ae';
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0;
  let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t;
  return ((t^t>>>14)>>>0)/4294967296; }; }
function setActive(fig, btn){
  fig.querySelectorAll('.ghost').forEach(b=>{ if(b.dataset.d!==undefined||b.dataset.m!==undefined) b.classList.remove('active');});
  if (btn) btn.classList.add('active');
}
function simHTML(kind){
  const caps = {
    anchoring:"Kahneman's rigged-wheel study. A random number moved people's UN estimate by 20 points — anchoring, made visible.",
    regression:"Each dot is a person: round-1 score across, round-2 up. The stars of round 1 (amber) sink toward average next time — no cause needed.",
    valuefunction:"Value felt vs money won or lost. The curve bends at zero and drops steeper than it rises — a loss outweighs the equal gain.",
    framing:"One outbreak, 600 lives, two wordings of the exact same options. Watch the safe choice and the gamble swap places.",
    peakend:"Two ordeals over time. The body adds up every second (total); memory keeps only the peak and the end. They disagree."
  };
  const ctl = {
    anchoring:`<span class="cl">the wheel lands on</span>
      <button class="ghost active" data-anchor="10">10</button>
      <button class="ghost" data-anchor="65">65</button>`,
    regression:`<button class="ghost" data-a="regen">new class ↻</button>`,
    valuefunction:`<span class="cl">outcome</span><input type="range" min="-100" max="100" step="5" value="-50">`,
    framing:`<button class="ghost active" data-fr="saved">"lives saved"</button>
      <button class="ghost" data-fr="lost">"lives lost"</button>`,
    peakend:`<button class="ghost active" data-view="felt">what the body felt</button>
      <button class="ghost" data-view="remembered">what memory keeps</button>`
  };
  return `<figure class="frame" data-sim="${kind}">
    <canvas></canvas>
    <div class="controls">${ctl[kind]}</div>
    <figcaption>${caps[kind]}</figcaption>
  </figure>`;
}

const SIMS = {};

SIMS.anchoring = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=380;
  const ctx=cv.getContext('2d');
  const W=700,H=380;
  const ANS={"10":25,"65":45};
  let anchor="10", shown=0, raf;
  function frame(){
    const target=ANS[anchor];
    shown += (target-shown)*0.08;
    ctx.fillStyle='#ece4d2'; ctx.fillRect(0,0,W,H);
    ctx.font='15px Inter, sans-serif';
    ctx.fillStyle='#6b6250';
    ctx.fillText("What percent of UN nations are in Africa?", 40, 46);
    ctx.fillStyle='#8a8069'; ctx.fillText("the rigged wheel stopped at", 40, 92);
    ctx.fillStyle='#96702f'; ctx.font='40px Inter, sans-serif';
    ctx.fillText(anchor, 320, 100);
    const bx=60, by=300, bw=W-120;
    ctx.strokeStyle='#c9bda1'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+bw,by); ctx.stroke();
    for(let v=0;v<=100;v+=25){ const x=bx+bw*v/100;
      ctx.fillStyle='#8a8069'; ctx.font='12px Inter, sans-serif';
      ctx.fillText(v+"%", x-8, by+22);
      ctx.beginPath(); ctx.moveTo(x,by-4); ctx.lineTo(x,by+4); ctx.stroke(); }
    const ax=bx+bw*(+anchor)/100;
    ctx.strokeStyle='#8a8069'; ctx.setLineDash([3,4]);
    ctx.beginPath(); ctx.moveTo(ax,by-140); ctx.lineTo(ax,by); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='#8a8069'; ctx.font='12px Inter, sans-serif'; ctx.fillText("anchor", ax-16, by-146);
    const ex=bx+bw*shown/100;
    ctx.fillStyle='#96702f';
    ctx.fillRect(bx, by-92, ex-bx, 34);
    ctx.fillStyle='#26221d'; ctx.font='20px Inter, sans-serif';
    ctx.fillText("average guess: "+shown.toFixed(0)+"%", bx+6, by-102);
    raf=requestAnimationFrame(frame);
  }
  raf=requestAnimationFrame(frame);
  fig.querySelectorAll('.ghost').forEach(b=>b.onclick=()=>{
    fig.querySelectorAll('.ghost').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); anchor=b.dataset.anchor; shown=Math.max(3,shown*0.2);
  });
  return ()=>cancelAnimationFrame(raf);
};

SIMS.regression = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=400;
  const ctx=cv.getContext('2d');
  const W=700,H=400,n=140;
  function gauss(){ let u=0,v=0; while(!u)u=Math.random(); while(!v)v=Math.random();
    return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
  let pts=[];
  function gen(){ pts=[]; for(let i=0;i<n;i++){ const skill=gauss();
    pts.push([skill+gauss(), skill+gauss()]); } }
  gen();
  const px=40, py=30, pw=W-80, ph=H-90;
  const sx=v=>px+pw*(v+4)/8, sy=v=>py+ph*(4-v)/8;
  function draw(){
    ctx.fillStyle='#ece4d2'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='#c9bda1'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px,sy(0)); ctx.lineTo(px+pw,sy(0)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx(0),py); ctx.lineTo(sx(0),py+ph); ctx.stroke();
    ctx.fillStyle='#8a8069'; ctx.font='12px Inter, sans-serif';
    ctx.fillText("round 1 →", px+pw-70, sy(0)+18);
    ctx.save(); ctx.translate(px-8, py+14); ctx.rotate(-Math.PI/2);
    ctx.fillText("round 2 →", 0,0); ctx.restore();
    const sorted=[...pts].sort((a,b)=>b[0]-a[0]);
    const thr=sorted[Math.floor(n*0.18)][0];
    let starR2=0, starN=0;
    pts.forEach(([x,y])=>{
      const top=x>=thr;
      ctx.fillStyle= top ? '#96702f' : 'rgba(107,98,80,0.5)';
      ctx.beginPath(); ctx.arc(sx(x),sy(y), top?4:3, 0, 7); ctx.fill();
      if(top){ starR2+=y; starN++; }
    });
    starR2/=starN;
    const starR1=sorted.slice(0,starN).reduce((a,p)=>a+p[0],0)/starN;
    ctx.strokeStyle='#96702f'; ctx.setLineDash([5,4]); ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(sx(thr),py); ctx.lineTo(sx(thr),py+ph); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='#26221d'; ctx.font='14px Inter, sans-serif';
    ctx.fillText("round-1 stars (amber): avg "+starR1.toFixed(1)+"  →  round 2: "+starR2.toFixed(1)+"  (sank toward 0)", 44, H-16);
    ctx.fillStyle='#6b6250'; ctx.font='12px Inter, sans-serif';
    ctx.fillText("no coaching, no slump — just luck failing to repeat", 44, H-38);
  }
  draw();
  fig.querySelector('.ghost').onclick=()=>{ gen(); draw(); };
  return ()=>{};
};

SIMS.valuefunction = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=400;
  const ctx=cv.getContext('2d');
  const W=700,H=400,cx=W/2,cy=H/2-10, ux=2.4, uy=1.05;
  const val=x=> x>=0 ? Math.pow(x,0.88) : -2.25*Math.pow(-x,0.88);
  let out=-50;
  function draw(){
    ctx.fillStyle='#ece4d2'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='#c9bda1'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(20,cy); ctx.lineTo(W-20,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,20); ctx.lineTo(cx,H-20); ctx.stroke();
    ctx.fillStyle='#8a8069'; ctx.font='12px Inter, sans-serif';
    ctx.fillText("gain →", W-70, cy-8); ctx.fillText("← loss", 26, cy-8);
    ctx.fillText("value felt", cx+8, 30);
    ctx.strokeStyle='#6b6250'; ctx.lineWidth=2; ctx.beginPath();
    for(let x=-100;x<=100;x++){ const X=cx+x*ux, Y=cy-val(x)*uy;
      x===-100?ctx.moveTo(X,Y):ctx.lineTo(X,Y); }
    ctx.stroke();
    const mx=cx+out*ux, my=cy-val(out)*uy;
    ctx.strokeStyle='#96702f'; ctx.setLineDash([3,4]); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(mx,cy); ctx.lineTo(mx,my); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,my); ctx.lineTo(mx,my); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='#96702f'; ctx.beginPath(); ctx.arc(mx,my,5,0,7); ctx.fill();
    const g=val(Math.abs(out)), pain=val(out);
    ctx.fillStyle='#26221d'; ctx.font='14px Inter, sans-serif';
    if(out<0){
      ctx.fillText("a loss of "+(-out)+" feels like "+pain.toFixed(0)+" ...", 30, H-42);
      ctx.fillText("...the same "+(-out)+" as a gain would feel only +"+g.toFixed(0), 30, H-22);
    } else if(out>0){
      ctx.fillText("a gain of "+out+" feels like +"+pain.toFixed(0), 30, H-42);
      ctx.fillText("...but losing "+out+" would hurt "+val(-out).toFixed(0)+" — about twice as much", 30, H-22);
    } else {
      ctx.fillText("the reference point: zero gain, zero loss", 30, H-30);
    }
  }
  draw();
  fig.querySelector('input').oninput=e=>{ out=+e.target.value; draw(); };
  return ()=>{};
};

SIMS.framing = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=400;
  const ctx=cv.getContext('2d');
  const W=700,H=400;
  let fr="saved";
  function draw(){
    ctx.fillStyle='#ece4d2'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#6b6250'; ctx.font='15px Inter, sans-serif';
    ctx.fillText("An outbreak threatens 600 people. Two programmes:", 30, 40);
    const sure = fr==="saved" ? "Programme A: 200 people are saved" : "Programme A: 400 people die";
    const gamble = fr==="saved" ? "Programme B: 1/3 chance all 600 saved, 2/3 chance none saved"
                                 : "Programme B: 1/3 chance nobody dies, 2/3 chance all 600 die";
    const pref = fr==="saved" ? "A" : "B";
    const boxes=[["A",sure,90],["B",gamble,210]];
    boxes.forEach(([k,txt,y])=>{
      const on = k===pref;
      ctx.fillStyle = on ? 'rgba(150,112,47,0.12)' : '#faf6ec';
      ctx.strokeStyle = on ? '#b08d4f' : '#c9bda1'; ctx.lineWidth=on?2:1;
      ctx.fillRect(40,y,W-80,86); ctx.strokeRect(40,y,W-80,86);
      ctx.fillStyle = on ? '#96702f' : '#443f33'; ctx.font='16px Inter, sans-serif';
      ctx.fillText("Programme "+k, 58, y+30);
      ctx.fillStyle='#443f33'; ctx.font='13.5px Inter, sans-serif';
      ctx.fillText(txt.replace("Programme "+k+": ",""), 58, y+56);
      if(on){ ctx.fillStyle='#96702f'; ctx.font='12px Inter, sans-serif';
        ctx.fillText("← most people choose this", W-230, y+30); }
    });
    ctx.fillStyle='#6b6250'; ctx.font='13px Inter, sans-serif';
    ctx.fillText("Both programmes are identical in the two framings. Only the wording changed —", 40, 355);
    ctx.fillText("yet 'saved' pulls people to the safe A, and 'die' pushes them to gamble on B.", 40, 375);
  }
  draw();
  fig.querySelectorAll('.ghost').forEach(b=>b.onclick=()=>{
    fig.querySelectorAll('.ghost').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); fr=b.dataset.fr; draw();
  });
  return ()=>{};
};

SIMS.peakend = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=400;
  const ctx=cv.getContext('2d');
  const W=700,H=400,bx=50,by=250,bw=W-90,bh=200;
  const A=[], B=[];
  for(let t=0;t<=60;t++){ A.push([t, 3+5*Math.sin(t/60*Math.PI*0.9)+ (t>50? (t-50)*0.5:0)]); }
  for(let t=0;t<=90;t++){ let p=3+5*Math.sin(Math.min(t,60)/60*Math.PI*0.9); if(t>60)p=8-(t-60)*0.28; B.push([t,Math.max(1.5,p)]); }
  const maxT=90;
  const X=t=>bx+bw*t/maxT, Y=v=>by-(v/10)*bh;
  let view="felt";
  function stats(arr){ const peak=Math.max(...arr.map(p=>p[1])); const end=arr[arr.length-1][1];
    const total=arr.reduce((a,p)=>a+p[1],0); return {peak,end,total,rem:(peak+end)/2}; }
  function draw(){
    ctx.fillStyle='#ece4d2'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='#c9bda1'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+bw,by); ctx.stroke();
    ctx.fillStyle='#8a8069'; ctx.font='12px Inter, sans-serif';
    ctx.fillText("pain", bx-4, Y(10)-6); ctx.fillText("time →", bx+bw-46, by+18);
    const curve=(arr,col,al)=>{ ctx.strokeStyle=col; ctx.globalAlpha=al; ctx.lineWidth=2.5;
      ctx.beginPath(); arr.forEach((p,i)=> i?ctx.lineTo(X(p[0]),Y(p[1])):ctx.moveTo(X(p[0]),Y(p[1])) ); ctx.stroke(); ctx.globalAlpha=1; };
    const sA=stats(A), sB=stats(B);
    curve(A,'#6b6250',0.9); curve(B,'#96702f',0.9);
    ctx.fillStyle='#6b6250'; ctx.font='13px Inter, sans-serif'; ctx.fillText("Ordeal A — short, ends sharp", X(20), Y(A[20][1])-12);
    ctx.fillStyle='#96702f'; ctx.fillText("Ordeal B — longer, ends gently", X(72), Y(B[72][1])-10);
    ctx.font='15px Inter, sans-serif';
    if(view==="felt"){
      ctx.fillStyle='#26221d';
      ctx.fillText("Total pain endured:  A = "+sA.total.toFixed(0)+"   B = "+sB.total.toFixed(0)+"  →  B is worse (more seconds of pain)", 30, H-40);
      ctx.fillStyle='#6b6250'; ctx.font='12px Inter, sans-serif';
      ctx.fillText("The experiencing self, adding up every moment, would pick A.", 30, H-20);
    } else {
      ctx.fillStyle='#26221d';
      ctx.fillText("Remembered pain (peak+end)/2:  A = "+sA.rem.toFixed(1)+"   B = "+sB.rem.toFixed(1)+"  →  A is worse", 30, H-40);
      ctx.fillStyle='#96702f'; ctx.font='12px Inter, sans-serif';
      ctx.fillText("The remembering self picks B — the longer ordeal — because it ended gently. Duration ignored.", 30, H-20);
    }
  }
  draw();
  fig.querySelectorAll('.ghost').forEach(b=>b.onclick=()=>{
    fig.querySelectorAll('.ghost').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); view=b.dataset.view; draw();
  });
  return ()=>{};
};
