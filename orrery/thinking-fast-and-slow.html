<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thinking, Fast and Slow — Orrery</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
:root{
  --ground:#f2ecdf; --surface-sunk:#ece4d2; --surface-raised:#faf6ec;
  --border:#ddd2bc; --border-strong:#c9bda1;
  --ink:#26221d; --ink-strong:#14110e; --ink-muted:#5b5343; --ink-faint:#83765b;
  --accent:#96702f; --accent-dim:#b08d4f; --accent-wash:rgba(150,112,47,0.08);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --r:4px; --reader-w:min(760px, 58vw); --move-fast:150ms ease;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%; overflow:hidden; background:var(--ground); color:var(--ink);
  font-family:var(--font); font-size:15.5px; line-height:1.75; overscroll-behavior:none;}
h1,h2,h3{color:var(--ink-strong); font-weight:600; line-height:1.3;}
.kicker{font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink-muted); font-weight:500;}

/* header — all navigation lives top right */
#hdr{position:fixed; top:0; left:0; right:0; z-index:40; height:56px;
  display:flex; align-items:center; gap:1.1rem; padding:0 1.4rem;
  background:linear-gradient(180deg, rgba(242,236,223,.96), rgba(242,236,223,.75), transparent);
  pointer-events:none; transition:right .3s cubic-bezier(.25,.7,.3,1);}
body.reader-open #hdr{right:var(--reader-w);}
#hdr>*{pointer-events:auto;}
#hdr .t{font-size:15px; font-weight:600; color:var(--ink-strong);}
#hdr .sub{font-size:11.5px; color:var(--ink-muted);}
#hdr .spacer{flex:1;}
#count{font-size:12px; color:var(--ink-faint); white-space:nowrap;}
.hbtn{background:rgba(250,246,236,.92); border:1px solid var(--border-strong); color:var(--ink-muted);
  font-family:var(--font); font-size:12.5px; padding:6px 13px; border-radius:var(--r); cursor:pointer;
  transition:all var(--move-fast); white-space:nowrap;}
.hbtn:hover{color:var(--ink); border-color:var(--ink-muted);}
.hbtn:disabled{opacity:.35; cursor:default;}
#navcluster{display:flex; align-items:center; gap:10px; opacity:0; pointer-events:none; transition:opacity .2s ease;
  background:rgba(37,37,37,.92); border:1px solid var(--border-strong); border-radius:8px; padding:3px 6px;}
#navcluster.on{opacity:1; pointer-events:auto;}
#navcluster .hbtn{background:none; border:none; font-size:24px; font-weight:300; color:var(--ink-faint); padding:0 6px; line-height:1;}
#navcluster .hbtn:hover{color:var(--ink-muted);}
#navcluster .hbtn:disabled{opacity:.25;}

/* viewport & sky */
#vp{position:fixed; inset:0; cursor:grab; touch-action:none;
  background:radial-gradient(ellipse at 50% 40%, #f6f1e4 0%, #f2ecdf 55%, #e9e0cb 100%);}
#vp.dragging{cursor:grabbing;}
#vp.dragging, #vp.dragging *{user-select:none;}
#world{position:absolute; top:0; left:0; width:2750px; height:1750px;
  transform-origin:0 0; will-change:transform;}
#world::before{content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(circle, rgba(110,95,65,.14) 1.2px, transparent 1.2px),
                   radial-gradient(circle, rgba(110,95,65,.08) 1px, transparent 1px);
  background-size:380px 380px, 150px 150px;
  background-position:0 0, 70px 100px; opacity:.8;}

/* constellation names */
.tlab{position:absolute; pointer-events:auto; cursor:pointer; user-select:none; text-align:center;}
.tlab .big{font-size:40px; font-weight:500; letter-spacing:.5em; line-height:1.3;
  text-transform:uppercase; white-space:nowrap;}
.tlab .sum{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf;
  font-size:19px; color:#665c44; margin-top:.5em; letter-spacing:.18em; text-transform:uppercase;}
.tlab:hover .big{filter:brightness(1.35);}

/* stars */
.mk{position:absolute; cursor:pointer; user-select:none;
  display:flex; gap:14px; width:330px; align-items:flex-start;}
.mk .dot{border-radius:50%; flex-shrink:0;
  transition:transform .2s ease, box-shadow .4s ease, opacity .4s ease, background .4s ease;}
.mk:hover .dot{transform:scale(1.3);}
.mk .dtext{min-width:0; padding-top:1px;}
.mk .lbl{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf,0 0 3px #f2ecdf;
  font-size:19px; color:#26221d; font-weight:500; line-height:1.3;}
.mk .lbl .seq{font-size:12px; color:#83765b; font-weight:400; margin-right:.5em;}
.mk .ess{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf,0 0 3px #f2ecdf;
  font-size:14px; color:#584f3e; line-height:1.45; margin-top:4px; max-width:290px;
  opacity:0; transition:opacity .3s ease;}
.mk.showess .ess{opacity:1;}
.mk .sims-badge{font-size:12px; color:var(--accent-dim); margin-top:3px; display:none;}
.mk.hasim .sims-badge{display:block;}
.mk.focused .dot{transform:scale(1.35);}
.mk.focused .lbl{color:var(--ink-strong);}
.mk.neighbor .lbl{color:#14110e;}
.mk.dimmed{opacity:.35;}

/* connection overlay — few, directional, labeled plainly */
#tsvg, #astsvg, #flowsvg{position:absolute; top:0; left:0; pointer-events:none; overflow:visible;}
@keyframes dashdrift{to{stroke-dashoffset:-64;}}
.tline{animation:dashdrift 6s linear infinite;}
.tlabel{position:absolute; transform:translate(-50%,-50%); background:var(--ground);
  border:1px solid var(--accent-dim); color:var(--accent); border-radius:12px;
  font-size:12px; letter-spacing:.06em; padding:2px 11px; white-space:nowrap; cursor:pointer;
  pointer-events:auto; transition:background var(--move-fast); text-transform:uppercase;}
.tlabel:hover{background:var(--accent-wash);}

/* ---------- READER ---------- */
#reader{position:fixed; top:0; right:calc(-1 * var(--reader-w) - 20px); width:var(--reader-w);
  height:100%; z-index:45; background:var(--surface-raised);
  border-left:1px solid var(--border); display:flex; flex-direction:column;
  transition:right .3s cubic-bezier(.25,.7,.3,1);
  box-shadow:-24px 0 70px rgba(90,75,50,.18);}
#reader.open{right:0;}
#reader .top{padding:1.5em 2.2em 1em; border-bottom:1px solid var(--border); position:relative;}
#reader .close{position:absolute; top:14px; right:16px; background:none; border:none;
  color:var(--ink-faint); font-size:18px; cursor:pointer;}
#reader .close:hover{color:var(--ink);}
#reader h2{font-size:24px; margin:.45em 0 .3em;}
#reader .terrline{font-size:11.5px; color:var(--ink-faint); margin-top:2px;}
#rbody{flex:1; overflow-y:auto; padding:1.6em 2.2em 2.5em;}
#rbody::-webkit-scrollbar{width:6px;}
#rbody::-webkit-scrollbar-thumb{background:var(--border-strong); border-radius:3px;}
#rbody>*{max-width:66ch;}
.hook{font-size:18.5px; color:var(--ink-strong); line-height:1.65;
  padding-left:1em; border-left:2px solid var(--accent-dim); margin-bottom:1.1em;}
.story{font-size:15.5px; color:#2b2620;}
.typechip{display:inline-block; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink-muted); border:1px solid var(--border-strong); border-radius:3px; padding:1px 8px;}
details.fold{margin:1.2em 0 0; border:1px solid var(--border); border-radius:var(--r); background:var(--surface-sunk);}
details.fold summary{cursor:pointer; padding:.6em 1.05em; color:var(--ink-muted);
  font-size:13px; list-style:none; user-select:none;}
details.fold summary::-webkit-details-marker{display:none;}
details.fold summary::before{content:'+  '; color:var(--accent); font-weight:500;}
details.fold[open] summary::before{content:'−  ';}
details.fold summary:hover{color:var(--ink);}
details.fold .inner{padding:0 1.05em .9em; font-size:14.5px; color:#332e25;}
.named{margin-top:1.5em; background:var(--surface-sunk); border:1px solid var(--border);
  border-radius:8px; padding:1em 1.3em;}
.named .kicker{display:block; margin-bottom:.35em;}
.named b{color:var(--ink-strong); font-weight:600; font-size:16px;}
.named .def{font-size:14.5px; color:#332e25; margin-top:.2em;}
.sowhat{margin-top:1.4em; font-size:15px; color:#2b2620;}
.sowhat .kicker{display:block; margin-bottom:.3em;}
.closure{margin-top:1.5em; border:1px solid var(--accent-dim); border-radius:8px;
  background:var(--accent-wash); padding:1em 1.3em;}
.closure .kicker{color:var(--accent); display:block; margin-bottom:.3em;}
.closure .txt{font-size:14.5px; color:#4a443c; line-height:1.65;}
.linkrow{margin-top:1.6em; border-top:1px solid var(--border); padding-top:1em;
  display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:.6em 2em;}
.lgroup .kicker{display:block; margin-bottom:.25em;}
.lgroup a{display:block; font-size:14px; padding:.2em 0 .45em; color:#332e25; cursor:pointer; text-decoration:none;}
.lgroup a .t{border-bottom:1px dotted transparent; transition:border-color var(--move-fast); color:var(--ink);}
.lgroup a:hover .t{border-bottom-color:var(--accent);}
.lgroup a .why{display:block; font-size:12px; color:var(--ink-faint); line-height:1.5;}
.nextbtn{margin-top:1.8em; width:100%; max-width:66ch; text-align:left;
  background:var(--surface-sunk); border:1px solid var(--border-strong); border-radius:8px;
  color:var(--ink); font-family:var(--font); font-size:14.5px; padding:.9em 1.3em; cursor:pointer;
  transition:all var(--move-fast);}
.nextbtn:hover{border-color:var(--accent-dim); background:var(--accent-wash);}
.nextbtn .k{color:var(--ink-faint); font-size:11px; letter-spacing:.12em; text-transform:uppercase;
  display:block; margin-bottom:.15em;}
.nextbtn .arr{color:var(--accent); float:right;}

/* sim figure */
figure.frame{background:var(--surface-sunk); border:1px solid var(--border); border-radius:var(--r);
  margin:1.3em 0 0; overflow:hidden;}
figure.frame canvas{width:100%; display:block;}
figure.frame .controls{display:flex; gap:8px; padding:8px 12px; border-top:1px solid var(--border);
  align-items:center; flex-wrap:wrap;}
figure.frame .controls .cl{font-size:11.5px; color:var(--ink-faint);}
figure.frame figcaption{padding:7px 13px 10px; font-size:12.5px; color:var(--ink-muted); line-height:1.55;}
.ghost{background:none; border:1px solid var(--border-strong); color:var(--ink-muted);
  font-family:var(--font); font-size:12px; padding:3px 11px; border-radius:var(--r); cursor:pointer;
  transition:all var(--move-fast);}
.ghost:hover{color:var(--ink); border-color:var(--ink-muted);}
.ghost.active{color:var(--accent); border-color:var(--accent-dim); background:var(--accent-wash);}
figure.frame input[type=range]{flex:1; min-width:100px; accent-color:var(--accent);}

@media(max-width:760px){ :root{--reader-w:100vw;} }
</style>
</head>
<body>

<div id="hdr">
  <div>
    <div class="t">Thinking, Fast and Slow</div>
    <div class="sub">a celestial chart of ideas · follow the flow or wander freely</div>
  </div>
  <div class="spacer"></div>
  <div id="navcluster">
    <button class="hbtn" id="navPrev" title="previous idea">‹</button>
    <button class="hbtn" id="navNext" title="next idea">›</button>
  </div>
  <button class="hbtn" id="overviewBtn">Overview&nbsp;·&nbsp;Esc</button>
</div>

<div id="vp"><div id="world"></div></div>

<div id="reader">
  <div class="top">
    <button class="close" id="rClose">✕</button>
    <span class="typechip" id="rChip"></span>
    <h2 id="rTitle"></h2>
    <div class="terrline" id="rTerr"></div>
  </div>
  <div id="rbody"></div>
</div>

<script>

   Connections: ≤4 per idea, in three plain buckets.

const N = {

a1:{type:"axiom", title:"Two minds share one head", x:1259, y:512,
  ess:"Two minds share one head: one fast and automatic, one slow and effortful.",
  hook:"Quick — what's 2+2? Now what's 17×24? Notice how different those two felt inside?",
  story:"The first answer arrived on its own; the second made you stop, focus, maybe tense up. Kahneman names them System 1 (fast, automatic) and System 2 (slow, effortful) — two characters sharing your skull.",
  mech:"Almost everything you do begins as a System 1 impulse that System 2 merely signs off on. The whole book is the story of that division of labour — and where it quietly fools you.",
  term:"System 1 / System 2", def:"the fast, automatic mind and the slow, effortful one — a metaphor, not two brain regions.",
  sowhat:"Most of your day — driving, reacting, judging people — is run by a System 1 you never consciously hired. Knowing it's there is the first step to catching it.",
  builds:[], leads:[["b1-laplace","meet the fast one up close"],["b1-pendulum","and the slow one"]], live:[]},
a2:{type:"axiom", title:"Attention is a budget", x:1057, y:627,
  ess:"Attention is a budget, and System 2 is lazy — most of life runs on autopilot.",
  hook:"Ever miss your exit because you were deep in thought? Where did your attention actually go?",
  story:"Thinking hard costs real fuel: pupils widen, blood sugar dips, and you go briefly blind to everything else. So the mind spends as little as it can and lets System 1 drive.",
  mech:"Because effort is scarce and unpleasant, we wave through System 1's fast answers far more often than we should. The laziness isn't a bug — it's the design.",
  term:"Cognitive strain / depletion", def:"mental effort draws on a limited, tiring resource, so the mind conserves it by default.",

  builds:[], leads:[["b1-sensitive","why the mind coasts on ease"],["b1-principle","the lazy controller"]], live:[]},
a3:{type:"axiom", title:"What you see is all there is", x:1462, y:627,
  ess:"The mind builds a whole story from whatever it has — and ignores what it doesn't.",
  hook:"'Will Mindik be a good leader? She is intelligent and strong…' — did a verdict form before you heard a single flaw?",
  story:"System 1 never asks what's missing; it makes the best story from the evidence in front of it. Kahneman's name for this is WYSIATI — what you see is all there is.",
  mech:"The goal is coherence, not completeness. This one habit powers overconfidence, framing, and most biases — the mind is a machine for jumping to conclusions.",
  term:"WYSIATI", def:"'what you see is all there is' — we judge on the evidence present and ignore the evidence we lack.",
  sowhat:"You form confident opinions of people and plans from tiny scraps. Ask 'what am I not seeing?' and half your certainty evaporates.",
  builds:[], leads:[["b2-logistic","how it powers the biases"],["b3-kokura","how it breeds false confidence"]], live:[]},
a4:{type:"axiom", title:"Confidence is a feeling", x:1259, y:771,
  ess:"We feel certainty, not accuracy. The sense of knowing is manufactured, not earned.",
  hook:"Picture someone who was totally sure — and totally wrong. How did their certainty feel any different from yours?",
  story:"A story that hangs together feels true whether or not it is. Confidence just measures how neatly the pieces fit — not how much you actually know.",
  mech:"So subjective certainty is a terrible guide to correctness. Experts and amateurs alike feel sure, because the feeling comes from coherence, not evidence.",
  term:"The confidence heuristic", def:"the felt certainty of being right, generated by a coherent story rather than real accuracy.",

  builds:[], leads:[["b3-contingency","the illusion it builds"],["b3-timeline","why we still trust the gut"]], live:[]},

"b1-laplace":{type:"phenomenon", title:"System 1: the fast mind", x:404, y:355,
  ess:"The mind that answers before you ask — effortless, instant, always on.",
  hook:"'Bread and…' — did a word just appear? You didn't decide to think it. That's System 1.",
  story:"It reads a word, senses a mood, finishes the phrase, flinches from a snake. No sense of effort, no decision to engage — it simply delivers.",
  mech:"System 1 is brilliant and indispensable: it runs your skills and instincts. Its flaw is that it can't tell a good answer from a merely confident one.",
  term:"System 1", def:"fast, automatic, effortless thinking — impressions, intuitions, and skilled reflexes.",
  sowhat:"First impressions, snap moral judgments, gut hunches — all System 1, arriving pre-formed before you've reasoned at all.",
  builds:[["a1","the fast half of the two-system mind"]], leads:[["b1-pendulum","meet its slow partner"],["b1-sensitive","how it stays effortless"]], live:[]},
"b1-pendulum":{type:"mechanism", title:"System 2: the slow mind", x:884, y:309,
  ess:"The effortful self that grinds through 17×24 — capable, deliberate, easily tired.",
  hook:"Multiply 17 by 24 in your head. Feel that? The strain is System 2 clocking in.",
  story:"System 2 is what you mean by 'I': it reasons, checks, holds focus. But it's slow and costly, and would rather rubber-stamp System 1 than do the work.",
  mech:"Its great power is the veto — it can override a fast impulse. Its great failing is that it rarely bothers, because catching System 1's errors costs effort it won't spend.",
  term:"System 2", def:"slow, effortful, deliberate thinking — reasoning, self-control, and focused attention.",
  sowhat:"The part of you that resists the second slice or re-reads the email is System 2 — real, but expensive and off-duty more than you'd like.",
  builds:[["a1","the slow half of the two-system mind"]], leads:[["b1-principle","why it stays lazy"]], live:[]},
"b1-sensitive":{type:"mechanism", title:"Cognitive ease", x:520, y:522,
  ess:"Whatever is easy to process feels true, good, and familiar.",
  hook:"Which rings truer: 'woes unite foes' or 'woes unite enemies'? Most people pick the rhyme.",
  story:"Clear fonts, repeated claims, rhyming slogans, a good mood — each makes an idea slide in without friction, and the mind reads that smoothness as truth.",
  mech:"Ease is System 1's shortcut for 'safe and familiar'. Strain flips System 2 on and makes you skeptical — which is why a hard-to-read font can actually cut errors.",
  term:"Cognitive ease", def:"the felt fluency of processing something; the easier it is, the truer and safer it seems.",
  sowhat:"Repetition alone makes claims feel true — the engine behind advertising, propaganda, and the rumour you can't shake.",

"b1-lorenz-story":{type:"story", title:"The associative machine", x:254, y:656,
  ess:"One idea silently summons a crowd of others — and steers you without your knowing.",
  hook:"Read the words BANANA and VOMIT together. Did your body react before you chose to?",
  story:"See EAT and you finish SO_P as SOUP; see WASH and you get SOAP. Words about the elderly make people leave the room walking slower. The mind primes, and the body follows.",

"b1-principle":{type:"principle", title:"The lazy controller", x:716, y:679,
  ess:"You identify with System 2 — but System 1 writes most of the script.",

  story:"The self you experience as reasoning is mostly a press secretary, endorsing conclusions System 1 already reached. Real control is knowing the few moments worth the effort to check.",
  mech:"From the two-system split plus scarce attention: since System 2 won't check everything, wisdom is spotting the high-stakes moments where it must. Naming the trap is the start of the cure.",

  sowhat:"You're an intuition machine with a reasoning department that rarely opens. Deliberate slowness is a choice you must make on purpose.",

"b2-logistic":{type:"mechanism", title:"The substitution trick", x:1837, y:233,
  ess:"Faced with a hard question, the mind quietly answers an easier one instead.",

  story:"'How happy am I with life?' becomes 'what's my mood right now?'. 'Is this CEO any good?' becomes 'does he look the part?'. You answer the easy one and feel you answered the hard one.",
  mech:"This swap is the engine under most heuristics: the mind maps a difficult target onto a handy question it can answer fast. Cheap, usually fine, occasionally disastrous.",

"b2-attractors":{type:"mechanism", title:"Anchoring", sim:"anchoring", x:2069, y:401,
  ess:"Any number you just saw drags your next estimate toward it — even a random one.",
  hook:"Is the tallest redwood over or under 1,200 feet? Now guess its height. Did 1,200 tug at your answer?",
  story:"Kahneman spun a rigged wheel, then asked what percent of UN nations are African. Wheel on 10 → people guessed 25%. Wheel on 65 → 45%. A number they knew was random moved them 20 points.",
  mech:"Anchors work by priming: the mind adjusts away from the starting value and stops too soon. It happens even when the anchor is obviously meaningless — which is why the first offer matters so much.",
  term:"Anchoring", def:"estimates are pulled toward any number recently in mind, even an irrelevant one.",
  sowhat:"The list price, the first salary figure, the asking offer — whoever names a number first bends the whole negotiation. Anchor first, or reset it out loud.",

"b2-lorenz-attractor":{type:"mechanism", title:"Availability", x:2300, y:282,
  ess:"We judge how likely something is by how easily examples come to mind.",
  hook:"More deaths from sharks, or from falling airplane parts? Most say sharks — wrong, by about 30 to 1.",

  mech:"It swaps 'how easily can I recall this?' for 'how often does it happen?'. Media, recency and drama all inflate the number — availability is why we fear the wrong things.",

  sowhat:"Your fears track what's memorable, not what's likely — so the news, not the numbers, ends up running your sense of risk.",

"b2-tension-random":{type:"mechanism", title:"Stereotypes vs base rates", x:2392, y:470,

  hook:"Shy, tidy, loves detail — librarian or salesperson? (There are about 20× more salespeople.)",

const vp = document.getElementById('vp');
const world = document.getElementById('world');
const reader = document.getElementById('reader');
const WW = 2750, WH = 1750;
let cam = {s:0.12, tx:0, ty:0};
let anim = null;
function apply(){
  world.style.transform = `translate(${cam.tx}px, ${cam.ty}px) scale(${cam.s})`;
  lod();
}
function readerW(){ return reader.classList.contains('open') ? (reader.getBoundingClientRect().width||430) : 0; }
function visW(){ return innerWidth - readerW(); }
function centerOn(cx, cy, s){
  cam.s = s;
  cam.tx = visW()/2 - cx*s;
  cam.ty = innerHeight/2 - cy*s;
  apply();
}
function flyTo(cx, cy, s, dur=700){
  if (anim) cancelAnimationFrame(anim);
  const s0=cam.s, cx0=(visW()/2-cam.tx)/s0, cy0=(innerHeight/2-cam.ty)/s0;
  const ls0=Math.log(s0), ls1=Math.log(s);
  const t0=performance.now();
  function step(t){
    let p=Math.min(1,(t-t0)/dur);
    p = p<.5 ? 4*p*p*p : 1-Math.pow(-2*p+2,3)/2;
    centerOn(cx0+(cx-cx0)*p, cy0+(cy-cy0)*p, Math.exp(ls0+(ls1-ls0)*p));
    if (p<1) anim=requestAnimationFrame(step);
  }
  anim=requestAnimationFrame(step);
}
function overviewCam(fly=true){
  const s = Math.min(visW()/WW, innerHeight/WH)*0.92;
  if (fly) flyTo(WW/2, WH/2, s, 800); else centerOn(WW/2, WH/2, s);
}
vp.addEventListener('wheel', e=>{
  e.preventDefault();
  if (anim) cancelAnimationFrame(anim);
  const f = Math.exp(-e.deltaY*0.0016);
  const s2 = Math.min(2.2, Math.max(0.06, cam.s*f));
  const wx=(e.clientX-cam.tx)/cam.s, wy=(e.clientY-cam.ty)/cam.s;
  cam.s=s2; cam.tx=e.clientX-wx*s2; cam.ty=e.clientY-wy*s2;
  apply();
}, {passive:false});
const ptrs = new Map();
let panStart=null, pinchStart=null, moved=0;
vp.addEventListener('pointerdown', e=>{
  if (e.target.closest('.tlabel')) return;
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (ptrs.size===1){
    moved=0;
    panStart={mx:e.clientX, my:e.clientY, tx:cam.tx, ty:cam.ty};
    vp.classList.add('dragging');
  } else if (ptrs.size===2){
    const [p1,p2]=[...ptrs.values()];
    pinchStart={d:Math.hypot(p1.x-p2.x,p1.y-p2.y), s:cam.s,
      wx:((p1.x+p2.x)/2-cam.tx)/cam.s, wy:((p1.y+p2.y)/2-cam.ty)/cam.s};
    panStart=null;
  }
});
addEventListener('pointermove', e=>{
  if (!ptrs.has(e.pointerId)) return;
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (ptrs.size===1 && panStart){
    if (anim) cancelAnimationFrame(anim);
    moved += Math.abs(e.movementX||0)+Math.abs(e.movementY||0);
    cam.tx = panStart.tx + (e.clientX-panStart.mx);
    cam.ty = panStart.ty + (e.clientY-panStart.my);
    apply();
  } else if (ptrs.size===2 && pinchStart){
    if (anim) cancelAnimationFrame(anim);
    const [p1,p2]=[...ptrs.values()];
    const d=Math.hypot(p1.x-p2.x,p1.y-p2.y);
    const s2=Math.min(2.2, Math.max(0.06, pinchStart.s*d/pinchStart.d));
    const cx=(p1.x+p2.x)/2, cy=(p1.y+p2.y)/2;
    cam.s=s2; cam.tx=cx-pinchStart.wx*s2; cam.ty=cy-pinchStart.wy*s2;
    apply();
  }
});
function ptrUp(e){ ptrs.delete(e.pointerId);
  if (ptrs.size<2) pinchStart=null;
  if (ptrs.size===0){ panStart=null; vp.classList.remove('dragging'); } }
addEventListener('pointerup', ptrUp);
addEventListener('pointercancel', ptrUp);
vp.addEventListener('dblclick', e=>{
  if (!e.target.closest('.mk')){ closeReader(); overviewCam(); }
});
addEventListener('keydown', e=>{
  if (e.key==='Escape'){ closeReader(); overviewCam(); }
  if (e.key==='ArrowRight') navStep(1);
  if (e.key==='ArrowLeft') navStep(-1);
});

/* map highlight: few directional lines with plain labels */
function highlight(id){
  clearHighlight();
  const n = N[id];
  const nb = new Set([id]);
  const conns = [
    ...n.builds.map(([t])=>({t, lab:'builds on', into:true})),
    ...n.leads.map(([t])=>({t, lab:'leads to', into:false})),
    ...n.live.map(([t])=>({t, lab:'see it live', into:false}))
  ];
  conns.forEach(c=>nb.add(c.t));
  ALL.forEach(x=>{
    mkEls[x].classList.toggle('dimmed', !nb.has(x));
    mkEls[x].classList.toggle('neighbor', nb.has(x) && x!==id);
    mkEls[x].classList.toggle('focused', x===id);
  });
  const here = dotCenter(id);
  conns.forEach(c=>{
    const there = dotCenter(c.t);
    let from = c.into ? {...there} : {...here};
    let to   = c.into ? {...here} : {...there};
    {
      const ddx=to.x-from.x, ddy=to.y-from.y, LL=Math.hypot(ddx,ddy)||1;
      const ux=ddx/LL, uy=ddy/LL, off=30;
      from = {x:from.x+ux*off, y:from.y+uy*off};
      to   = {x:to.x-ux*off,   y:to.y-uy*off};
    }
    const dx=to.x-from.x, dy=to.y-from.y, dist=Math.hypot(dx,dy)||1;
    const cx=(from.x+to.x)/2 - dy/dist*dist*0.12, cy=(from.y+to.y)/2 + dx/dist*dist*0.12;
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M ${from.x} ${from.y} Q ${cx} ${cy} ${to.x} ${to.y}`);
    p.setAttribute('fill','none');
    p.setAttribute('stroke','rgba(150,112,47,0.45)');
    p.setAttribute('stroke-width','2.5');
    p.setAttribute('stroke-dasharray','9,8');
    p.setAttribute('class','tline');
    p.setAttribute('marker-end','url(#arr)');
    tsvg.appendChild(p);
    const lbl = document.createElement('div');
    lbl.className='tlabel';
    lbl.style.left = (.25*from.x+.5*cx+.25*to.x)+'px';
    lbl.style.top = (.25*from.y+.5*cy+.25*to.y)+'px';
    lbl.textContent = c.lab;
    lbl.addEventListener('click', e=>{ e.stopPropagation(); openIdea(c.t); });
    world.appendChild(lbl);
    tlabels.push(lbl);
  });
}

const INKC='#3d3833', GRAY='#8a8069', FAINT='#b0a68c', AMBER='#96702f', SUNK='#ece4d2', BRD='#d5c9ae';
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0;
  let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t;
  return ((t^t>>>14)>>>0)/4294967296; }; }
function setActive(fig, btn){

    valuefunction:"Value felt vs money won or lost. The curve bends at zero and drops steeper than it rises — a loss outweighs the equal gain.",
    framing:"One outbreak, 600 lives, two wordings of the exact same options. Watch the safe choice and the gamble swap places.",

const SIMS = {};

function wrapText(ctx, text, x, y, maxW, lh){
  const words=text.split(' '); let line='', yy=y;
  for(const w of words){ const t=line?line+' '+w:w;
    if(ctx.measureText(t).width>maxW && line){ ctx.fillText(line,x,yy); line=w; yy+=lh; }
    else line=t; }
  if(line) ctx.fillText(line,x,yy); return yy;
}

SIMS.anchoring = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=380;
  const ctx=cv.getContext('2d'); const W=700,H=380; const ANS={"10":25,"65":45};
  let anchor="10", shown=0, raf;
  function frame(){
    const target=ANS[anchor]; shown += (target-shown)*0.08;
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H); ctx.font='15px Inter, sans-serif';
    ctx.fillStyle=GRAY; ctx.fillText("What percent of UN nations are in Africa?", 40, 46);
    ctx.fillStyle=FAINT; ctx.fillText("the rigged wheel stopped at", 40, 92);
    ctx.fillStyle=AMBER; ctx.font='40px Inter, sans-serif'; ctx.fillText(anchor, 320, 100);
    const bx=60, by=300, bw=W-120;
    ctx.strokeStyle=BRD; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+bw,by); ctx.stroke();
    for(let v=0;v<=100;v+=25){ const x=bx+bw*v/100;
      ctx.fillStyle=FAINT; ctx.font='12px Inter, sans-serif'; ctx.fillText(v+"%", x-8, by+22);
      ctx.beginPath(); ctx.moveTo(x,by-4); ctx.lineTo(x,by+4); ctx.stroke(); }
    const ax=bx+bw*(+anchor)/100;
    ctx.strokeStyle=FAINT; ctx.setLineDash([3,4]); ctx.beginPath(); ctx.moveTo(ax,by-140); ctx.lineTo(ax,by); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=FAINT; ctx.font='12px Inter, sans-serif'; ctx.fillText("anchor", ax-16, by-146);
    const ex=bx+bw*shown/100;
    ctx.fillStyle='rgba(150,112,47,0.85)'; ctx.fillRect(bx, by-92, ex-bx, 34);
    ctx.fillStyle=INKC; ctx.font='20px Inter, sans-serif'; ctx.fillText("average guess: "+shown.toFixed(0)+"%", bx+6, by-102);
    raf=requestAnimationFrame(frame);
  }
  raf=requestAnimationFrame(frame);
  fig.querySelectorAll('.ghost').forEach(b=>b.onclick=()=>{
    fig.querySelectorAll('.ghost').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); anchor=b.dataset.anchor; shown=Math.max(3,shown*0.2);
  });
  return ()=>cancelAnimationFrame(raf);
};

SIMS.regression = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=400;
  const ctx=cv.getContext('2d'); const W=700,H=400,n=140;
  function g(){ let u=0,v=0; while(!u)u=Math.random(); while(!v)v=Math.random();
    return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
  let pts=[]; function gen(){ pts=[]; for(let i=0;i<n;i++){ const sk=g(); pts.push([sk+g(), sk+g()]); } } gen();
  const px=40, py=30, pw=W-80, ph=H-90; const sx=v=>px+pw*(v+4)/8, sy=v=>py+ph*(4-v)/8;
  function draw(){
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle=BRD; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px,sy(0)); ctx.lineTo(px+pw,sy(0)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx(0),py); ctx.lineTo(sx(0),py+ph); ctx.stroke();
    ctx.fillStyle=FAINT; ctx.font='12px Inter, sans-serif'; ctx.fillText("round 1 →", px+pw-70, sy(0)+18);
    ctx.save(); ctx.translate(px-8, py+14); ctx.rotate(-Math.PI/2); ctx.fillText("round 2 →", 0,0); ctx.restore();
    const sorted=[...pts].sort((a,b)=>b[0]-a[0]); const thr=sorted[Math.floor(n*0.18)][0];
    let r2=0,cnt=0;
    pts.forEach(([x,y])=>{ const top=x>=thr;
      ctx.fillStyle= top ? 'rgba(150,112,47,0.9)' : 'rgba(138,128,105,0.5)';
      ctx.beginPath(); ctx.arc(sx(x),sy(y), top?4:3, 0, 7); ctx.fill(); if(top){r2+=y;cnt++;} });
    r2/=cnt; const r1=sorted.slice(0,cnt).reduce((a,p)=>a+p[0],0)/cnt;
    ctx.strokeStyle=AMBER; ctx.setLineDash([5,4]); ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(sx(thr),py); ctx.lineTo(sx(thr),py+ph); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=INKC; ctx.font='14px Inter, sans-serif';
    ctx.fillText("round-1 stars (gold): avg "+r1.toFixed(1)+"  →  round 2: "+r2.toFixed(1)+"  (sank toward 0)", 44, H-16);
    ctx.fillStyle=GRAY; ctx.font='12px Inter, sans-serif';
    ctx.fillText("no coaching, no slump — just luck failing to repeat", 44, H-38);
  }
  draw(); fig.querySelector('.ghost').onclick=()=>{ gen(); draw(); }; return ()=>{};
};

SIMS.valuefunction = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=400;
  const ctx=cv.getContext('2d'); const W=700,H=400,cx=W/2,cy=H/2-10, ux=2.4, uy=1.05;
  const val=x=> x>=0 ? Math.pow(x,0.88) : -2.25*Math.pow(-x,0.88); let out=-50;
  function draw(){
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle=BRD; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(20,cy); ctx.lineTo(W-20,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,20); ctx.lineTo(cx,H-20); ctx.stroke();
    ctx.fillStyle=FAINT; ctx.font='12px Inter, sans-serif';
    ctx.fillText("gain →", W-70, cy-8); ctx.fillText("← loss", 26, cy-8); ctx.fillText("value felt", cx+8, 30);
    ctx.strokeStyle=GRAY; ctx.lineWidth=2; ctx.beginPath();
    for(let x=-100;x<=100;x++){ const X=cx+x*ux, Y=cy-val(x)*uy; x===-100?ctx.moveTo(X,Y):ctx.lineTo(X,Y); } ctx.stroke();
    const mx=cx+out*ux, my=cy-val(out)*uy;
    ctx.strokeStyle=AMBER; ctx.setLineDash([3,4]); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(mx,cy); ctx.lineTo(mx,my); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,my); ctx.lineTo(mx,my); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=AMBER; ctx.beginPath(); ctx.arc(mx,my,5,0,7); ctx.fill();
    ctx.fillStyle=INKC; ctx.font='14px Inter, sans-serif';
    if(out<0){ ctx.fillText("a loss of "+(-out)+" feels like "+val(out).toFixed(0)+" ...", 30, H-42);
      ctx.fillText("...the same as a gain would feel only +"+val(-out).toFixed(0), 30, H-22);
    } else if(out>0){ ctx.fillText("a gain of "+out+" feels like +"+val(out).toFixed(0), 30, H-42);
      ctx.fillText("...but losing "+out+" would hurt "+val(-out).toFixed(0)+" — about twice as much", 30, H-22);
    } else { ctx.fillText("the reference point: zero gain, zero loss", 30, H-30); }
  }
  draw(); fig.querySelector('input').oninput=e=>{ out=+e.target.value; draw(); }; return ()=>{};
};

SIMS.peakend = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=400;
  const ctx=cv.getContext('2d'); const W=700,H=400,bx=50,by=250,bw=W-90,bh=200;
  const A=[], B=[];
  for(let t=0;t<=60;t++){ A.push([t, 3+5*Math.sin(t/60*Math.PI*0.9)+(t>50?(t-50)*0.5:0)]); }
  for(let t=0;t<=90;t++){ let p=3+5*Math.sin(Math.min(t,60)/60*Math.PI*0.9); if(t>60)p=8-(t-60)*0.28; B.push([t,Math.max(1.5,p)]); }
  const maxT=90; const X=t=>bx+bw*t/maxT, Y=v=>by-(v/10)*bh; let view="felt";
  function stats(a){ const peak=Math.max(...a.map(p=>p[1])); const end=a[a.length-1][1];
    const total=a.reduce((s,p)=>s+p[1],0); return {peak,end,total,rem:(peak+end)/2}; }
  function draw(){
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle=BRD; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+bw,by); ctx.stroke();
    ctx.fillStyle=FAINT; ctx.font='12px Inter, sans-serif'; ctx.fillText("pain", bx-4, Y(10)-6); ctx.fillText("time →", bx+bw-46, by+18);
    const cv2=(a,col)=>{ ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.beginPath();
      a.forEach((p,i)=> i?ctx.lineTo(X(p[0]),Y(p[1])):ctx.moveTo(X(p[0]),Y(p[1])) ); ctx.stroke(); };
    const sA=stats(A), sB=stats(B); cv2(A,GRAY); cv2(B,AMBER);
    ctx.fillStyle=GRAY; ctx.font='13px Inter, sans-serif'; ctx.fillText("Ordeal A — short, ends sharp", X(18), Y(A[18][1])-12);
    ctx.fillStyle=AMBER; ctx.fillText("Ordeal B — longer, ends gently", X(70), Y(B[70][1])-10);
    ctx.font='15px Inter, sans-serif';
    if(view==="felt"){
      ctx.fillStyle=INKC; ctx.fillText("Total pain endured:  A = "+sA.total.toFixed(0)+"   B = "+sB.total.toFixed(0)+"  →  B is worse (more seconds of pain)", 30, H-40);
      ctx.fillStyle=GRAY; ctx.font='12px Inter, sans-serif'; ctx.fillText("The experiencing self, adding up every moment, would pick A.", 30, H-20);
    } else {
      ctx.fillStyle=INKC; ctx.fillText("Remembered pain (peak+end)/2:  A = "+sA.rem.toFixed(1)+"   B = "+sB.rem.toFixed(1)+"  →  A is worse", 30, H-40);
      ctx.fillStyle=AMBER; ctx.font='12px Inter, sans-serif'; ctx.fillText("The remembering self picks B — the longer ordeal — because it ended gently. Duration ignored.", 30, H-20);
    }
  }
  draw();
  fig.querySelectorAll('.ghost').forEach(b=>b.onclick=()=>{
    fig.querySelectorAll('.ghost').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); view=b.dataset.view; draw(); });
  return ()=>{};
};/* ============================================================
   BOOT
   ============================================================ */
syncNav();
overviewCam(false);

</script>
