<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Building Taste — Orrery</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
:root{
  --ground:#f2ecdf; --surface-sunk:#ece4d2; --surface-raised:#faf6ec;
  --border:#ddd2bc; --border-strong:#c9bda1;
  --ink:#26221d; --ink-strong:#14110e; --ink-muted:#5b5343; --ink-faint:#83765b;
  --accent:#96702f; --accent-dim:#b08d4f; --accent-wash:rgba(150,112,47,0.08);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --r:4px; --reader-w:min(760px, 58vw); --move-fast:150ms ease;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%; overflow:hidden; background:var(--ground); color:var(--ink);
  font-family:var(--font); font-size:15.5px; line-height:1.75; overscroll-behavior:none;}
h1,h2,h3{color:var(--ink-strong); font-weight:600; line-height:1.3;}
.kicker{font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink-muted); font-weight:500;}

/* header — all navigation lives top right */
#hdr{position:fixed; top:0; left:0; right:0; z-index:40; height:56px;
  display:flex; align-items:center; gap:1.1rem; padding:0 1.4rem;
  background:linear-gradient(180deg, rgba(242,236,223,.96), rgba(242,236,223,.75), transparent);
  pointer-events:none; transition:right .3s cubic-bezier(.25,.7,.3,1);}
body.reader-open #hdr{right:var(--reader-w);}
#hdr>*{pointer-events:auto;}
#hdr .t{font-size:15px; font-weight:600; color:var(--ink-strong);}
#hdr .sub{font-size:11.5px; color:var(--ink-muted);}
#hdr .spacer{flex:1;}
#count{font-size:12px; color:var(--ink-faint); white-space:nowrap;}
.hbtn{background:rgba(250,246,236,.92); border:1px solid var(--border-strong); color:var(--ink-muted);
  font-family:var(--font); font-size:12.5px; padding:6px 13px; border-radius:var(--r); cursor:pointer;
  transition:all var(--move-fast); white-space:nowrap;}
.hbtn:hover{color:var(--ink); border-color:var(--ink-muted);}
.hbtn:disabled{opacity:.35; cursor:default;}
#navcluster{display:flex; align-items:center; gap:10px; opacity:0; pointer-events:none; transition:opacity .2s ease;
  background:rgba(37,37,37,.92); border:1px solid var(--border-strong); border-radius:8px; padding:3px 6px;}
#navcluster.on{opacity:1; pointer-events:auto;}
#navcluster .hbtn{background:none; border:none; font-size:24px; font-weight:300; color:var(--ink-faint); padding:0 6px; line-height:1;}
#navcluster .hbtn:hover{color:var(--ink-muted);}
#navcluster .hbtn:disabled{opacity:.25;}

/* viewport & sky */
#vp{position:fixed; inset:0; cursor:grab; touch-action:none;
  background:radial-gradient(ellipse at 50% 40%, #f6f1e4 0%, #f2ecdf 55%, #e9e0cb 100%);}
#vp.dragging{cursor:grabbing;}
#vp.dragging, #vp.dragging *{user-select:none;}
#world{position:absolute; top:0; left:0; width:2750px; height:1750px;
  transform-origin:0 0; will-change:transform;}
#world::before{content:''; position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(circle, rgba(110,95,65,.14) 1.2px, transparent 1.2px),
                   radial-gradient(circle, rgba(110,95,65,.08) 1px, transparent 1px);
  background-size:380px 380px, 150px 150px;
  background-position:0 0, 70px 100px; opacity:.8;}

/* constellation names */
.tlab{position:absolute; pointer-events:auto; cursor:pointer; user-select:none; text-align:center;}
.tlab .big{font-size:40px; font-weight:500; letter-spacing:.5em; line-height:1.3;
  text-transform:uppercase; white-space:nowrap;}
.tlab .sum{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf;
  font-size:19px; color:#665c44; margin-top:.5em; letter-spacing:.18em; text-transform:uppercase;}
.tlab:hover .big{filter:brightness(1.35);}
.tlab.core .big{font-size:19px; letter-spacing:.26em;}
.tlab.core .sum{font-size:9px; letter-spacing:.14em;}
.tlab.core .big{text-shadow:0 0 6px #f2ecdf,0 0 6px #f2ecdf,0 0 3px #f2ecdf;}
.mk.coredot{width:auto; gap:0;}
.mk.coredot .dot{box-shadow:0 0 0 3px rgba(111,100,85,0.14);}

/* stars */
.mk{position:absolute; cursor:pointer; user-select:none;
  display:flex; gap:14px; width:330px; align-items:flex-start;}
.mk .dot{border-radius:50%; flex-shrink:0;
  transition:transform .2s ease, box-shadow .4s ease, opacity .4s ease, background .4s ease;}
.mk:hover .dot{transform:scale(1.3);}
.mk .dtext{min-width:0; padding-top:1px;}
.mk .lbl{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf,0 0 3px #f2ecdf;
  font-size:19px; color:#26221d; font-weight:500; line-height:1.3;}
.mk .lbl .seq{font-size:12px; color:#83765b; font-weight:400; margin-right:.5em;}
.mk .ess{text-shadow:0 0 5px #f2ecdf,0 0 5px #f2ecdf,0 0 3px #f2ecdf,0 0 3px #f2ecdf;
  font-size:14px; color:#584f3e; line-height:1.45; margin-top:4px; max-width:290px;
  opacity:0; transition:opacity .3s ease;}
.mk.showess .ess{opacity:1;}
.mk .sims-badge{font-size:12px; color:var(--accent-dim); margin-top:3px; display:none;}
.mk.hasim .sims-badge{display:block;}
.mk.focused .dot{transform:scale(1.35);}
.mk.focused .lbl{color:var(--ink-strong);}
.mk.neighbor .lbl{color:#14110e;}
.mk.dimmed{opacity:.35;}

/* connection overlay — few, directional, labeled plainly */
#tsvg, #astsvg, #flowsvg{position:absolute; top:0; left:0; pointer-events:none; overflow:visible;}
@keyframes dashdrift{to{stroke-dashoffset:-64;}}
.tline{animation:dashdrift 6s linear infinite;}
.tlabel{position:absolute; transform:translate(-50%,-50%); background:var(--ground);
  border:1px solid var(--accent-dim); color:var(--accent); border-radius:12px;
  font-size:12px; letter-spacing:.06em; padding:2px 11px; white-space:nowrap; cursor:pointer;
  pointer-events:auto; transition:background var(--move-fast); text-transform:uppercase;}
.tlabel:hover{background:var(--accent-wash);}

/* ---------- READER ---------- */
#reader{position:fixed; top:0; right:calc(-1 * var(--reader-w) - 20px); width:var(--reader-w);
  height:100%; z-index:45; background:var(--surface-raised);
  border-left:1px solid var(--border); display:flex; flex-direction:column;
  transition:right .3s cubic-bezier(.25,.7,.3,1);
  box-shadow:-24px 0 70px rgba(90,75,50,.18);}
#reader.open{right:0;}
#reader .top{padding:1.5em 2.2em 1em; border-bottom:1px solid var(--border); position:relative;}
#reader .close{position:absolute; top:14px; right:16px; background:none; border:none;
  color:var(--ink-faint); font-size:18px; cursor:pointer;}
#reader .close:hover{color:var(--ink);}
#reader h2{font-size:24px; margin:.45em 0 .3em;}
#reader .terrline{font-size:11.5px; color:var(--ink-faint); margin-top:2px;}
#rbody{flex:1; overflow-y:auto; padding:1.6em 2.2em 2.5em;}
#rbody::-webkit-scrollbar{width:6px;}
#rbody::-webkit-scrollbar-thumb{background:var(--border-strong); border-radius:3px;}
#rbody>*{max-width:66ch;}
.hook{font-size:18.5px; color:var(--ink-strong); line-height:1.65;
  padding-left:1em; border-left:2px solid var(--accent-dim); margin-bottom:1.1em;}
.story{font-size:15.5px; color:#2b2620;}
.typechip{display:inline-block; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink-muted); border:1px solid var(--border-strong); border-radius:3px; padding:1px 8px;}
details.fold{margin:1.2em 0 0; border:1px solid var(--border); border-radius:var(--r); background:var(--surface-sunk);}
details.fold summary{cursor:pointer; padding:.6em 1.05em; color:var(--ink-muted);
  font-size:13px; list-style:none; user-select:none;}
details.fold summary::-webkit-details-marker{display:none;}
details.fold summary::before{content:'+  '; color:var(--accent); font-weight:500;}
details.fold[open] summary::before{content:'−  ';}
details.fold summary:hover{color:var(--ink);}
details.fold .inner{padding:0 1.05em .9em; font-size:14.5px; color:#332e25;}
.named{margin-top:1.5em; background:var(--surface-sunk); border:1px solid var(--border);
  border-radius:8px; padding:1em 1.3em;}
.named .kicker{display:block; margin-bottom:.35em;}
.named b{color:var(--ink-strong); font-weight:600; font-size:16px;}
.named .def{font-size:14.5px; color:#332e25; margin-top:.2em;}
.sowhat{margin-top:1.4em; font-size:15px; color:#2b2620;}
.sowhat .kicker{display:block; margin-bottom:.3em;}
.closure{margin-top:1.5em; border:1px solid var(--accent-dim); border-radius:8px;
  background:var(--accent-wash); padding:1em 1.3em;}
.closure .kicker{color:var(--accent); display:block; margin-bottom:.3em;}
.closure .txt{font-size:14.5px; color:#4a443c; line-height:1.65;}
.linkrow{margin-top:1.6em; border-top:1px solid var(--border); padding-top:1em;
  display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:.6em 2em;}
.lgroup .kicker{display:block; margin-bottom:.25em;}
.lgroup a{display:block; font-size:14px; padding:.2em 0 .45em; color:#332e25; cursor:pointer; text-decoration:none;}
.lgroup a .t{border-bottom:1px dotted transparent; transition:border-color var(--move-fast); color:var(--ink);}
.lgroup a:hover .t{border-bottom-color:var(--accent);}
.lgroup a .why{display:block; font-size:12px; color:var(--ink-faint); line-height:1.5;}
.nextbtn{margin-top:1.8em; width:100%; max-width:66ch; text-align:left;
  background:var(--surface-sunk); border:1px solid var(--border-strong); border-radius:8px;
  color:var(--ink); font-family:var(--font); font-size:14.5px; padding:.9em 1.3em; cursor:pointer;
  transition:all var(--move-fast);}
.nextbtn:hover{border-color:var(--accent-dim); background:var(--accent-wash);}
.nextbtn .k{color:var(--ink-faint); font-size:11px; letter-spacing:.12em; text-transform:uppercase;
  display:block; margin-bottom:.15em;}
.nextbtn .arr{color:var(--accent); float:right;}

/* sim figure */
figure.frame{background:var(--surface-sunk); border:1px solid var(--border); border-radius:var(--r);
  margin:1.3em 0 0; overflow:hidden;}
figure.frame canvas{width:100%; display:block;}
figure.frame .controls{display:flex; gap:8px; padding:8px 12px; border-top:1px solid var(--border);
  align-items:center; flex-wrap:wrap;}
figure.frame .controls .cl{font-size:11.5px; color:var(--ink-faint);}
figure.frame figcaption{padding:7px 13px 10px; font-size:12.5px; color:var(--ink-muted); line-height:1.55;}
.ghost{background:none; border:1px solid var(--border-strong); color:var(--ink-muted);
  font-family:var(--font); font-size:12px; padding:3px 11px; border-radius:var(--r); cursor:pointer;
  transition:all var(--move-fast);}
.ghost:hover{color:var(--ink); border-color:var(--ink-muted);}
.ghost.active{color:var(--accent); border-color:var(--accent-dim); background:var(--accent-wash);}
figure.frame input[type=range]{flex:1; min-width:100px; accent-color:var(--accent);}

@media(max-width:760px){ :root{--reader-w:100vw;} }
</style>
</head>
<body>

<div id="hdr">
  <div>
    <div class="t">Building Taste</div>
    <div class="sub">a celestial chart of ideas · follow the flow or wander freely</div>
  </div>
  <div class="spacer"></div>
  <div id="navcluster">
    <button class="hbtn" id="navPrev" title="previous idea">‹</button>
    <button class="hbtn" id="navNext" title="next idea">›</button>
  </div>
  <button class="hbtn" id="overviewBtn">Overview&nbsp;·&nbsp;Esc</button>
</div>

<div id="vp"><div id="world"></div></div>

<div id="reader">
  <div class="top">
    <button class="close" id="rClose">✕</button>
    <span class="typechip" id="rChip"></span>
    <h2 id="rTitle"></h2>
    <div class="terrline" id="rTerr"></div>
  </div>
  <div id="rbody"></div>
</div>

<script>
'use strict';
/* ============================================================
   CONTENT v2 — every idea: hook → story → (sim) → mechanism
   fold → the idea named → where it bites → you can now explain.
   Connections: ≤4 per idea, in three plain buckets.
   ============================================================ */
const N = {

a1:{type:"axiom", title:"Taste is fast judgment before proof", x:1259, y:512,
  ess:"A reliable read on quality that arrives as a feeling — before you have the data to justify it.",
  hook:"You wince at a screen a full second before you can say what's wrong. What just happened?",
  story:"Strip away the mystique and taste is one thing: a fast, reliable judgment of quality made before you have proof. It arrives as a feeling first, an argument later — and that speed is the whole point, letting you steer the thousands of small moments where analysis is impossible.",
  mech:"Taste operates precisely where evidence is absent, delayed, or too coarse — early ideas, qualitative feel, the hundred micro-decisions between spec and ship. Where you have the A/B result, you don't need taste; you have data.",
  term:"Taste", def:"compressed, retrievable judgment about quality that runs faster than reasoning and fills the gap before evidence arrives.",
  sowhat:"Most of your product decisions will never be tested. Taste is what makes that untested majority good instead of random.",
  builds:[], leads:[["a2","what taste is not"],["b1-laplace","why it must exist"]], live:[]},
a2:{type:"axiom", title:"Judgment, not creation", x:1057, y:627,
  ess:"Taste is the evaluative faculty — separable from the hands that execute.",
  hook:"Ever known exactly that something was wrong but been unable to fix it? Which skill were you missing?",
  story:"Taste is evaluation — 'this is good / this is off / not it yet' — not creation. You can have sharp taste and mediocre hands (you know it's wrong but can't fix it) or great hands and dull taste (you can build anything but chase the wrong thing). They're separable skills.",
  mech:"Naming taste as the evaluative skill clarifies what you're training: the judge, not the maker. Craft executes; taste decides whether the execution is any good.",
  term:"Taste vs craft", def:"taste is the skill of judging quality; craft is the skill of producing it — distinct and independently trainable.",
  sowhat:"If you can spot what's off but can't fix it, that's a craft gap, not a taste gap — and vice versa. Train the one you're missing.",
  builds:[], leads:[["b3-timeline","craft taste"],["a4","and the preference trap"]], live:[]},
a3:{type:"axiom", title:"Taste is trained, not born", x:1462, y:627,
  ess:"Fast judgment comes from pattern recognition on a large, well-labeled set of examples.",
  hook:"Where does the speed of an expert's 'that's wrong' actually come from?",
  story:"If taste is fast judgment, the speed comes from the same place all expertise does: pattern recognition trained on many examples. When something feels off, your brain matched the current thing against thousands of stored instances and flagged a mismatch.",
  mech:"That means taste is built, not bestowed — and every part of the training (examples, labels, feedback, reps) is a lever you can deliberately pull. The mechanism is the whole reason the tactics work.",
  term:"Trained intuition", def:"expert speed produced by matching new cases against a large library of past examples.",
  sowhat:"Nobody is born with taste. It's a training set you load and label — which means you can deliberately build yours.",
  builds:[], leads:[["b2-logistic","load the examples"],["b2-principle","the training loop"]], live:[]},
a4:{type:"axiom", title:"Feedback separates taste from preference", x:1259, y:771,
  ess:"Both feel like 'I like this.' Only taste is repeatedly corrected against reality.",
  hook:"Your refined opinion and genuine taste feel identical from the inside. What actually tells them apart?",
  story:"Preference is a verdict with no external feedback signal — it never has to be right about anything outside your head, so it never gets corrected. Taste is a verdict repeatedly checked against reality: did users actually thrive, did the thing actually work. From the inside they're indistinguishable.",
  mech:"They're distinguished only by exposure to correction. Cut the feedback and taste quietly rots into sophisticated preference — internally consistent, well-argued, and systematically wrong.",
  term:"Taste vs preference", def:"taste is verdict-plus-correction; preference is verdict that never meets reality.",
  sowhat:"Keep your judgments in contact with real outcomes, or your 'taste' becomes confident opinion that no longer tracks the world.",
  builds:[], leads:[["b3-kokura","the drift into preference"],["b4-destination","stay in user contact"]], live:[]},

"b1-laplace":{type:"mechanism", title:"Decisions outnumber tests", x:404, y:355,
  ess:"A product is thousands of choices; you can instrument only a handful.",
  hook:"How many decisions went into the last feature you shipped? How many did you actually A/B test?",
  story:"A product is thousands of choices: copy, spacing, order of steps, what to cut, what to say no to. You can instrument maybe a handful. The rest are decided by judgment — or by accident.",
  mech:"Taste is what makes the un-tested majority good instead of random. At the scale product decisions actually occur, testing simply cannot reach most of them.",
  term:"Untestable majority", def:"the vast share of product decisions that will never be measured and must be judged.",
  sowhat:"You'll never test your way to a good product. Most of it rides on judgment — so judgment is worth building.",
  builds:[["a1","taste fills the gap where data isn't"]], leads:[["b1-pendulum","and the biggest calls come first"]], live:[]},
"b1-pendulum":{type:"mechanism", title:"The biggest calls come earliest", x:884, y:309,
  ess:"The highest-leverage decisions happen when the evidence is weakest.",
  hook:"When do you decide what to build at all? Long before a single metric exists.",
  story:"What to build, which problem is worth it, what 'great' would even look like here — these are decided before any metric exists. The moments that matter most are exactly the moments data can't reach.",
  mech:"Leverage and evidence are inversely related: the earlier and more consequential the call, the less data there is to make it. Taste is the only faculty available at that frontier.",
  term:"Early-leverage gap", def:"the highest-impact decisions occur earliest, where evidence is weakest.",
  sowhat:"Your most important decisions are the ones you'll have the least data for. Don't wait for evidence that can't arrive in time.",
  builds:[["a1","taste operates before proof"]], leads:[["b1-sensitive","and metrics miss things anyway"]], live:[]},
"b1-sensitive":{type:"mechanism", title:"Metrics are lossy proxies", x:520, y:522,
  ess:"A number captures one projection of quality and is blind to the rest.",
  hook:"Your retention is up. Does the product feel trustworthy? Does it respect the user? The number can't say.",
  story:"A metric captures one projection of quality — clicks, retention — and is blind to the others: does it feel trustworthy, does it respect the user, will they recommend it. Taste perceives the parts of quality your metrics don't encode.",
  mech:"Because metrics are lossy, the parts they miss go unmanaged — and catch up to you later. Taste is what tracks the un-instrumented dimensions of quality in the meantime.",
  term:"Proxy loss", def:"a metric encodes one facet of quality and omits the rest, which still matter.",
  sowhat:"Don't mistake a good number for a good product. Taste guards the dimensions your dashboard can't see.",
  builds:[["a1","quality beyond what data encodes"]], leads:[["b1-lorenz-story","so taste is economic, not decorative"]], live:[]},
"b1-lorenz-story":{type:"story", title:"Taste is an economic function", x:254, y:656,
  ess:"Not an aesthetic bonus — it's how good decisions get made at product speed and scale.",
  hook:"Is taste a nice-to-have for designers, or the thing quietly deciding whether your product is any good?",
  story:"Put the three pressures together — decisions outnumber tests, the big calls come first, metrics are lossy — and taste stops being a decorative bonus. It's the core faculty that makes good decisions possible at the scale, speed, and uncertainty at which product decisions actually occur.",
  mech:"Reframed this way, taste is infrastructure, not garnish. That's why it's worth deliberately building rather than hoping to absorb it by osmosis.",
  term:"Taste as infrastructure", def:"taste understood as the economic mechanism for deciding well under scale and uncertainty.",
  sowhat:"Treat taste as a core capability to invest in — like an engineering skill — not a personality trait you either have or don't.",
  builds:[["b1-laplace","scale"],["b1-pendulum","timing"],["b1-sensitive","and metric blindness"]], leads:[["b1-principle","so build it on purpose"]], live:[]},
"b1-principle":{type:"principle", title:"So build it deliberately", x:716, y:679,
  ess:"If taste is core economic function, it deserves training — not hope.",
  hook:"You'd never hope to 'absorb' coding. Why do we expect taste to arrive by osmosis?",
  story:"Once taste is seen as the mechanism for good decisions under uncertainty, the conclusion is forced: it's worth building on purpose. Hoping to absorb it by being around good products is slow and unreliable.",
  mech:"Traces to taste-is-trained: since it's pattern recognition, it responds to deliberate practice like any trained skill. The rest of this chart is how.",
  term:"Deliberate taste-building", def:"treating taste as a trainable capability to be developed intentionally.",
  sowhat:"Put taste on your explicit development plan. It compounds like any skill — but only if you train it on purpose.",
  builds:[["b1-lorenz-story","taste is infrastructure"]], leads:[["b2-logistic","the engine that builds it"]], live:[]},

"b2-logistic":{type:"mechanism", title:"Load a large example library", sim:"library", x:1837, y:233,
  ess:"Fast judgment is retrieval, not computation — so first you need a big, diverse training set.",
  hook:"When something 'feels off,' what is your brain actually doing in that instant?",
  story:"Fast judgment is retrieval: your brain matches the current thing against thousands of stored instances and flags a mismatch. No library, no retrieval, no speed. This is the literal reason 'consume a lot' is the first commandment of taste — you're loading the training set.",
  mech:"Breadth matters as much as volume: a library drawn only from your own category can tell you whether you match competitors, not whether the whole category is mediocre. Cross-domain examples are what let you judge the category itself.",
  term:"The example library", def:"the stored set of instances against which fast judgments are retrieved.",
  sowhat:"Consume widely and cross-domain, daily. You're not being cultured — you're literally loading the data your judgment runs on.",
  builds:[["a3","taste retrieves from examples"]], leads:[["b2-attractors","but examples need labels"]], live:[]},
"b2-attractors":{type:"mechanism", title:"Label the examples", x:2069, y:401,
  ess:"The label is the verdict plus the reason — it's what turns exposure into taste.",
  hook:"You've seen a thousand checkouts. Can you say why the good ones are good? If not, what did you learn?",
  story:"A library you never judged is just exposure — it builds familiarity, not taste. The label is the verdict plus the reason: 'this checkout is good because it removed a decision I dreaded.' Unlabeled reps make you comfortable with the average; labeled reps make you discerning.",
  mech:"Articulating why is not an optional flourish — it's the step that converts experience into transferable taste. An example you can't explain taught you nothing you can carry to the next case.",
  term:"Labeling", def:"attaching an explicit verdict and a reason to an example, making the lesson transferable.",
  sowhat:"For anything that impresses or enrages you, write one line: what it is and why it's good or bad. The one line is the entire point.",
  builds:[["b2-logistic","examples become lessons"]], leads:[["b2-lorenz-attractor","but your labels start wrong"]], live:[]},
"b2-lorenz-attractor":{type:"mechanism", title:"A signal to correct the labels", x:2300, y:282,
  ess:"Your early verdicts are wrong in ways you can't see — feedback re-labels them toward reality.",
  hook:"Something you were sure was great flopped; something you dismissed won. Now what?",
  story:"Your early labels are systematically wrong and you can't tell which. Without a signal — user reactions, outcomes, critique from people ahead of you — you keep mislabeling, and your 'taste' calcifies into confident error.",
  mech:"Feedback is what re-labels the set and drags your judgment toward reality rather than toward your own preferences. It's the difference between improving and merely entrenching.",
  term:"The correction signal", def:"external feedback that re-labels wrong verdicts, moving taste toward reality.",
  sowhat:"Actively seek the signal — outcomes, real users, sharper critics. Without it you don't get better, you get more confident.",
  builds:[["b2-attractors","labels need correcting"],["a4","this is what beats preference"]], leads:[["b2-tension-random","and it must loop fast"]], live:[]},
"b2-tension-random":{type:"mechanism", title:"Reps, close together, with reflection", x:2392, y:470,

const vp = document.getElementById('vp');
const world = document.getElementById('world');
const reader = document.getElementById('reader');
const WW = 2750, WH = 1750;
let cam = {s:0.12, tx:0, ty:0};
let anim = null;
function apply(){
  world.style.transform = `translate(${cam.tx}px, ${cam.ty}px) scale(${cam.s})`;
  lod();
}
function readerW(){ return reader.classList.contains('open') ? (reader.getBoundingClientRect().width||430) : 0; }
function visW(){ return innerWidth - readerW(); }
function centerOn(cx, cy, s){
  cam.s = s;
  cam.tx = visW()/2 - cx*s;
  cam.ty = innerHeight/2 - cy*s;
  apply();
}
function flyTo(cx, cy, s, dur=700){
  if (anim) cancelAnimationFrame(anim);
  const s0=cam.s, cx0=(visW()/2-cam.tx)/s0, cy0=(innerHeight/2-cam.ty)/s0;
  const ls0=Math.log(s0), ls1=Math.log(s);
  const t0=performance.now();
  function step(t){
    let p=Math.min(1,(t-t0)/dur);
    p = p<.5 ? 4*p*p*p : 1-Math.pow(-2*p+2,3)/2;
    centerOn(cx0+(cx-cx0)*p, cy0+(cy-cy0)*p, Math.exp(ls0+(ls1-ls0)*p));
    if (p<1) anim=requestAnimationFrame(step);
  }
  anim=requestAnimationFrame(step);
}
function overviewCam(fly=true){
  const cx=BC.x, cy=BC.y;
  const s = Math.min(visW()/(2*Math.max(cx,WW-cx)), innerHeight/(2*Math.max(cy,WH-cy)))*0.92;
  if (fly) flyTo(cx, cy, s, 800); else centerOn(cx, cy, s);
}
vp.addEventListener('wheel', e=>{
  e.preventDefault();
  if (anim) cancelAnimationFrame(anim);
  const f = Math.exp(-e.deltaY*0.0016);
  const s2 = Math.min(2.2, Math.max(0.06, cam.s*f));
  const wx=(e.clientX-cam.tx)/cam.s, wy=(e.clientY-cam.ty)/cam.s;
  cam.s=s2; cam.tx=e.clientX-wx*s2; cam.ty=e.clientY-wy*s2;
  apply();
}, {passive:false});
const ptrs = new Map();
let panStart=null, pinchStart=null, moved=0;
vp.addEventListener('pointerdown', e=>{
  if (e.target.closest('.tlabel')) return;
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (ptrs.size===1){
    moved=0;
    panStart={mx:e.clientX, my:e.clientY, tx:cam.tx, ty:cam.ty};
    vp.classList.add('dragging');
  } else if (ptrs.size===2){
    const [p1,p2]=[...ptrs.values()];
    pinchStart={d:Math.hypot(p1.x-p2.x,p1.y-p2.y), s:cam.s,
      wx:((p1.x+p2.x)/2-cam.tx)/cam.s, wy:((p1.y+p2.y)/2-cam.ty)/cam.s};
    panStart=null;
  }
});
addEventListener('pointermove', e=>{
  if (!ptrs.has(e.pointerId)) return;
  ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if (ptrs.size===1 && panStart){
    if (anim) cancelAnimationFrame(anim);
    moved += Math.abs(e.movementX||0)+Math.abs(e.movementY||0);
    cam.tx = panStart.tx + (e.clientX-panStart.mx);
    cam.ty = panStart.ty + (e.clientY-panStart.my);
    apply();
  } else if (ptrs.size===2 && pinchStart){
    if (anim) cancelAnimationFrame(anim);
    const [p1,p2]=[...ptrs.values()];
    const d=Math.hypot(p1.x-p2.x,p1.y-p2.y);
    const s2=Math.min(2.2, Math.max(0.06, pinchStart.s*d/pinchStart.d));
    const cx=(p1.x+p2.x)/2, cy=(p1.y+p2.y)/2;
    cam.s=s2; cam.tx=cx-pinchStart.wx*s2; cam.ty=cy-pinchStart.wy*s2;
    apply();
  }
});
function ptrUp(e){ ptrs.delete(e.pointerId);
  if (ptrs.size<2) pinchStart=null;
  if (ptrs.size===0){ panStart=null; vp.classList.remove('dragging'); } }
addEventListener('pointerup', ptrUp);
addEventListener('pointercancel', ptrUp);

function highlight(id){
  clearHighlight();
  const n = N[id];
  const nb = new Set([id]);
  const conns = [
    ...n.builds.map(([t])=>({t, lab:'builds on', into:true})),
    ...n.leads.map(([t])=>({t, lab:'leads to', into:false})),
    ...n.live.map(([t])=>({t, lab:'see it live', into:false}))
  ];
  conns.forEach(c=>nb.add(c.t));
  ALL.forEach(x=>{
    mkEls[x].classList.toggle('dimmed', !nb.has(x));
    mkEls[x].classList.toggle('neighbor', nb.has(x) && x!==id);
    mkEls[x].classList.toggle('focused', x===id);
  });
  const here = dotCenter(id);
  conns.forEach(c=>{
    const there = dotCenter(c.t);
    let from = c.into ? {...there} : {...here};
    let to   = c.into ? {...here} : {...there};
    {
      const ddx=to.x-from.x, ddy=to.y-from.y, LL=Math.hypot(ddx,ddy)||1;
      const ux=ddx/LL, uy=ddy/LL, off=30;
      from = {x:from.x+ux*off, y:from.y+uy*off};
      to   = {x:to.x-ux*off,   y:to.y-uy*off};
    }
    const dx=to.x-from.x, dy=to.y-from.y, dist=Math.hypot(dx,dy)||1;
    const cx=(from.x+to.x)/2 - dy/dist*dist*0.12, cy=(from.y+to.y)/2 + dx/dist*dist*0.12;
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M ${from.x} ${from.y} Q ${cx} ${cy} ${to.x} ${to.y}`);
    p.setAttribute('fill','none');
    p.setAttribute('stroke','rgba(150,112,47,0.45)');
    p.setAttribute('stroke-width','2.5');
    p.setAttribute('stroke-dasharray','9,8');
    p.setAttribute('class','tline');
    p.setAttribute('marker-end','url(#arr)');
    tsvg.appendChild(p);
    const lbl = document.createElement('div');
    lbl.className='tlabel';
    lbl.style.left = (.25*from.x+.5*cx+.25*to.x)+'px';
    lbl.style.top = (.25*from.y+.5*cy+.25*to.y)+'px';
    lbl.textContent = c.lab;
    lbl.addEventListener('click', e=>{ e.stopPropagation(); openIdea(c.t); });
    world.appendChild(lbl);
    tlabels.push(lbl);
  });
}

const INKC='#3d3833', GRAY='#8a8069', FAINT='#b0a68c', AMBER='#96702f', SUNK='#ece4d2', BRD='#d5c9ae';
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0;
  let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t;
  return ((t^t>>>14)>>>0)/4294967296; }; }

const SIMS = {};

function wrapText(ctx, text, x, y, maxW, lh){
  const words=text.split(' '); let line='', yy=y;
  for(const w of words){ const t=line?line+' '+w:w;
    if(ctx.measureText(t).width>maxW && line){ ctx.fillText(line,x,yy); line=w; yy+=lh; }
    else line=t; }
  if(line) ctx.fillText(line,x,yy); return yy;
}

SIMS.library = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=380;

    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);

    ctx.fillStyle=INKC; ctx.font='13px Inter, sans-serif'; ctx.fillText("a new screen arrives →", 40, 40);
    ctx.strokeStyle=AMBER; ctx.lineWidth=2; ctx.strokeRect(250,20,60,44);

    ctx.fillStyle=FAINT; ctx.font='12px Inter, sans-serif'; ctx.fillText("your example library", 40, 100);
    const cols=12, rows=4, gx=40, gy=115, cw=26;
    const n = mode==="empty"? 3 : cols*rows;
    let k=0;
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      if(k<n){ ctx.fillStyle='rgba(74,102,132,0.5)'; ctx.fillRect(gx+c*cw, gy+r*cw, cw-6, cw-6); }
      else { ctx.strokeStyle=BRD; ctx.strokeRect(gx+c*cw, gy+r*cw, cw-6, cw-6); }
      k++;
    }
    ctx.font='15px Inter, sans-serif';
    if(mode==="empty"){
      ctx.fillStyle=GRAY; ctx.fillText("Almost nothing to match against — no mismatch fires.", 40, H-60);
      ctx.fillStyle='#8a5c5c'; ctx.fillText("Verdict: '...I guess it's fine?' (slow, unsure)", 40, H-36);
    } else {
      ctx.fillStyle=AMBER; ctx.fillText("Matched against thousands — a mismatch lights up instantly.", 40, H-60);
      ctx.fillStyle=INKC; ctx.fillText("Verdict: 'the hierarchy is off' (fast, confident)", 40, H-36);
    }
    ctx.fillStyle=FAINT; ctx.font='12px Inter, sans-serif';
    ctx.fillText("No library, no retrieval, no speed. This is why 'consume a lot' is the first commandment.", 40, H-14);

};

SIMS.loop = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=380;
  const ctx=cv.getContext('2d'); const W=700,H=380; let step=0;
  const nodes=[
    {t:"Expose",d:"load a large, diverse library of examples",x:200,y:120},
    {t:"Judge",d:"attach a verdict + the reason (a label)",x:500,y:120},
    {t:"Feedback",d:"reality corrects the label",x:500,y:270},
    {t:"Repeat",d:"fast loops compress it into intuition",x:200,y:270}];
  function draw(){
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    // arrows around the cycle
    ctx.strokeStyle=BRD; ctx.lineWidth=2;
    const seq=[[0,1],[1,2],[2,3],[3,0]];
    seq.forEach(([a,b],idx)=>{
      const na=nodes[a], nb=nodes[b];
      ctx.strokeStyle = idx===step ? AMBER : BRD; ctx.lineWidth= idx===step?3:1.5;
      ctx.beginPath(); ctx.moveTo(na.x,na.y); ctx.lineTo(nb.x,nb.y); ctx.stroke();
    });
    nodes.forEach((n,i)=>{
      const on=i===step;
      ctx.fillStyle= on?'rgba(150,112,47,0.15)':'#faf6ec';
      ctx.strokeStyle= on?AMBER:BRD; ctx.lineWidth= on?2.5:1.5;
      ctx.beginPath(); ctx.arc(n.x,n.y,44,0,7); ctx.fill(); ctx.stroke();
      ctx.fillStyle= on?AMBER:INKC; ctx.font='15px Inter, sans-serif'; ctx.textAlign='center';
      ctx.fillText(n.t,n.x,n.y+5); ctx.textAlign='left';
    });
    const n=nodes[step];
    ctx.fillStyle=INKC; ctx.font='15px Inter, sans-serif'; ctx.textAlign='center';
    ctx.fillText(n.t+" — "+n.d, W/2, H-46); ctx.textAlign='left';
    ctx.fillStyle=GRAY; ctx.font='12px Inter, sans-serif'; ctx.textAlign='center';
    ctx.fillText("Every real taste tactic is just an efficient way to turn one part of this loop.", W/2, H-22); ctx.textAlign='left';
  }
  draw();
  fig.querySelectorAll('.ghost').forEach(b=>b.onclick=()=>{
    fig.querySelectorAll('.ghost').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); step=+b.dataset.s; draw(); });
  return ()=>{};
};

SIMS.prefvstaste = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=380;
  const ctx=cv.getContext('2d'); const W=700,H=380; let fb="off";
  function draw(){
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    const px=50, py=60, pw=W-90, ph=H-140;
    const X=t=>px+pw*t/100, Y=v=>py+ph*(1-v);
    // reality line at 0.5
    ctx.strokeStyle=AMBER; ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(px,Y(0.5)); ctx.lineTo(px+pw,Y(0.5)); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=AMBER; ctx.font='12px Inter, sans-serif'; ctx.fillText("reality (what actually works)", px+pw-180, Y(0.5)-6);
    // trajectory of a verdict
    const R=(function(){let a=7; return ()=>{a=(a*16807)%2147483647; return a/2147483647;};})();
    ctx.strokeStyle=GRAY; ctx.lineWidth=2.5; ctx.beginPath();
    let v=0.5;
    for(let t=0;t<=100;t+=2){
      if(fb==="on"){ v += (0.5-v)*0.12 + (R()-0.5)*0.03; }   // corrected toward reality
      else { v += (R()-0.5)*0.05 + 0.004; }                  // drifts freely
      v=Math.max(0.05,Math.min(0.95,v));
      t===0?ctx.moveTo(X(t),Y(v)):ctx.lineTo(X(t),Y(v));
    }
    ctx.stroke();
    ctx.fillStyle=INKC; ctx.font='15px Inter, sans-serif';
    ctx.fillText(fb==="on"?"Taste: every verdict re-checked against reality — it tracks the world.":"Preference: no correction — it wanders off into confident, reality-blind opinion.", 40, H-46);
    ctx.fillStyle=GRAY; ctx.font='12px Inter, sans-serif';
    wrapText(ctx,"Both feel identical from the inside ('I like this'). Only the feedback signal tells them apart.",40,H-22,W-80,18);
  }
  draw();
  fig.querySelectorAll('.ghost').forEach(b=>b.onclick=()=>{
    fig.querySelectorAll('.ghost').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); fb=b.dataset.fb; draw(); });
  return ()=>{};
};

SIMS.context = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=380;
  const ctx=cv.getContext('2d'); const W=700,H=380; let shift=0;
  function bell(x,mu,s){ return Math.exp(-((x-mu)**2)/(2*s*s)); }
  function draw(){
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    const px=50, py=60, pw=W-90, ph=H-150;
    const X=x=>px+pw*x/100, Y=v=>py+ph*(1-v);
    const lib=30, tgt=30+shift*0.6;
    ctx.strokeStyle=BRD; ctx.beginPath(); ctx.moveTo(px,py+ph); ctx.lineTo(px+pw,py+ph); ctx.stroke();
    const curve=(mu,col,lab,ly)=>{ ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.beginPath();
      for(let x=0;x<=100;x+=1){ const v=bell(x,mu,12); x===0?ctx.moveTo(X(x),Y(v)):ctx.lineTo(X(x),Y(v)); } ctx.stroke();
      ctx.fillStyle=col; ctx.font='12px Inter, sans-serif'; ctx.fillText(lab, X(mu)-30, ly); };
    curve(lib,GRAY,"your library (users like you)",py+14);
    curve(tgt,AMBER,"users you're serving",py+34);
    // overlap = validity
    let overlap=0; for(let x=0;x<=100;x++) overlap+=Math.min(bell(x,lib,12),bell(x,tgt,12));
    let full=0; for(let x=0;x<=100;x++) full+=bell(x,lib,12);
    const val=Math.round(overlap/full*100);
    ctx.fillStyle= val<50?'#8a5c5c':INKC; ctx.font='15px Inter, sans-serif';
    ctx.fillText("taste validity here: ~"+val+"%", 40, H-44);
    ctx.fillStyle=GRAY; ctx.font='12px Inter, sans-serif';
    wrapText(ctx, shift<20 ? "Serving users like you — your retrieval fires on the right examples."
                           : "The distributions have pulled apart — your confident verdicts are trained on users who aren't these users.", 40, H-22, W-80, 18);
  }
  draw(); fig.querySelector('input').oninput=e=>{ shift=+e.target.value; draw(); }; return ()=>{};
};

SIMS.predictcheck = fig=>{
  const cv=fig.querySelector('canvas'); cv.width=700; cv.height=380;
  const ctx=cv.getContext('2d'); const W=700,H=380;
  let truth=null, call=null, score=0, tries=0;
  function newItem(){ truth = Math.random()<0.5?"good":"bad"; call=null; }
  newItem();
  function draw(){
    ctx.fillStyle=SUNK; ctx.fillRect(0,0,W,H);
    ctx.fillStyle=INKC; ctx.font='16px Inter, sans-serif';
    ctx.fillText("A design lands on your screen. Call it before you look at the data.", 40, 46);
    // mystery card
    ctx.strokeStyle=BRD; ctx.lineWidth=2; ctx.strokeRect(280,80,140,90);
    ctx.fillStyle=FAINT; ctx.font='40px Inter, sans-serif'; ctx.textAlign='center';
    ctx.fillText(call?"?":"?", 350, 138); ctx.textAlign='left';
    if(call){
      const right = call===truth;
      ctx.fillStyle= right?'rgba(79,112,80,0.9)':'#8a5c5c'; ctx.font='16px Inter, sans-serif';
      ctx.fillText("You called it "+call.toUpperCase()+". Reality: "+truth.toUpperCase()+" — "+(right?"match.":"surprise!"), 40, 210);
      ctx.fillStyle= right?GRAY:AMBER; ctx.font='13px Inter, sans-serif';
      wrapText(ctx, right?"Confirmation — mild learning.":"The gap between your call and reality is exactly what re-labels your set. This surprise is the training.", 40, 244, W-80, 20);
    } else {
      ctx.fillStyle=GRAY; ctx.font='13px Inter, sans-serif';
      ctx.fillText("Commit to a verdict — good or bad — then it reveals. No peeking first.", 40, 210);
    }
    ctx.fillStyle=FAINT; ctx.font='12px Inter, sans-serif';
    ctx.fillText("calls made: "+tries+"    (an opinion formed AFTER the answer would teach you nothing)", 40, H-24);
  }
  draw();
  fig.querySelectorAll('.ghost').forEach(b=>b.onclick=()=>{
    if(b.dataset.a==="new"){ newItem(); draw(); return; }
    if(!call){ call=b.dataset.a; tries++; draw(); }
  });
  return ()=>{};
};
